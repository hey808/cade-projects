// ─── Actionables ───────────────────────────────────────
function addActionable(projId) {
  const p = findProject(projId); if (!p) return;
  const now = new Date().toISOString();
  const a = {
    id: uid(), text: "", done: false,
    status: null,
    blocker: "", waitingFor: "",
    createdAt: now, updatedAt: now,
    priority: 0, stuckSince: null, doneAt: null,
    parentId: null, notes: "",
    archived: false, archivedAt: null,

  };

  markActionDirty(a.id);
  saveState(); renderProjects();
  setTimeout(() => {

    const last = items[items.length - 1];
    if (last) last.focus();

function updateActionable(projId, itemId, field, value) {
  const p = findProject(projId); if (!p) return;
  const it = findActionable(p, itemId); if (!it) return;
  if (field === "done") {
    const now = new Date().toISOString();
    if (value && !it.done) it.doneAt = now;
    if (!value) it.doneAt = null;
    it.done = value;
    touchActionable(it);
    markActionDirty(itemId);
    // Cascade to descendants: checking parent checks all subs (and unchecking
    // unchecks them — matches Notion / Things behavior).
    getDescendants(p, it).forEach(d => {
      if (value && !d.done) d.doneAt = now;
      if (!value) d.doneAt = null;
      d.done = value;
      touchActionable(d);
      markActionDirty(d.id);
    });
    saveState();
    return;
  }
  it[field] = value;
  touchActionable(it);
  markActionDirty(itemId);
  saveState();
}
function toggleTodayFlag(projId, itemId) {
  const p = findProject(projId); if (!p) return;
  const a = findActionable(p, itemId); if (!a) return;
  a.today = !a.today;

  saveState();

function archiveActionable(projId, itemId) {
  const p = findProject(projId); if (!p) return;
  const target = findActionable(p, itemId);
  if (!target) return;
  // Archive the item plus its descendants — they hide together
  const ids = new Set(getDescendants(p, target).map(d => d.id));
  ids.add(itemId);
  const now = new Date().toISOString();
  p.actionables.forEach(a => {
    if (!ids.has(a.id)) return;
    a.archived = true;
    a.archivedAt = now;
    touchActionable(a);
    markActionDirty(a.id);
  });
  saveState(); renderAll();
}
function unarchiveActionable(projId, itemId) {
  const p = findProject(projId); if (!p) return;
  const target = findActionable(p, itemId);
  if (!target) return;
  const ids = new Set(getDescendants(p, target).map(d => d.id));
  ids.add(itemId);
  p.actionables.forEach(a => {
    if (!ids.has(a.id)) return;
    a.archived = false;
    a.archivedAt = null;
    touchActionable(a);
    markActionDirty(a.id);

  saveState(); renderAll();
}
function removeActionable(projId, itemId) {
  const p = findProject(projId); if (!p) return;
  const target = findActionable(p, itemId);
  if (!target) return;
  // Remove the item plus all descendants
  const descIds = new Set(getDescendants(p, target).map(d => d.id));
  descIds.add(itemId);
  p.actionables = p.actionables.filter(a => !descIds.has(a.id));
  descIds.forEach(id => markActionDeleted(id));
  saveState(); renderAll();
}
function nestActionable(projId, draggedId, newParentId) {
  // Make draggedId a child of newParentId (or top-level if null).
  // Validates: no cycle, respects MAX_DEPTH.
  const p = findProject(projId); if (!p) return false;
  const dragged = findActionable(p, draggedId); if (!dragged) return false;
  if (newParentId === draggedId) return false;
  if (newParentId && isAncestorOf(p, draggedId, newParentId)) return false; // cycle
  const parent = newParentId ? findActionable(p, newParentId) : null;
  if (newParentId && !parent) return false;
  // Depth check: new depth of dragged + its own subtree depth must fit
  const parentDepth = parent ? getDepth(p, parent) : -1;
  const newDepth = parentDepth + 1;
  const sub = getSubtreeDepth(p, dragged);
  if (newDepth + sub > MAX_DEPTH) return false;
  dragged.parentId = newParentId || null;
  touchActionable(dragged);
  markActionDirty(draggedId);
  saveState();
  return true;
}
function setActionableStatus(projId, itemId, status) {
  const p = findProject(projId); if (!p) return;
  const a = findActionable(p, itemId); if (!a) return;
  const prevStatus = a.status;
  a.status = STATUSES.includes(status) ? status : null;
  if (a.status === "stuck" && prevStatus !== "stuck") a.stuckSince = new Date().toISOString();
  if (a.status !== "stuck") a.stuckSince = null;
  if (a.status !== "stuck") a.blocker = "";
  if (a.status !== "waiting") a.waitingFor = "";
  touchActionable(a);
  markActionDirty(itemId);
  saveState(); renderAll();
}
function cyclePriority(projId, itemId) {
  const p = findProject(projId); if (!p) return;
  const a = findActionable(p, itemId); if (!a) return;

// Unified drop: place dragged relative to target with one of three modes.
//   "above" → become a sibling of target, inserted just before it
//   "below" → become a sibling of target, inserted just after it
//   "nest"  → become a child of target (depth permitting)
// Returns true on success. Rejects cycles and over-depth nesting.
function dropActionable(projId, draggedId, targetId, mode) {
  const p = findProject(projId); if (!p) return false;
  if (draggedId === targetId) return false;
  const dragged = findActionable(p, draggedId); if (!dragged) return false;
  const target  = findActionable(p, targetId);  if (!target)  return false;
  // No cycles: target must not be inside dragged's subtree
  if (isAncestorOf(p, draggedId, targetId)) return false;

  let newParentId;
  if (mode === "nest") newParentId = target.id;
  else                 newParentId = target.parentId || null;

  // Depth check (root depth = 0, max visible depth = MAX_DEPTH)
  const newParent = newParentId ? findActionable(p, newParentId) : null;
  const parentDepth = newParent ? getDepth(p, newParent) : -1;
  const newDepth = parentDepth + 1;
  const subDepth = getSubtreeDepth(p, dragged);
  if (newDepth + subDepth > MAX_DEPTH) return false;

  // Splice dragged out (descendants stay in-place — they reference dragged by id)
  const draggedIdx = p.actionables.findIndex(a => a.id === draggedId);
  if (draggedIdx === -1) return false;
  p.actionables.splice(draggedIdx, 1);

  // Recompute target index after removal
  const targetIdx = p.actionables.findIndex(a => a.id === targetId);
  let insertAt;
  if (mode === "above")      insertAt = targetIdx;
  else if (mode === "below") insertAt = targetIdx + 1;
  else /* nest */            insertAt = targetIdx + 1;
  if (targetIdx === -1) insertAt = p.actionables.length;

  dragged.parentId = newParentId;
  touchActionable(dragged);
  p.actionables.splice(insertAt, 0, dragged);

  markProjectActionsDirty(projId);
  saveState(); renderAll();
  return true;
}

// Kept for back-compat with any caller (now equivalent to drop-above).
function reorderActionables(projId, draggedId, targetId) {
  dropActionable(projId, draggedId, targetId, "above");
}

function validViews() {
  const set = new Set(["journal", "home", "archive"]);
  if (state.labels.length === 0) set.add("all");
  state.labels.forEach(l => set.add(l.id));
  if (state.projects.some(p => !p.labelId)) set.add("uncategorized");
  return set;
}
function setView(view) {
  if (view === "today") view = "home"; // legacy alias
  const valid = validViews();
  if (!valid.has(view)) view = "home";
  const prevView = currentView;
  currentView = view;
  window.localStorage.setItem("view", view);
  markPrefsDirty();
  // Smart default when entering the journal: review if all answered today,
  // otherwise jump straight to the first empty question.
  if (view === 'journal' && prevView !== 'journal') initJournalView();
  document.getElementById('journal-view').style.display  = view === 'journal' ? 'block' : 'none';
  document.getElementById('home-view').style.display     = view === 'home'    ? 'block' : 'none';
  document.getElementById('archive-view').style.display  = view === 'archive' ? 'block' : 'none';

// ─── Board sharing ────────────────────────────────────
// Members per board are fetched lazily when the user opens an edit popover.
// Cached in-memory only — re-fetched each session.
const boardMembersCache = {};   // boardId → [{ user_id, role, email, display_name }]
const boardShareError   = {};   // boardId → string (last share error, cleared on success)

async function loadBoardMembers(boardId) {
  if (!sb || !currentUser) return [];
  const memRes = await sb.from('tab_members')
    .select('user_id, role')
    .eq('tab_id', boardId);
  if (memRes.error) { console.error('members', memRes.error); return []; }
  const rows = memRes.data || [];
  if (rows.length === 0) return [];
  const ids = rows.map(r => r.user_id);
  const profRes = await sb.from('profiles')
    .select('id, email, display_name')
    .in('id', ids);
  const profs = (profRes && profRes.data) || [];
  return rows.map(m => {
    const p = profs.find(pp => pp.id === m.user_id) || {};
    return {
      user_id: m.user_id,
      role: m.role,
      email: p.email || '',
      display_name: p.display_name || ''
    };
  });
}
async function shareBoardWithUser(boardId, rawEmail) {
  if (!sb || !currentUser) return;
  const email = (rawEmail || "").trim().toLowerCase();
  if (!email) { boardShareError[boardId] = "Enter an email."; return; }
  // Look up the profile by email
  const profRes = await sb.from('profiles')
    .select('id, email')
    .eq('email', email)
    .maybeSingle();
  if (profRes.error) { boardShareError[boardId] = "Lookup failed."; return; }
  const prof = profRes.data;
  if (!prof) { boardShareError[boardId] = "No Slate account with that email."; return; }
  if (prof.id === currentUser.id) { boardShareError[boardId] = "That's you."; return; }
  // Insert into tab_members
  const ins = await sb.from('tab_members').insert({
    tab_id: boardId,
    user_id: prof.id,
    role: 'editor'
  });
  if (ins.error) {
    boardShareError[boardId] = ins.error.code === '23505'
      ? "Already shared."
      : (ins.error.message || "Could not share.");
    return;
  }
  boardShareError[boardId] = "";
  boardMembersCache[boardId] = await loadBoardMembers(boardId);
}
async function removeBoardMember(boardId, userId) {
  if (!sb || !currentUser) return;
  const del = await sb.from('tab_members').delete()
    .eq('tab_id', boardId)
    .eq('user_id', userId);
  if (del.error) console.error('remove member', del.error);
  boardMembersCache[boardId] = await loadBoardMembers(boardId);
}

function renderTabEditPopover(l) {
  const swatches = COLOR_PALETTE.map(c =>
    '<div class="color-swatch ' + (l.color === c.hex ? "selected" : "") + '" ' +

      'style="background:' + c.hex + ';" title="' + c.name + '"></div>'
  ).join("");

    : members.map(m =>
        '<div class="share-member">' +

  return '<div class="tab-edit-popover" data-label-id="' + l.id + '">' +
    '<input type="text" class="name" placeholder="Board name" value="' + escapeAttr(l.name) + '">' +
    '<div class="swatches">' + swatches + '</div>' +
    '<div class="share-section">' +
      '<div class="share-title">Share</div>' +
      '<div class="share-row">' +
        '<input type="email" class="share-email-input" placeholder="email@example.com" ' +
          'data-board-id="' + l.id + '">' +
        '<button class="share-add" data-action="add-member" data-board-id="' + l.id + '">Add</button>' +
      '</div>' +
      errHtml +
      '<div class="share-members">' + membersHtml + '</div>' +
    '</div>' +
    '<button class="delete-btn" data-action="delete-tab" data-label-id="' + l.id + '">Delete board</button>' +
  '</div>';
}

    '<button class="sidebar-tab home-tab' + (currentView === "home" ? " active" : "") + '" data-view="home">' +
      '<span class="name">Home</span>' +
      '<span class="pill">' + homeOpen + '</span>' +
    '</button>' +
  '</div>';

  if (state.labels.length === 0 && state.projects.length > 0) {
    html += '<div class="sidebar-tab-wrap">' +
      '<button class="sidebar-tab' + (currentView === "all" ? " active" : "") + '" data-view="all">' +
        '<span class="dot" style="background:var(--text-4);"></span>' +
        '<span class="name">Projects</span>' +
        '<span class="pill">' + state.projects.length + '</span>' +
      '</button>' +
    '</div>';
  } else {
    state.labels.forEach(l => {
      const count = state.projects.filter(p => p.labelId === l.id).length;
      const isActive = currentView === l.id;
      const popover = activeTabEditor === l.id ? renderTabEditPopover(l) : '';
      html += '<div class="sidebar-tab-wrap">' +
        '<button class="sidebar-tab' + (isActive ? " active" : "") + '" data-view="' + l.id + '">' +
          '<span class="dot" style="background:' + l.color + ';"></span>' +
          '<span class="name">' + escapeAttr(l.name || "Unnamed") + '</span>' +
          '<span class="pill">' + count + '</span>' +
          '<span class="edit-icon" data-tab-edit="' + l.id + '" title="Edit board">⋮</span>' +
        '</button>' +
        popover +
      '</div>';
    });
    const uncategorized = state.projects.filter(p => !p.labelId).length;
    if (uncategorized > 0) {
      html += '<div class="sidebar-tab-wrap">' +
        '<button class="sidebar-tab' + (currentView === "uncategorized" ? " active" : "") + '" data-view="uncategorized">' +
          '<span class="dot" style="background:var(--text-4);"></span>' +
          '<span class="name">Uncategorized</span>' +
          '<span class="pill">' + uncategorized + '</span>' +
        '</button>' +
      '</div>';
    }
  }

  // "+ New tab" button
  html += '<button class="sidebar-add" id="tab-add" title="New board">' +
    '<span class="dot"></span>' +
    '<span class="name">New board</span>' +
  '</button>';

  // Archive — sits at the bottom of the tab list, with a divider above
  const archivedCount = state.projects.reduce((n, p) =>
    n + p.actionables.filter(a => a.archived).length, 0);
  html += '<div class="sidebar-divider" style="margin-top:14px"></div>';
  html += '<div class="sidebar-tab-wrap">' +
    '<button class="sidebar-tab archive-tab' + (currentView === "archive" ? " active" : "") + '" data-view="archive">' +
      '<svg class="archive-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
        'stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<rect x="3" y="4" width="18" height="6" rx="1"/>' +
        '<path d="M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/>' +
        '<line x1="10" y1="14" x2="14" y2="14"/>' +
      '</svg>' +
      '<span class="name">Archive</span>' +
      (archivedCount ? '<span class="pill">' + archivedCount + '</span>' : '') +
    '</button>' +
  '</div>';

  tabsEl.innerHTML = html;
  wireTabs();
}

function wireTabs() {
  const tabsEl = document.getElementById("tabs");

  // Tab click → switch view (but not if clicking the edit icon)
  tabsEl.querySelectorAll('.sidebar-tab').forEach(t => {
    const view = t.dataset.view;
    const isLabel = !["home", "all", "uncategorized", "journal", "archive"].includes(view);

    t.addEventListener('click', (e) => {
      if (e.target.closest('[data-tab-edit]')) return;
      setView(view);
    });

    // Label tabs are themselves draggable (for reordering)
    if (isLabel) {
      t.draggable = true;
      t.addEventListener('dragstart', (e) => {
        e.stopPropagation();
        t.classList.add('dragging');
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("application/x-label", view);
      });
      t.addEventListener('dragend', () => {
        t.classList.remove('dragging');
        document.querySelectorAll('.sidebar-tab.drag-target').forEach(el => el.classList.remove('drag-target'));
      });
    }

    // Accept drops: projects (move project to tab) and labels (reorder tabs)
    t.addEventListener('dragover', (e) => {
      const types = Array.from(e.dataTransfer.types);
      if (types.includes("application/x-label")) {
        if (!isLabel) return; // can't drop a label onto Home / Uncategorized / All
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        t.classList.add('drag-target');
        return;
      }
      if (types.includes("application/x-project")) {
        if (view === "home") return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        t.classList.add('drag-target');
      }
    });
    t.addEventListener('dragleave', () => t.classList.remove('drag-target'));
    t.addEventListener('drop', (e) => {
      e.preventDefault();
      t.classList.remove('drag-target');
      const labelId = e.dataTransfer.getData("application/x-label");
      const projId = e.dataTransfer.getData("application/x-project");
      if (labelId) {
        if (!isLabel || labelId === view) return;
        reorderLabels(labelId, view);
        return;
      }
      if (projId) {
        if (view === "home") return;
        let newLabelId = null;
        if (view !== "uncategorized" && view !== "all") newLabelId = view;
        const p = findProject(projId);
        if (!p || p.labelId === newLabelId) return;
        p.labelId = newLabelId;
        markProjectDirty(projId);
        saveState();
        renderAll();
      }
    });
  });

  // Edit icon click → open editor popover (fetches members async)
  tabsEl.querySelectorAll('[data-tab-edit]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.tabEdit;
      activeTabEditor = activeTabEditor === id ? null : id;
      // Clear any stale share error from a previous editor session
      if (activeTabEditor) boardShareError[id] = "";
      renderTabs();
      if (activeTabEditor) {
        setTimeout(() => {
          const inp = document.querySelector('.tab-edit-popover input.name');
          if (inp) { inp.focus(); inp.select(); }
        }, 0);
        // Lazily fetch members and re-render the popover when they arrive
        loadBoardMembers(id).then(members => {
          boardMembersCache[id] = members;
          if (activeTabEditor === id) renderTabs();
        });
      }
    });
  });

  // "+" new tab
  const addBtn = document.getElementById('tab-add');
  if (addBtn) {
    addBtn.addEventListener('click', () => {
      const used = state.labels.map(l => l.color);
      const next = COLOR_PALETTE.find(c => !used.includes(c.hex)) || COLOR_PALETTE[0];
      const newLabel = { id: uid(), name: "", color: next.hex };
      state.labels.push(newLabel);
      currentView = newLabel.id;
      window.localStorage.setItem("view", currentView);
      activeTabEditor = newLabel.id;
      markTabDirty(newLabel.id);
      markPrefsDirty();
      saveState();
      renderAll();
      setTimeout(() => {
        const inp = document.querySelector('.tab-edit-popover input.name');
        if (inp) inp.focus();
      }, 0);
    });
  }

  // Popover inputs
  tabsEl.querySelectorAll('.tab-edit-popover input.name').forEach(inp => {
    inp.addEventListener('click', (e) => e.stopPropagation());
    inp.addEventListener('input', () => {
      const id = inp.closest('.tab-edit-popover').dataset.labelId;
      const l = findLabel(id); if (!l) return;
      l.name = inp.value;
      saveState();
      // Update tab name live without re-rendering the popover (keeps focus)
      const tabBtn = tabsEl.querySelector('.tab[data-view="' + id + '"] .tab-name');
      if (tabBtn) tabBtn.textContent = inp.value || "Unnamed";
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === 'Escape') {
        activeTabEditor = null;
        renderTabs();
      }
    });
  });
  tabsEl.querySelectorAll('.tab-edit-popover .color-swatch').forEach(sw => {
    sw.addEventListener('click', (e) => {
      e.stopPropagation();
      updateLabel(sw.dataset.labelId, "color", sw.dataset.color);
    });
  });
  tabsEl.querySelectorAll('.tab-edit-popover [data-action="delete-tab"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm("Delete this board? Projects in it will become Uncategorized.")) return;
      const id = btn.dataset.labelId;
      state.labels = state.labels.filter(l => l.id !== id);
      state.projects.forEach(p => {
        if (p.labelId === id) { p.labelId = null; markProjectDirty(p.id); }
      });
      markTabDeleted(id);
      if (currentView === id) { currentView = "home"; markPrefsDirty(); }
      if (state.filters && state.filters[id]) delete state.filters[id];
      activeTabEditor = null;
      saveState();
      renderAll();
    });
  });

  // Share inputs — Enter or Add button → share with that email
  tabsEl.querySelectorAll('.tab-edit-popover .share-email-input').forEach(inp => {
    inp.addEventListener('click', (e) => e.stopPropagation());
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const id = inp.dataset.boardId;
        const email = inp.value;
        inp.disabled = true;
        shareBoardWithUser(id, email).then(() => {
          if (!boardShareError[id]) inp.value = "";
          if (activeTabEditor === id) renderTabs();
        });
      }
    });
  });
  tabsEl.querySelectorAll('.tab-edit-popover [data-action="add-member"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.boardId;
      const inp = document.querySelector('.tab-edit-popover .share-email-input[data-board-id="' + id + '"]');
      if (!inp) return;
      const email = inp.value;
      inp.disabled = true;
      shareBoardWithUser(id, email).then(() => {
        if (!boardShareError[id]) inp.value = "";
        if (activeTabEditor === id) renderTabs();
      });
    });
  });
  tabsEl.querySelectorAll('.tab-edit-popover [data-action="remove-member"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.boardId;
      const uid2 = btn.dataset.userId;
      removeBoardMember(id, uid2).then(() => {
        if (activeTabEditor === id) renderTabs();
      });
    });
  });
}

// ─── Deep Work session ────────────────────────────────
// Click "Start deep work" to begin a 75-minute focus timer. While active,
// the wind-down card is replaced with a focus countdown. On completion,
// a gentle Web Audio chime plays.
let _slateAudioCtx = null;
function unlockAudioCtx() {
  // Must run inside a user gesture for browsers to allow playback.
  if (!_slateAudioCtx) {
    try {
      _slateAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { return null; }
  }
  if (_slateAudioCtx.state === "suspended") {
    try { _slateAudioCtx.resume(); } catch (e) {}
  }
  return _slateAudioCtx;
}
function playPeacefulChime() {
  const ctx = _slateAudioCtx || (function () {
    try { return new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  })();
  if (!ctx) return;
  if (ctx.state === "suspended") { try { ctx.resume(); } catch (e) {} }
  const start = ctx.currentTime + 0.05;
  // Three spaced bell strikes — fundamental + perfect fifth + octave
  const tones = [
    { freq: 528,  gain: 0.30, decay: 5.0 },
    { freq: 792,  gain: 0.16, decay: 4.0 },
    { freq: 1056, gain: 0.10, decay: 3.5 }
  ];
  for (let strike = 0; strike < 3; strike++) {
    const t0 = start + strike * 1.7;
    tones.forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = t.freq;
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(t.gain, t0 + 0.06);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + t.decay);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + t.decay + 0.1);
    });
  }
}
function deepWorkRemainingMs() {
  if (!state.deepWork || !state.deepWork.active || !state.deepWork.startedAt) return 0;
  return state.deepWork.durationMs - (Date.now() - state.deepWork.startedAt);
}
// Header cluster: Start/End deep work button + today's 3 session circles.
// Lives in the page header so it persists across tabs.
function renderHeaderDeep() {
  const wrap = document.getElementById("header-deep");
  if (!wrap) return;
  const dwActive = !!(state.deepWork && state.deepWork.active);
  const today = todayDateString();
  const completedToday = (state.deepWork.completedDate === today)
    ? (state.deepWork.completedToday || 0) : 0;
  let circles = '<div class="deep-circles" title="' + completedToday + ' of 3 sessions today">';
  for (let i = 0; i < 3; i++) {
    circles += '<span class="dc' + (i < completedToday ? " filled" : "") + '"></span>';
  }
  circles += '</div>';
  const deepBtn = '<button class="btn accent' + (dwActive ? " ending" : "") + '" id="deep-toggle-btn" ' +
    'title="' + (dwActive ? "End the focus session" : "Start a 75-minute focus session") + '">' +
    (dwActive ? "End deep work" : "Start deep work") +
  '</button>';
  wrap.innerHTML = circles + deepBtn;

  const tgl = document.getElementById("deep-toggle-btn");
  if (tgl) {
    tgl.addEventListener("click", (e) => {
      e.stopPropagation();
      if (state.deepWork && state.deepWork.active) {
        endDeepWork({ playChime: false });
      } else {
        startDeepWork();
      }
    });
  }
}

function startDeepWork() {
  unlockAudioCtx(); // user gesture — primes audio for the future chime
  const mins = (state.layout && state.layout.deepWorkMin) || 75;
  state.deepWork = {
    active: true,
    startedAt: Date.now(),
    durationMs: mins * 60 * 1000
  };
  saveState();
  renderWindDown();
  renderFilterBar();
}
function endDeepWork(opts) {
  const playChime = opts && opts.playChime;
  // Carry the daily counter across the reset (and reset it at date rollover)
  const today = todayDateString();
  let completedToday = (state.deepWork.completedDate === today)
    ? (state.deepWork.completedToday || 0) : 0;
  // Only a natural completion (chime) counts as a finished session
  if (playChime) completedToday = Math.min(3, completedToday + 1);
  state.deepWork = {
    active: false,
    startedAt: null,
    durationMs: 75 * 60 * 1000,
    completedToday,
    completedDate: today
  };
  saveState();
  if (playChime) playPeacefulChime();
  renderWindDown();
  renderFilterBar();
}

// ─── Wind-down countdown ──────────────────────────────
// Counts down to a user-set time (default 8pm local). When it hits zero,
// every open "today"-status task has its status cleared so the next day
// starts blank. State is per-user and syncs through user_prefs.
let activeWindDownEditor = false;

function getWindDownTargetToday() {
  const t = new Date();
  t.setHours(state.windDown.hour, state.windDown.minute, 0, 0);
  return t;
}
function getDayStartToday() {
  const t = new Date();
  t.setHours(state.windDown.startHour || 0, state.windDown.startMinute || 0, 0, 0);
  return t;
}
// 0–1 fraction of the day elapsed between the start time and wind-down time.
function dayProgressRatio() {
  const start = getDayStartToday().getTime();
  const end   = getWindDownTargetToday().getTime();
  if (end <= start) return 0;
  const r = (Date.now() - start) / (end - start);
  return Math.max(0, Math.min(1, r));
}
// Phase machine for the wind-down card:
//   "before" — before today's start, never triggered → 0h 00m 00s
//   "active" — inside today's start→end window → counting down
//   "earned" — wound down (auto or manual). Persists across midnight until
//              the next day's start time.
function windDownPhase() {
  const now = Date.now();
  const startToday = getDayStartToday().getTime();
  const endToday   = getWindDownTargetToday().getTime();
  const today = todayDateString();
  const y = new Date(Date.now() - 86400000);
  const yesterday = y.getFullYear() + "-" +
    String(y.getMonth() + 1).padStart(2, "0") + "-" +
    String(y.getDate()).padStart(2, "0");
  if (state.windDown.lastTriggeredDate === today) return "earned";
  if (now >= endToday) return "earned";
  if (now < startToday && state.windDown.lastTriggeredDate === yesterday) return "earned";
  if (now >= startToday && now < endToday) return "active";
  return "before";
}

// Reusable circular progress SVG (used by dashboard + wind-down)
function buildProgressCircle(opts) {
  const size  = opts.size  || 72;
  const pct   = Math.max(0, Math.min(1, opts.pct || 0));
  const color = opts.color || 'var(--good)';
  const label = opts.label != null ? opts.label : "";
  const sub   = opts.sub   != null ? opts.sub   : "";
  const r = 16;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - pct);
  const labelSize = opts.labelSize || 9;
  const subSize   = opts.subSize   || 5;
  const labelY = sub ? 17 : 20;
  const subY   = 24;
  return '<svg class="progress-circle" viewBox="0 0 36 36" ' +
    'style="width:' + size + 'px;height:' + size + 'px;">' +
    '<circle class="pc-bg" cx="18" cy="18" r="' + r + '" fill="none" stroke-width="3"/>' +
    '<circle class="pc-fg" cx="18" cy="18" r="' + r + '" fill="none" stroke-width="3" ' +
      'stroke="' + color + '" ' +
      'stroke-dasharray="' + c.toFixed(2) + '" stroke-dashoffset="' + offset.toFixed(2) + '" ' +
      'transform="rotate(-90 18 18)"/>' +
    (label ? '<text class="pc-label" x="18" y="' + labelY + '" text-anchor="middle" ' +
              'style="font-size:' + labelSize + 'px">' + label + '</text>' : '') +
    (sub   ? '<text class="pc-sub" x="18" y="' + subY + '" text-anchor="middle" ' +
              'style="font-size:' + subSize + 'px">' + sub + '</text>' : '') +
  '</svg>';
}
function formatCountdown(ms) {
  if (ms <= 0) return "0h 00m 00s";
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  // Always include seconds so the user sees the timer breathing.
  if (h > 0) return h + "h " + String(m).padStart(2, "0") + "m " + String(s).padStart(2, "0") + "s";
  if (m > 0) return m + "m " + String(s).padStart(2, "0") + "s";
  return s + "s";
}
function formatTargetLabel() {
  const h = state.windDown.hour;
  const m = state.windDown.minute;
  const ampm = h >= 12 ? "pm" : "am";
  const hh = ((h + 11) % 12) + 1;
  return hh + (m ? ":" + String(m).padStart(2, "0") : "") + ampm;
}
function formatStartLabel() {
  const h = state.windDown.startHour;
  const m = state.windDown.startMinute;
  const ampm = h >= 12 ? "pm" : "am";
  const hh = ((h + 11) % 12) + 1;
  return hh + (m ? ":" + String(m).padStart(2, "0") : "") + ampm;
}

function renderWindDown() {
  const wrap = document.getElementById("wind-down-wrap");
  if (!wrap) return;

  // ── Deep Work mode overrides the wind-down card ──
  if (state.deepWork && state.deepWork.active) {
    const remaining = deepWorkRemainingMs();
    if (remaining <= 0) {
      endDeepWork({ playChime: true });
      return;
    }
    const dwElapsed = state.deepWork.durationMs - remaining;
    const dwRatio = dwElapsed / state.deepWork.durationMs;
    const dwCircle = buildProgressCircle({
      size: 76, pct: dwRatio, color: 'var(--waiting)',
      label: Math.round(dwRatio * 100) + "%", sub: "focus",
      labelSize: 9, subSize: 4.5
    });
    wrap.innerHTML =
      '<div class="wind-down deep" id="wind-down-btn">' +
        '<div class="wd-circle">' + dwCircle + '</div>' +
        '<div class="wd-text">' +
          '<div class="wd-label">Deep Work</div>' +
          '<div class="wd-target">' + Math.round(state.deepWork.durationMs / 60000) + '-minute focus · gentle chime when done</div>' +
          '<div class="wd-time">' + formatCountdown(remaining) + '</div>' +
        '</div>' +
      '</div>';
    wireWindDown();
    return;
  }

  const phase = windDownPhase();

  // Earned state — full-bleed message, no circle, one line, centered
  if (phase === "earned") {
    wrap.innerHTML =
      '<div class="wind-down earned" id="wind-down-btn">' +
        '<div class="wd-earned-headline">Wind down, you earned it</div>' +
      '</div>';
    wireWindDown();
    return;
  }

  // Day-progress ratio drives the orange ring on the wind-down card
  const dayRatio = dayProgressRatio();
  const ringColor = dayRatio >= 0.85 ? 'var(--bad)' : 'var(--accent)';
  const dayCircle = buildProgressCircle({
    size: 76, pct: dayRatio, color: ringColor,
    label: Math.round(dayRatio * 100) + "%", sub: "of day",
    labelSize: 9, subSize: 4.5
  });

  // Only count down while we're inside the start→end window. Otherwise
  // the timer displays 0h 00m 00s and re-arms at the next start.
  const startMs = getDayStartToday().getTime();
  const target  = getWindDownTargetToday();
  const targetMs = target.getTime();
  const now = Date.now();
  let ms;
  if (now < startMs || now >= targetMs) ms = 0;
  else                                   ms = targetMs - now;
  const urgent = ms > 0 && ms < 30 * 60 * 1000; // last 30 min
  wrap.innerHTML =
    '<div class="wind-down' + (urgent ? " urgent" : "") + '" id="wind-down-btn">' +
      '<div class="wd-circle">' + dayCircle + '</div>' +
      '<div class="wd-text">' +
        '<div class="wd-label">Time Until Wind-Down</div>' +
        '<div class="wd-target">' + formatStartLabel() + ' → ' + formatTargetLabel() + '</div>' +
        '<div class="wd-time">' + formatCountdown(ms) + '</div>' +
      '</div>' +
    '</div>';
  wireWindDown();
}

// Modal-style settings popover, mounted in a global wrap and toggled
// by the "Wind-down settings" button in the sidebar footer.
function renderWindDownModal() {
  const wrap = document.getElementById("wd-modal-wrap");
  if (!wrap) return;
  if (!activeWindDownEditor) { wrap.innerHTML = ""; return; }
  const inEarned = windDownPhase() === "earned";
  const theme = (state.layout && state.layout.theme) || "cool";
  const undoHtml = inEarned
    ? '<button class="wd-undo-btn" id="wd-undo-btn" title="Undo today\'s wind-down — resume the day">Undo today\'s wind-down</button>'
    : '';
  wrap.innerHTML =
    '<div class="wind-down-popover-backdrop" id="wd-modal-backdrop">' +
      '<div class="wind-down-popover" id="wind-down-popover">' +
        '<button class="wd-modal-close" id="wd-modal-close">×</button>' +
        '<div class="wd-modal-title">Settings</div>' +

        '<div class="settings-section">' +
          '<div class="wd-title">Appearance</div>' +
          '<div class="theme-toggle">' +
            '<button class="theme-opt' + (theme === "cool" ? " active" : "") + '" data-theme="cool">Cool</button>' +
            '<button class="theme-opt' + (theme === "light" ? " active" : "") + '" data-theme="light">Light</button>' +
            '<button class="theme-opt' + (theme === "professional" ? " active" : "") + '" data-theme="professional">Professional</button>' +
          '</div>' +
        '</div>' +

        '<div class="settings-section">' +
          '<div class="wd-title">Deep work duration</div>' +
          '<div class="wd-duration-row">' +
            '<input type="number" min="1" max="240" class="wd-time-input wd-duration-input" id="wd-deep-min" ' +
              'value="' + ((state.layout && state.layout.deepWorkMin) || 75) + '">' +
            '<span class="wd-duration-unit">minutes</span>' +
          '</div>' +
        '</div>' +
        '<div class="settings-section">' +
          '<div class="wd-title">Day starts</div>' +
          '<input type="time" class="wd-time-input" id="wd-start-input" ' +
            'value="' + String(state.windDown.startHour).padStart(2, "0") + ":" +
                        String(state.windDown.startMinute).padStart(2, "0") + '">' +
          '<div class="wd-title" style="margin-top:14px">Wind-down time</div>' +
          '<input type="time" class="wd-time-input" id="wd-time-input" ' +
            'value="' + String(state.windDown.hour).padStart(2, "0") + ":" +
                        String(state.windDown.minute).padStart(2, "0") + '">' +
          '<div class="wd-hint">When the countdown hits zero, every open <strong>Today</strong> task has its status cleared so tomorrow starts blank.</div>' +
          '<button class="wd-trigger" id="wd-trigger-now">Wind down now</button>' +
          undoHtml +
        '</div>' +
      '</div>' +
    '</div>';
  wireWindDown();
  // Backdrop click closes (but clicks inside the popover do not propagate)
  const backdrop = document.getElementById("wd-modal-backdrop");
  if (backdrop) {
    backdrop.addEventListener("click", (e) => {
      if (e.target === backdrop) {
        activeWindDownEditor = false;
        renderWindDownModal();
      }

  const closeBtn = document.getElementById("wd-modal-close");
  if (closeBtn) closeBtn.addEventListener("click", () => {

function wireWindDown() {
  // Theme toggle inside the Settings modal — Cool / Warm
  document.querySelectorAll('.theme-opt').forEach(btn => {
    if (btn.dataset.wired) return;
    btn.dataset.wired = "1";
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const target = btn.dataset.theme;
      state.layout = state.layout || {};
      state.layout.theme = target;
      document.body.classList.remove("light-mode", "professional-mode");
      if (target === "light")        document.body.classList.add("light-mode");
      if (target === "professional") document.body.classList.add("professional-mode");
      saveState();
      renderWindDownModal(); // re-render so the active pill updates
    });
  });

  // Undo button on the "earned" card — clears today's trigger so the day
  // resumes. Cleared statuses don't restore (one-way), just the phase flips.
  const undo = document.getElementById("wd-undo-btn");
  if (undo && !undo.dataset.wired) {
    undo.dataset.wired = "1";
    undo.addEventListener("click", (e) => {
      e.stopPropagation();
      state.windDown.lastTriggeredDate = null;
      markPrefsDirty();
      saveState();
      // Dismiss the modal so the user sees the card transition back
      activeWindDownEditor = false;
      renderWindDownModal();
      renderWindDown();
    });
  }

  const startBtn = document.getElementById("deep-start-btn");
  if (startBtn && !startBtn.dataset.wired) {
    startBtn.dataset.wired = "1";
    startBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      startDeepWork();
    });
  }
  const endBtn = document.getElementById("deep-end-btn");
  if (endBtn && !endBtn.dataset.wired) {
    endBtn.dataset.wired = "1";
    endBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (confirm("End this focus session early?")) endDeepWork({ playChime: false });
    });
  }
  const inp = document.getElementById("wd-time-input");
  if (inp && !inp.dataset.wired) {
    inp.dataset.wired = "1";
    inp.addEventListener("change", () => {
      const parts = inp.value.split(":");
      if (parts.length !== 2) return;
      state.windDown.hour   = parseInt(parts[0], 10) || 0;
      state.windDown.minute = parseInt(parts[1], 10) || 0;
      // Adjusting the time on the same day re-arms the trigger
      state.windDown.lastTriggeredDate = null;
      markPrefsDirty();
      saveState();
      renderWindDown();
    });
    inp.addEventListener("click", (e) => e.stopPropagation());
    inp.addEventListener("mousedown", (e) => e.stopPropagation());
  }
  const deepMinInp = document.getElementById("wd-deep-min");
  if (deepMinInp && !deepMinInp.dataset.wired) {
    deepMinInp.dataset.wired = "1";
    deepMinInp.addEventListener("change", () => {
      let v = parseInt(deepMinInp.value, 10);
      if (isNaN(v) || v < 1) v = 75;
      if (v > 240) v = 240;
      state.layout = state.layout || {};
      state.layout.deepWorkMin = v;
      deepMinInp.value = v;
      saveState();
    });
    deepMinInp.addEventListener("click", (e) => e.stopPropagation());
    deepMinInp.addEventListener("mousedown", (e) => e.stopPropagation());
  }
  const startInp = document.getElementById("wd-start-input");
  if (startInp && !startInp.dataset.wired) {
    startInp.dataset.wired = "1";
    startInp.addEventListener("change", () => {
      const parts = startInp.value.split(":");
      if (parts.length !== 2) return;
      state.windDown.startHour   = parseInt(parts[0], 10) || 0;
      state.windDown.startMinute = parseInt(parts[1], 10) || 0;
      markPrefsDirty();
      saveState();
      renderWindDown();
    });
    startInp.addEventListener("click", (e) => e.stopPropagation());
    startInp.addEventListener("mousedown", (e) => e.stopPropagation());
  }
  const trig = document.getElementById("wd-trigger-now");
  if (trig && !trig.dataset.wired) {
    trig.dataset.wired = "1";
    trig.addEventListener("click", (e) => {
      e.stopPropagation();
      state.windDown.lastTriggeredDate = null;
      triggerWindDown(true);
      activeWindDownEditor = false;
      renderWindDownModal();
    });
  }
}

function triggerWindDown(manual) {
  const today = todayDateString();
  if (state.windDown.lastTriggeredDate === today) return;
  let cleared = 0;
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (a.done) return;
      if (a.status !== "today") return;
      a.status = null;
      a.stuckSince = null;
      a.blocker = "";
      a.waitingFor = "";
      touchActionable(a);
      markActionDirty(a.id);
      cleared++;
    });
  });
  state.windDown.lastTriggeredDate = today;
  markPrefsDirty();
  saveState();
  renderAll();
  if (manual) {
    // Tiny in-app acknowledgement so the user knows what happened
    const wrap = document.getElementById("wind-down-wrap");
    if (wrap) wrap.title = "Wound down " + cleared + " task" + (cleared === 1 ? "" : "s");
  }
}

function tickWindDown() {
  // Deep Work mode wins — drive its countdown and fire the chime on zero.
  if (state.deepWork && state.deepWork.active) {
    if (deepWorkRemainingMs() <= 0) {
      endDeepWork({ playChime: true });
      return;
    }
    renderWindDown();
    return;
  }
  if (!state.windDown) return;
  // Trigger check runs every tick regardless of editor state
  const today = todayDateString();
  if (state.windDown.lastTriggeredDate !== today) {
    const target = getWindDownTargetToday();
    if (Date.now() >= target.getTime()) {
      triggerWindDown(false);
      return;
    }
  }
  // Don't redraw while user is editing the popover (would steal focus)
  if (activeWindDownEditor) return;
  renderWindDown();
}

  document.getElementById("header-date").textContent =

// ─── Daily progress dashboard ──────────────────────────
function renderDailyDashboard() {
  let todayTotal = 0, todayDone = 0;
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (a.archived) return;
      if (a.today) {
        todayTotal++;
        if (a.done) todayDone++;
      }
    });
  });
  const ratio = todayTotal === 0 ? 0 : (todayDone / todayTotal);
  const pct   = Math.round(ratio * 100);
  const wrap = document.getElementById("dd-progress-wrap");
  if (!wrap) return;
  wrap.innerHTML = buildProgressCircle({
    size: 76,
    pct: ratio,
    color: 'var(--good)',
    label: todayTotal === 0 ? "—" : pct + "%",
    sub:   todayTotal === 0 ? "today" : todayDone + " / " + todayTotal,
    labelSize: 9,
    subSize: 4.5
  });
}

// ─── Filter bar ────────────────────────────────────────
function buildDropdownHtml(type, labelText, currentValue, options) {
  const isOpen = activeFilterDropdown === type;
  const current = options.find(o => o.value === currentValue) || options[0];
  const isActive = currentValue !== null;

  let menuHtml = "";
  if (isOpen) {
    const opts = options.map(o => {
      const selected = o.value === currentValue;
      let valAttr;
      if (o.value === null) valAttr = "__null__";
      else valAttr = String(o.value);
      return '<div class="option' + (selected ? " selected" : "") + '" ' +
        'data-filter-type="' + type + '" data-filter-value="' + escapeAttr(valAttr) + '">' +
        (o.color ? '<span class="dot" style="background:' + o.color + ';"></span>' : '') +
        '<span>' + escapeAttr(o.label) + '</span>' +
        (selected ? '<span class="check">✓</span>' : '') +
      '</div>';
    }).join("");
    menuHtml = '<div class="filter-dropdown-menu">' + opts + '</div>';
  }

  return '<div class="filter-dropdown">' +
    '<button class="filter-dropdown-btn' + (isActive ? " active" : "") + '" data-filter-dropdown="' + type + '">' +
      (current.color ? '<span class="dot small" style="background:' + current.color + ';"></span>' : '') +
      '<span class="label">' + labelText + ':</span>' +
      '<span class="value">' + escapeAttr(current.label) + '</span>' +
      '<span class="caret">▾</span>' +
    '</button>' +
    menuHtml +
  '</div>';
}

  }

  // Right side of the filter bar: deep-work cluster + New project button
  // New project is the primary (accent) action; deep work is the subtle one.
  const newProjectBtn = '<button class="btn accent" id="new-project-btn" ' +
    'title="Create a new project">+ New project</button>';

  const dwActive = !!(state.deepWork && state.deepWork.active);

  }

    'title="' + (dwActive ? "End the focus session" : "Start a focus session") + '">' +
    (dwActive ? "End deep work" : "Start deep work") +

  const tgl = document.getElementById("deep-toggle-btn");
  if (tgl) {
    tgl.addEventListener("click", (e) => {
      e.stopPropagation();
      if (state.deepWork && state.deepWork.active) endDeepWork({ playChime: false });
      else startDeepWork();
    });
  }

  bar.querySelectorAll('.filter-dropdown-btn').forEach(btn => {

      const type = btn.dataset.filterDropdown;

  if (clearBtn) clearBtn.addEventListener("click", clearFilters);
  const todayToggle = document.getElementById("filter-today-toggle");
  if (todayToggle) todayToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    setFilter("today", !isTodayFilterActive());

}

// ─── Render: Projects view ─────────────────────────────
function renderProjects() {
  const container = document.getElementById("projects-container");
  if (state.projects.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>No projects yet</h2>' +
        '<p>Hit <strong>+ New project</strong> to start.</p>' +
      '</div>';
    return;
  }
  const inView = projectsInCurrentView();
  if (inView.length === 0) {
    const viewName =
      currentView === "all" ? "this view" :
      currentView === "uncategorized" ? "Uncategorized" :
      (findLabel(currentView) || {}).name || "this category";
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>No projects in ' + escapeAttr(viewName) + '</h2>' +
        '<p>Hit <strong>+ New project</strong> to add one here, or drag an existing project onto this tab.</p>' +
      '</div>';
    return;
  }
  const finalProjects = inView.filter(p => {
    if (!isItemFilterActive()) return true;
    return p.actionables.some(a => passesAllItemFilters(a));
  });
  if (finalProjects.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>No projects match the current filters</h2>' +
        '<p>Try clearing filters above, or change your filter selection.</p>' +
      '</div>';
    return;
  }
  container.innerHTML = '<div class="projects">' +
    finalProjects.map(renderProject).join("") +
    '</div>';
  wireProjects();
  attachDragHandlers();
  applySearchFilter();
}

function renderProject(p) {
  const l = findLabel(p.labelId);
  const colorAttrs = l ? 'data-label-color="' + l.color + '" style="--proj-color:' + l.color + ';"' : '';

  const filterActive = isItemFilterActive();
  const cutoff = archiveCutoffMs();
  const active = [];
  const recentDone = [];
  const archived = [];
  p.actionables.forEach(a => {
    if (a.archived) return; // hidden from project view; lives in Archive tab
    if (filterActive && !passesAllItemFilters(a)) return;
    if (!a.done) { active.push(a); return; }
    // Completed today → still inline. Completed before today → into archive footer.
    const doneMs = a.doneAt ? new Date(a.doneAt).getTime() : 0;
    if (doneMs >= cutoff) recentDone.push(a);
    else archived.push(a);
  });
  const showArchived = expandedDone.has(p.id);
  let visible = active.concat(recentDone).concat(showArchived ? archived : []);
  // Pull in ancestors so indented children always show their parent context
  // (without this, a visible child whose parent isn't in `visible` would
  // get orphaned by the tree walker).
  visible = withAncestors(p, visible);

  const flat = buildActionableTree(p, visible);

  const doneFooter = archived.length > 0
    ? '<div class="done-footer ' + (showArchived ? "expanded" : "") + '" data-action="toggle-done-footer">' +
        '<span class="caret">' + (showArchived ? "▼" : "▶") + '</span>' +
        (showArchived ? "Hide" : "Show") + ' ' + archived.length + ' completed' +
      '</div>'
    : "";

  return (
    '<article class="project" data-project-id="' + p.id + '" ' + colorAttrs + '>' +
      '<div class="drag-handle" data-drag-handle>⋮⋮</div>' +
      '<div class="proj-header">' +
        '<button class="delete-btn" data-action="delete-project">Delete</button>' +
        '<div class="proj-name" contenteditable="true" data-placeholder="Project name" spellcheck="false">' +
          escapeAttr(p.name) +
        '</div>' +
        '<div class="proj-meta"><span class="count">' + active.length + ' open</span></div>' +
      '</div>' +
      '<div class="proj-divider" data-proj-divider title="Drag to resize"></div>' +
      '<div class="proj-body">' +
        '<ul class="items actionables-list">' +
          (flat.length === 0
            ? '<li style="border:none; padding:0;"><div class="empty-line">No actionables — add one below</div></li>'
            : flat.map(node => renderActionable(p, node.item, node.depth)).join("")
          ) +
        '</ul>' +
        '<button class="btn add-line" data-action="add-actionable">+ Add actionable</button>' +
        doneFooter +
      '</div>' +
    '</article>'
  );
}

function renderStatusChip(p, a) {
  // A completed actionable always reads DONE (green), regardless of status
  if (a.done) {
    return '<button class="status-chip done-chip" data-action="open-status-picker">' +
      '<span class="dot" style="background:var(--good);"></span>DONE</button>';
  }
  const s = a.status;
  if (!s) {
    return '<button class="status-chip unset" data-action="open-status-picker">Status</button>';
  }
  const meta = STATUS_META[s];
  let label = meta.label;
  if (s === "stuck" && a.stuckSince) {
    const sD = daysSince(a.stuckSince);
    if (sD >= 1) label = "Stuck · " + sD + "d";
  }
  return (
    '<button class="status-chip ' + s + '" data-action="open-status-picker">' +
      '<span class="dot" style="background:' + meta.color + ';"></span>' +
      label +
    '</button>'
  );
}

    '<div class="picker-option" data-action="set-status" data-status="' + s + '">' +
      '<span class="dot" style="background:' + STATUS_META[s].color + ';"></span>' +

  return (
    '<div class="status-picker">' +
      opts +
      (a.status ? '<div class="picker-divider"></div><div class="picker-option clear" data-action="set-status" data-status="">Clear status</div>' : '') +
    '</div>'
  );
}

        '<rect x="3" y="4" width="18" height="6" rx="1"/>' +
        '<path d="M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/>' +
        '<line x1="10" y1="14" x2="14" y2="14"/>' +

  const notesBtn =

      'title="' + (hasNotes ? "Notes" : "Add notes") + '">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<line x1="4" y1="7" x2="20" y2="7"/>' +
        '<line x1="4" y1="12" x2="20" y2="12"/>' +
        '<line x1="4" y1="17" x2="14" y2="17"/>' +
      '</svg>' +
    '</button>';

  const notesPanel = notesOpen
    ? '<div class="notes-panel">' +
        '<textarea data-action="update-notes" placeholder="Notes, context, links…">' +
          escapeAttr(a.notes || "") +
        '</textarea>' +
      '</div>'
    : "";

  const todayCls = a.today ? "" : " not-today";
  return (
    '<li data-item-id="' + a.id + '" data-depth="' + depth + '" class="' + (a.done ? "done" : "") + todayCls + '">' +
      '<div class="item-row">' +
        '<span class="item-drag-handle" data-item-drag-handle>⋮⋮</span>' +
        '<input type="checkbox" data-action="toggle-actionable"' + (a.done ? " checked" : "") + '>' +
        '<input type="text" class="item-text" data-action="update-actionable" ' +
          'placeholder="What needs to be done?" value="' + escapeAttr(a.text) + '">' +
        ageBadge +
        todayBtn +
        '<div class="status-wrap">' +
          renderStatusChip(p, a) +
          renderStatusPicker(p, a) +
        '</div>' +
        gcalBtn +
        notesBtn +
        archiveBtn +
      '</div>' +
      contextRow +
      notesPanel +
    '</li>'
  );
}

// Google Calendar template URL with title + details prefilled.
// We don't pass `dates` so the user picks the time on Google's side.
function gcalUrl(a) {
  const title = (a.text && a.text.trim()) || 'Untitled task';
  const detailParts = [];
  if (a.notes && a.notes.trim()) detailParts.push(a.notes.trim());
  if (a.blocker)    detailParts.push('Blocker: ' + a.blocker);
  if (a.waitingFor) detailParts.push('Waiting for: ' + a.waitingFor);
  detailParts.push('— from Slate');
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: title,
    details: detailParts.join('\n\n')
  });
  return 'https://calendar.google.com/calendar/render?' + params.toString();
}

// ─── Wire project events ───────────────────────────────
function wireProjects() {
  const container = document.getElementById("projects-container");

  container.querySelectorAll('[data-action]').forEach(el => {
    if (el.tagName === "INPUT") return;
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const action = el.dataset.action;
      const proj = el.closest('[data-project-id]');
      const projId = proj && proj.dataset.projectId;
      const item = el.closest('[data-item-id]');
      const itemId = item && item.dataset.itemId;

      if (action === "delete-project")          deleteProject(projId);
      else if (action === "add-actionable")     addActionable(projId);
      else if (action === "remove-actionable")  removeActionable(projId, itemId);
      else if (action === "archive-actionable") archiveActionable(projId, itemId);
      else if (action === "unarchive-actionable") unarchiveActionable(projId, itemId);
      else if (action === "toggle-today")       toggleTodayFlag(projId, itemId);
      else if (action === "toggle-done-footer") {
        if (expandedDone.has(projId)) expandedDone.delete(projId);
        else expandedDone.add(projId);
        renderProjects();
      }
      else if (action === "open-status-picker") {
        const key = projId + ":" + itemId;
        activeStatusPicker = activeStatusPicker === key ? null : key;
        renderProjects();
      }
      else if (action === "set-status") {
        const status = el.dataset.status || null;
        setActionableStatus(projId, itemId, status);
        activeStatusPicker = null;
        // setActionableStatus calls renderAll
      }
      else if (action === "toggle-notes") {
        if (expandedNotes.has(itemId)) expandedNotes.delete(itemId);
        else expandedNotes.add(itemId);
        renderProjects();
        // Auto-focus the textarea when newly opened
        if (expandedNotes.has(itemId)) {
          setTimeout(() => {
            const ta = document.querySelector('[data-item-id="' + itemId + '"] textarea[data-action="update-notes"]');
            if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
          }, 0);
        }
      }
      // open-gcal: anchor tag opens the URL natively; nothing to do here.
    });
  });

  container.querySelectorAll('input[type="checkbox"][data-action="toggle-actionable"]').forEach(cb => {
    cb.addEventListener("change", () => {
      const proj = cb.closest('[data-project-id]');
      const item = cb.closest('[data-item-id]');
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "done", cb.checked);
      renderAll();
    });
  });

  container.querySelectorAll('.proj-name[contenteditable]').forEach(el => {
    el.addEventListener("input", () => {
      const proj = el.closest('[data-project-id]');
      updateProjectField(proj.dataset.projectId, "name", el.textContent);
      if (searchTerm) applySearchFilter();
    });
    // Enter blurs instead of inserting newlines (project names are single-line semantically)
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); el.blur(); }
    });
    // Plain-text only on paste — strip rich formatting
    el.addEventListener("paste", (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData("text");
      document.execCommand("insertText", false, text);
    });
  });

  container.querySelectorAll('input.item-text').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const item = inp.closest('[data-item-id]');
      if (!proj || !item) return;
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "text", inp.value);
      if (searchTerm) applySearchFilter();
    });
    inp.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const proj = inp.closest('[data-project-id]');
        if (proj) addActionable(proj.dataset.projectId);
      }
    });
  });

  container.querySelectorAll('input[data-action="update-blocker"]').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const item = inp.closest('[data-item-id]');
      if (!proj || !item) return;
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "blocker", inp.value);
    });
  });

  container.querySelectorAll('input[data-action="update-waiting-for"]').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const item = inp.closest('[data-item-id]');
      if (!proj || !item) return;
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "waitingFor", inp.value);
    });
  });

  container.querySelectorAll('textarea[data-action="update-notes"]').forEach(ta => {
    ta.addEventListener("input", () => {
      const proj = ta.closest('[data-project-id]');
      const item = ta.closest('[data-item-id]');
      if (!proj || !item) return;
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "notes", ta.value);
    });
  });
}

document.addEventListener("click", (e) => {

    activeStatusPicker = null;
    renderProjects();

  if (activeTabEditor && !e.target.closest('.tab-edit-popover') && !e.target.closest('[data-tab-edit]') && !e.target.closest('#tab-add')) {
    activeTabEditor = null;
    renderTabs();
  }
});

// ─── Drag and drop ─────────────────────────────────────
// Resizable split between project name and actionables (global preference).
let _projSplitDrag = null;
function startProjectSplitDrag(e, divider, article) {
  e.preventDefault();
  const rect = article.getBoundingClientRect();
  // Account for the card's left padding so the percent maps to the grid area
  const cs = getComputedStyle(article);
  const padL = parseFloat(cs.paddingLeft)  || 0;
  const padR = parseFloat(cs.paddingRight) || 0;
  _projSplitDrag = {
    divider,
    contentLeft: rect.left + padL,
    contentWidth: rect.width - padL - padR
  };
  divider.classList.add('dragging');
  document.body.classList.add('proj-resizing');
  document.addEventListener('mousemove', onProjectSplitMove);
  document.addEventListener('mouseup', endProjectSplitDrag);
}
function onProjectSplitMove(e) {
  if (!_projSplitDrag) return;
  const x = e.clientX - _projSplitDrag.contentLeft;
  let pct = (x / _projSplitDrag.contentWidth) * 100;
  pct = Math.max(15, Math.min(70, pct));
  document.documentElement.style.setProperty('--proj-split', pct + '%');
  _projSplitDrag.lastPct = pct;
}
function endProjectSplitDrag() {
  if (!_projSplitDrag) return;
  const finalPct = _projSplitDrag.lastPct;
  _projSplitDrag.divider.classList.remove('dragging');
  document.body.classList.remove('proj-resizing');
  document.removeEventListener('mousemove', onProjectSplitMove);
  document.removeEventListener('mouseup', endProjectSplitDrag);
  _projSplitDrag = null;
  if (typeof finalPct === "number") {
    state.layout = state.layout || {};
    state.layout.projectSplit = Math.round(finalPct * 10) / 10;
    saveState();
  }
}

function attachDragHandlers() {
  document.querySelectorAll('.project').forEach(article => {
    // Column-split divider: drag to resize the project-name column globally
    const divider = article.querySelector('[data-proj-divider]');
    if (divider && !divider.dataset.wired) {
      divider.dataset.wired = "1";
      divider.addEventListener("mousedown", (e) => startProjectSplitDrag(e, divider, article));
    }

    const handle = article.querySelector('[data-drag-handle]');
    if (!handle) return;
    handle.addEventListener("mousedown", () => { article.draggable = true; });
    handle.addEventListener("mouseup", () => { article.draggable = false; });
    article.addEventListener("dragstart", (e) => {
      if (!article.draggable) return;
      e.stopPropagation();
      article.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("application/x-project", article.dataset.projectId);
    });
    article.addEventListener("dragend", () => {
      article.classList.remove("dragging");
      article.draggable = false;
      document.querySelectorAll('.project.drag-over').forEach(el => el.classList.remove("drag-over"));
    });
    article.addEventListener("dragover", (e) => {
      if (!Array.from(e.dataTransfer.types).includes("application/x-project")) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (!article.classList.contains("dragging")) article.classList.add("drag-over");
    });
    article.addEventListener("dragleave", () => article.classList.remove("drag-over"));
    article.addEventListener("drop", (e) => {
      const draggedId = e.dataTransfer.getData("application/x-project");
      if (!draggedId) return;
      e.preventDefault();
      article.classList.remove("drag-over");
      const targetId = article.dataset.projectId;
      if (draggedId === targetId) return;
      reorderProjects(draggedId, targetId);
    });

    // ── Actionable rows: drag to reorder OR nest as sub-item ──
    // Three drop zones per row (by mouse Y within the row):
    //   top 30%    → place ABOVE as sibling
    //   middle 40% → NEST as child (depth permitting)
    //   bottom 30% → place BELOW as sibling
    function clearActionableDropMarkers() {
      article.querySelectorAll('.actionables-list > li').forEach(el =>
        el.classList.remove("drag-over-above", "drag-over-below", "drag-over-nest"));
    }
    function dropModeFor(li, e) {
      const rect = li.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const h = rect.height;
      if (y < h * 0.30) return "above";
      if (y > h * 0.70) return "below";
      return "nest";
    }

    article.querySelectorAll('.actionables-list > li').forEach(li => {
      const ah = li.querySelector('[data-item-drag-handle]');
      if (!ah) return;
      ah.addEventListener("mousedown", () => { li.draggable = true; });
      ah.addEventListener("mouseup", () => { li.draggable = false; });
      li.addEventListener("dragstart", (e) => {
        if (!li.draggable) return;
        e.stopPropagation();
        li.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("application/x-actionable", li.dataset.itemId);
        e.dataTransfer.setData("application/x-actionable-proj", article.dataset.projectId);
      });
      li.addEventListener("dragend", () => {
        li.classList.remove("dragging");
        li.draggable = false;
        clearActionableDropMarkers();
      });
      li.addEventListener("dragover", (e) => {
        if (!Array.from(e.dataTransfer.types).includes("application/x-actionable")) return;
        if (li.classList.contains("dragging")) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        const mode = dropModeFor(li, e);
        // Reset siblings, then mark this one with the right zone class
        clearActionableDropMarkers();
        li.classList.add("drag-over-" + mode);
      });
      li.addEventListener("dragleave", (e) => {
        // Only clear if leaving the row itself (not a child element)
        if (!li.contains(e.relatedTarget)) {
          li.classList.remove("drag-over-above", "drag-over-below", "drag-over-nest");
        }
      });
      li.addEventListener("drop", (e) => {
        const draggedId = e.dataTransfer.getData("application/x-actionable");
        const draggedProj = e.dataTransfer.getData("application/x-actionable-proj");
        if (!draggedId) return;
        e.preventDefault();
        const mode = dropModeFor(li, e);
        clearActionableDropMarkers();
        if (draggedProj !== article.dataset.projectId) return;
        if (draggedId === li.dataset.itemId) return;
        dropActionable(article.dataset.projectId, draggedId, li.dataset.itemId, mode);
      });
    });
  });
}

function reorderLabels(draggedId, targetId) {
  const draggedIdx = state.labels.findIndex(l => l.id === draggedId);
  if (draggedIdx === -1) return;
  const dragged = state.labels[draggedIdx];
  state.labels.splice(draggedIdx, 1);
  const newTargetIdx = state.labels.findIndex(l => l.id === targetId);
  if (newTargetIdx === -1) { state.labels.splice(draggedIdx, 0, dragged); return; }
  state.labels.splice(newTargetIdx, 0, dragged);
  markAllTabsDirty();
  saveState();
  renderTabs();
}

function reorderProjects(draggedId, targetId) {
  const draggedIdx = state.projects.findIndex(p => p.id === draggedId);
  if (draggedIdx === -1) return;
  const dragged = state.projects[draggedIdx];
  state.projects.splice(draggedIdx, 1);
  const newTargetIdx = state.projects.findIndex(p => p.id === targetId);
  if (newTargetIdx === -1) { state.projects.splice(draggedIdx, 0, dragged); return; }
  state.projects.splice(newTargetIdx, 0, dragged);
  markAllProjectsDirty();
  saveState(); renderProjects();
}

// ─── Search ────────────────────────────────────────────
function applySearchFilter() {
  const term = searchTerm.trim().toLowerCase();
  document.querySelectorAll('.project').forEach(article => {
    const p = findProject(article.dataset.projectId);
    if (!p) return;
    let projectMatches = !term ||
      (p.name && p.name.toLowerCase().includes(term));
    let anyActionableMatches = false;
    article.querySelectorAll('.actionables-list > li').forEach(li => {
      const item = findActionable(p, li.dataset.itemId);
      if (!item) return;
      const matches = !term ||
        projectMatches ||
        (item.text && item.text.toLowerCase().includes(term)) ||
        (item.blocker && item.blocker.toLowerCase().includes(term)) ||
        (item.waitingFor && item.waitingFor.toLowerCase().includes(term));
      li.classList.toggle("hidden-by-search", !matches);
      if (matches && !projectMatches) anyActionableMatches = true;
    });
    article.classList.toggle("hidden-by-search", !!term && !projectMatches && !anyActionableMatches);
  });
}

document.getElementById("search-input").addEventListener("input", (e) => {
  searchTerm = e.target.value;
  applySearchFilter();
});
document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "k") {
    e.preventDefault();
    // Search lives in the projects pane — jump out of Home if needed
    if (currentView === "home") {
      const target = state.labels.length > 0
        ? state.labels[0].id
        : (state.projects.some(p => !p.labelId) ? "uncategorized" : "all");
      setView(target);
    }
    setTimeout(() => document.getElementById("search-input").focus(), 0);
  }
  if (e.key === "Escape" && document.activeElement === document.getElementById("search-input")) {
    document.getElementById("search-input").value = "";
    searchTerm = "";
    applySearchFilter();
    document.getElementById("search-input").blur();
  }
});

// ─── Tab-aware stats (inline in the filter bar) ───────
// Scope: Home counts every project; a tab counts only its own projects.
// All three metrics respect the active per-view filter (status/priority).
function projectsInStatScope() {
  if (currentView === "home") return state.projects;
  return projectsInCurrentView();
}
// Total = how many actionables the active filter is currently showing
function calcStatsTotal() {
  let n = 0;
  projectsInStatScope().forEach(p => p.actionables.forEach(a => {
    if (a.archived) return;
    if (passesAllItemFilters(a)) n++;
  }));
  return n;
}
function calcStatsCompletedThisWeek() {
  // Calendar week starting Sunday at 00:00 local time
  const sunday = new Date();
  sunday.setHours(0, 0, 0, 0);
  sunday.setDate(sunday.getDate() - sunday.getDay());
  const sundayMs = sunday.getTime();
  let n = 0;
  projectsInStatScope().forEach(p => p.actionables.forEach(a => {
    if (a.archived) return;
    if (!a.done || !a.doneAt) return;
    if (new Date(a.doneAt).getTime() < sundayMs) return;
    if (!passesAllItemFilters(a)) return;
    n++;
  }));
  return n;
}

function renderStatsStrip() {
  const total = calcStatsTotal();
  const done  = calcStatsCompletedThisWeek();
  return '<div class="filter-bar-stats">' +
    '<div class="stat good"><span class="lbl">Completed</span><span class="val">' + done + '</span></div>' +
    '<div class="stat"><span class="lbl">Total</span><span class="val">' + total + '</span></div>' +
  '</div>';
}

// ─── Keystone (One Thing Today) ───────────────────────
function todayDateString() {
  const d = new Date();
  return d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}
function getKeystone() {
  const today = todayDateString();
  // If keystone is from a previous day, surface a blank one for today (but
  // we don't wipe yesterday's text until the user replaces it — they may
  // want to glance back at what their One Thing was).
  if (!state.keystone || state.keystone.date !== today) {
    return { date: today, text: "", done: false, isToday: false,
             previousText: state.keystone && state.keystone.text || "",
             previousDate: state.keystone && state.keystone.date || null };
  }
  return Object.assign({}, state.keystone, { isToday: true });
}
function updateKeystone(field, value) {
  const today = todayDateString();
  if (!state.keystone || state.keystone.date !== today) {
    state.keystone = { date: today, text: "", done: false };
  }
  state.keystone[field] = value;
  if (field === "done") {
    state.keystone.doneAt = value ? new Date().toISOString() : null;
  }
  markPrefsDirty();
  saveState();
}
function renderKeystone() {
  const k = getKeystone();
  const today = new Date();
  const dateLabel = today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  return '<div class="keystone-card">' +
    '<div class="keystone-label">The One Thing</div>' +
    '<div class="keystone-sub">If I do nothing else today — ' + dateLabel + '</div>' +
    '<div class="keystone-row">' +
      '<input type="checkbox" data-action="keystone-done"' + (k.done ? ' checked' : '') + '>' +
      '<input type="text" class="keystone-input' + (k.done ? ' done' : '') + '" ' +
        'data-action="keystone-text" placeholder="One thing that would make today count…" ' +
        'value="' + escapeAttr(k.text) + '">' +
    '</div>' +
  '</div>';
}

// ─── Render: Home view ─────────────────────────────────
// Home shows tasks across ALL tabs, filtered by the Home view's status/priority
// selection (defaults to status="today"). Groups items by their parent project.
function renderHome() {
  const container = document.getElementById("home-list-container");

  const keystoneHtml = renderKeystone();
  const ok = (a) => passesAllItemFilters(a);
  const filters = getCurrentFilters();
  const filterActive = filters.status !== null || filters.today === true || filters.age !== null;

  const groups = [];
  state.projects.forEach(p => {
    // Done tasks stay on Home (shown struck-through) until archived
    let items = p.actionables.filter(a => !a.archived && ok(a));
    if (!items.length) return;
    // Keep ancestor context so indentation makes sense in the Home list
    items = withAncestors(p, items);
    items = items.filter(a => !a.archived);
    const tree = buildActionableTree(p, items);
    groups.push({ project: p, tree });
  });

  if (groups.length === 0) {
    let msg;
    if (filters.today === true && filters.status === null && filters.age === null) {
      msg = '<h2>Nothing on today</h2>' +
            '<p>Open a project tab and tap the <strong>Today</strong> pill on any task to add it here.</p>';
    } else if (filterActive) {
      msg = '<h2>Nothing matches the current filters</h2>' +
            '<p>Try clearing filters above or adjusting the status / priority selection.</p>';
    } else {
      msg = '<h2>No open tasks</h2>' +
            '<p>Add a project and some actionables to get started.</p>';
    }
    container.innerHTML = keystoneHtml + '<div class="empty-state">' + msg + '</div>';
    wireKeystone();
    return;
  }

  container.innerHTML = keystoneHtml + groups.map(g => {
    const items = g.tree.map(n => n.item);
    const openCount = items.filter(i => !i.done).length;
    const l = findLabel(g.project.labelId);
    const labelChip = l ?
      ' <span class="label-chip" style="background:' + l.color + '22; color:' + l.color + '; border-color:' + l.color + '55;">' +
        '<span class="dot" style="background:' + l.color + ';"></span>' + escapeAttr(l.name || "") +
      '</span>'
      : "";
    return (
      '<div class="today-group">' +
        '<h3>' + escapeAttr(g.project.name || "(untitled project)") + labelChip +
          '<span style="color:var(--text-4); font-weight:400; text-transform:none; letter-spacing:0; margin-left:auto;">' +
            openCount + ' / ' + items.length +
          '</span>' +
        '</h3>' +
        '<div class="today-list">' +
          g.tree.map(n => renderHomeItem(g.project, n.item, n.depth)).join("") +
        '</div>' +
      '</div>'
    );
  }).join("");

  wireHomeView();
  wireKeystone();
}

function wireKeystone() {
  const container = document.getElementById("home-list-container");
  const txt = container.querySelector('input[data-action="keystone-text"]');
  const cb  = container.querySelector('input[data-action="keystone-done"]');
  if (txt) {
    txt.addEventListener("input", () => updateKeystone("text", txt.value));
    txt.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); txt.blur(); }
    });
  }
  if (cb) {
    cb.addEventListener("change", () => {
      updateKeystone("done", cb.checked);
      renderHome();
    });
  }
}

function renderHomeItem(p, a, depth) {
  depth = depth || 0;
  // Inline status chip + picker, same as the project view
  const statusChipHtml   = renderStatusChip(p, a);
  const statusPickerHtml = renderStatusPicker(p, a);
  let contextRow = "";
  if (a.status === "stuck") {
    contextRow =
      '<div class="context-row stuck">' +
        '<span class="lbl">Blocker:</span>' +
        '<input type="text" data-action="update-blocker" ' +
