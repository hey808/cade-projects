<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projects</title>
<style>
:root {
  color-scheme: dark;
  --bg: #09090b;
  --card: #18181b;
  --card-hover: #1f1f23;
  --border: #27272a;
  --border-strong: #3f3f46;
  --text: #fafafa;
  --text-2: #a1a1aa;
  --text-3: #71717a;
  --text-4: #52525b;
  --good: #22c55e;
  --warn: #eab308;
  --bad: #ef4444;
  --accent: #f59e0b;
  --waiting: #3b82f6;
  --backburner: #71717a;
  --prio-high: #ef4444;
  --prio-med: #eab308;
  --prio-low: #3b82f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.45;
  padding: 24px 20px 60px;
  max-width: 980px;
  margin: 0 auto;
  font-size: 13px;
}

/* Header */
header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 14px; gap: 12px; flex-wrap: wrap;
}
header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
header .date { font-size: 12px; color: var(--text-3); margin-top: 4px; font-weight: 500; }
.header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* Search */
.search-wrap { position: relative; }
input.search {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px;
  padding: 7px 11px 7px 28px;
  font-size: 12px; font-family: inherit;
  width: 220px;
  transition: border-color 0.15s, width 0.2s;
}
input.search:focus { outline: none; border-color: var(--accent); width: 280px; }
input.search::placeholder { color: var(--text-4); }
.search-wrap::before {
  content: "⌕"; position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--text-4); font-size: 14px; pointer-events: none;
}
.search-wrap kbd {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: var(--border); color: var(--text-3);
  padding: 1px 5px; border-radius: 3px;
  font-size: 9px; font-family: inherit; font-weight: 500;
  pointer-events: none;
}
input.search:focus + kbd { display: none; }

/* Daily progress dashboard */
.daily-dashboard {
  background: linear-gradient(135deg, #1a1611 0%, #0e0c09 100%);
  border: 1px solid rgba(245, 158, 11, 0.20);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 14px;
}
.daily-dashboard .dd-top {
  display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px;
  margin-bottom: 10px;
}
.daily-dashboard .dd-date {
  font-size: 13px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.daily-dashboard .dd-stats {
  font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums;
}
.daily-dashboard .dd-stats strong { color: var(--text); font-weight: 600; }
.dd-progress-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 6px;
}
.dd-progress-bar {
  flex: 1; height: 8px; background: rgba(255,255,255,0.05);
  border-radius: 4px; overflow: hidden;
}
.dd-progress-bar > div {
  height: 100%; background: linear-gradient(90deg, var(--good) 0%, #16a34a 100%);
  transition: width 0.4s ease-out;
}
.dd-progress-label {
  font-size: 12px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.dd-quick {
  font-size: 11px; color: var(--text-3); display: flex; gap: 16px; flex-wrap: wrap;
}
.dd-quick span strong { color: var(--text-2); font-weight: 600; }
.dd-quick .pill-stuck { color: var(--bad); }
.dd-quick .pill-waiting { color: var(--waiting); }
.dd-quick .pill-backburner { color: var(--text-3); }

/* Tabs */
.tabs {
  display: flex; gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.tab {
  background: transparent; border: none; color: var(--text-3);
  padding: 10px 16px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: inline-flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab .pill {
  display: inline-block;
  background: var(--card); color: var(--text-3);
  padding: 1px 7px; border-radius: 8px; font-size: 10px;
  font-variant-numeric: tabular-nums; font-weight: 600;
}
.tab.active .pill { background: var(--accent); color: #0a0a0a; }

/* Buttons */
.btn {
  background: var(--text); color: var(--bg); border: none; border-radius: 6px;
  padding: 8px 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.btn:hover { background: var(--text-2); }
.btn.accent { background: var(--accent); color: #0a0a0a; }
.btn.accent:hover { background: #fbbf24; }
.btn.ghost {
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-2); padding: 5px 10px; font-size: 11px;
}
.btn.ghost:hover { background: var(--card-hover); color: var(--text); }
.btn.add-line {
  background: transparent; border: 1px dashed var(--border-strong); color: var(--text-3);
  padding: 6px 10px; font-size: 11px; width: 100%; text-align: left;
  border-radius: 5px; margin-top: 6px;
}
.btn.add-line:hover { border-color: var(--accent); color: var(--accent); }

/* Labels management panel */
.labels-panel {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 14px;
}
.labels-panel.hidden { display: none; }
.labels-panel h3 {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 10px;
}
.label-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.label-row:last-of-type { border-bottom: none; }
.label-row input.label-name {
  flex: 1; background: transparent; border: none;
  font-size: 13px; color: var(--text); font-family: inherit;
  padding: 4px 0; min-width: 0;
}
.label-row input.label-name:focus { outline: none; }
.label-row input.label-name::placeholder { color: var(--text-4); }
.color-swatches { display: flex; gap: 4px; flex-wrap: wrap; }
.color-swatch {
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--text); }
.label-row .li-rm {
  background: none; border: none; color: var(--text-4); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0 4px;
  opacity: 0; transition: opacity 0.15s;
}
.label-row:hover .li-rm { opacity: 1; }
.label-row .li-rm:hover { color: var(--bad); }

/* Project list */
.projects { display: flex; flex-direction: column; gap: 14px; }

.project {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px 16px 22px;
  position: relative;
  transition: opacity 0.15s;
}
.project:hover { border-color: var(--border-strong); }
.project::before {
  content: ""; position: absolute; left: 0; right: 0; top: -3px;
  height: 2px; background: var(--accent); border-radius: 1px;
  opacity: 0; transition: opacity 0.15s;
}
.project.drag-over::before { opacity: 1; }
.project.dragging { opacity: 0.4; }
.project.hidden-by-search { display: none; }

.project[data-label-color]::after {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--proj-color, transparent);
  border-radius: 12px 0 0 12px;
}

.drag-handle {
  position: absolute; left: 4px; top: 16px;
  width: 14px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  cursor: grab; opacity: 0;
  color: var(--text-4); font-size: 12px; line-height: 1;
  user-select: none; transition: opacity 0.15s;
}
.project:hover .drag-handle { opacity: 1; }
.drag-handle:hover { color: var(--text-2); }
.drag-handle:active { cursor: grabbing; }

.project .delete-btn {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: var(--text-4);
  cursor: pointer; padding: 4px 8px; font-size: 11px;
  border-radius: 5px; font-family: inherit;
  opacity: 0; transition: opacity 0.15s;
}
.project:hover .delete-btn { opacity: 1; }
.project .delete-btn:hover { color: var(--bad); background: rgba(239, 68, 68, 0.1); }

.proj-header-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 4px; padding-right: 70px;
}
.proj-name {
  flex: 1; min-width: 0; background: transparent; border: none;
  font-size: 18px; font-weight: 600; letter-spacing: -0.01em;
  color: var(--text); font-family: inherit; padding: 2px 0;
}
.proj-name:focus { outline: none; }
.proj-name::placeholder { color: var(--text-4); font-weight: 500; }

.proj-goal {
  width: 100%; background: transparent; border: none;
  font-size: 13px; color: var(--text-2); font-family: inherit;
  padding: 2px 0; margin-bottom: 14px;
  border-bottom: 1px solid transparent;
}
.proj-goal:focus { outline: none; border-bottom-color: var(--border); }
.proj-goal::placeholder { color: var(--text-4); font-style: italic; }

.section-head {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-3);
  margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.section-head .count {
  background: #27272a; color: var(--text-2);
  border-radius: 3px; padding: 1px 6px; font-size: 9px;
  font-weight: 600; letter-spacing: 0;
}

/* Project label chip */
.label-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 11px;
  font-size: 10px; font-weight: 600;
  cursor: pointer; font-family: inherit; border: 1px solid transparent;
  text-transform: uppercase; letter-spacing: 0.04em;
  white-space: nowrap;
}
.label-chip.unset {
  background: transparent; color: var(--text-4);
  border-color: var(--border-strong);
}
.label-chip.unset:hover { color: var(--text-2); border-color: var(--border); }
.label-chip .dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}

.label-picker {
  position: absolute; top: 100%; right: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 50; min-width: 180px; margin-top: 4px;
}
.label-picker .picker-option {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 5px;
  cursor: pointer; font-size: 12px;
}
.label-picker .picker-option:hover { background: var(--card-hover); }
.label-picker .picker-option .dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.label-picker .picker-divider { height: 1px; background: var(--border); margin: 4px 0; }
.label-picker .picker-option.clear { color: var(--text-3); font-style: italic; }

/* Items (actionables) */
ul.items { list-style: none; }
ul.items > li {
  padding: 7px 0; border-bottom: 1px solid var(--border);
  position: relative;
}
ul.items > li:last-child { border-bottom: none; }
ul.items > li:first-child { padding-top: 0; }
ul.items > li.dragging { opacity: 0.4; }
ul.items > li::before {
  content: ""; position: absolute; left: -8px; right: 0; top: -1px;
  height: 2px; background: var(--accent); border-radius: 1px;
  opacity: 0;
}
ul.items > li.drag-over::before { opacity: 1; }
ul.items > li.hidden-by-search { display: none; }

.item-row {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}

.item-drag-handle {
  width: 12px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: grab; opacity: 0;
  color: var(--text-4); font-size: 11px; line-height: 1;
  user-select: none; transition: opacity 0.15s;
  flex-shrink: 0;
}
ul.items > li:hover .item-drag-handle { opacity: 1; }
.item-drag-handle:active { cursor: grabbing; }

ul.items input[type="checkbox"] {
  accent-color: var(--good); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0;
}
ul.items input.item-text {
  flex: 1; min-width: 100px; border: none; background: transparent;
  font-size: 13px; color: var(--text); font-family: inherit;
  padding: 3px 0;
}
ul.items input.item-text:focus { outline: none; }
ul.items input.item-text::placeholder { color: var(--text-4); }
ul.items li.done input.item-text { color: var(--text-4); text-decoration: line-through; }

/* Priority chip */
.priority-chip {
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-4);
  padding: 1px 6px; border-radius: 8px; font-size: 9px;
  cursor: pointer; font-family: inherit; font-weight: 700;
  letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0;
  min-width: 22px; text-align: center;
}
.priority-chip:hover { background: var(--card-hover); color: var(--text-2); }
.priority-chip.p-1 { background: rgba(59, 130, 246, 0.15); color: var(--prio-low); border-color: var(--prio-low); }
.priority-chip.p-2 { background: rgba(234, 179, 8, 0.15); color: var(--prio-med); border-color: var(--prio-med); }
.priority-chip.p-3 { background: rgba(239, 68, 68, 0.15); color: var(--prio-high); border-color: var(--prio-high); }

/* Age badge (since last update) */
.meta-badge {
  font-size: 10px; font-variant-numeric: tabular-nums;
  white-space: nowrap; flex-shrink: 0;
  padding: 1px 6px; border-radius: 8px;
  font-weight: 500;
}
.meta-badge.level-fresh  { color: var(--text-4); }
.meta-badge.level-normal { color: var(--text-3); }
.meta-badge.level-warn   { color: var(--warn); background: rgba(234, 179, 8, 0.10); }
.meta-badge.level-bad    { color: var(--bad);  background: rgba(239, 68, 68, 0.10); }

/* Status chip + picker */
.status-wrap { position: relative; flex-shrink: 0; }
.status-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 9px; border-radius: 10px;
  font-size: 10px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  border: 1px solid transparent;
  text-transform: uppercase; letter-spacing: 0.04em;
  white-space: nowrap;
}
.status-chip.unset {
  background: transparent; color: var(--text-4);
  border-color: var(--border-strong);
}
.status-chip.unset:hover { color: var(--text-2); border-color: var(--border); }
.status-chip.today      { background: rgba(245, 158, 11, 0.15); color: var(--accent);     border-color: var(--accent); }
.status-chip.backburner { background: rgba(113, 113, 122, 0.18); color: var(--text-2);    border-color: var(--text-3); }
.status-chip.waiting    { background: rgba(59, 130, 246, 0.15);  color: var(--waiting);   border-color: var(--waiting); }
.status-chip.stuck      { background: rgba(239, 68, 68, 0.15);   color: var(--bad);       border-color: var(--bad); }
.status-chip .dot {
  width: 7px; height: 7px; border-radius: 50%; display: inline-block;
}

.status-picker {
  position: absolute; top: 100%; right: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 50; min-width: 160px; margin-top: 4px;
}
.status-picker .picker-option {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 5px;
  cursor: pointer; font-size: 12px;
  text-transform: none; letter-spacing: 0;
}
.status-picker .picker-option:hover { background: var(--card-hover); }
.status-picker .picker-option .dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}
.status-picker .picker-divider { height: 1px; background: var(--border); margin: 4px 0; }
.status-picker .picker-option.clear { color: var(--text-3); font-style: italic; }

ul.items .li-rm {
  background: none; border: none; color: var(--text-4); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0 4px;
  opacity: 0; transition: opacity 0.15s;
  flex-shrink: 0;
}
ul.items li:hover .li-rm { opacity: 1; }
ul.items .li-rm:hover { color: var(--bad); }

/* Context rows under stuck/waiting */
.context-row {
  margin-top: 6px; margin-left: 35px;
  display: flex; align-items: center; gap: 8px;
}
.context-row.hidden { display: none; }
.context-row .lbl {
  font-size: 9px;
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
  white-space: nowrap;
}
.context-row input {
  flex: 1;
  border-radius: 5px;
  color: var(--text); font-family: inherit;
  padding: 4px 8px; font-size: 12px;
}
.context-row input:focus { outline: none; }
.context-row input::placeholder { color: var(--text-4); font-style: italic; }

.context-row.stuck .lbl { color: var(--bad); }
.context-row.stuck input {
  background: rgba(239, 68, 68, 0.06);
  border: 1px solid rgba(239, 68, 68, 0.2);
}
.context-row.stuck input:focus { border-color: var(--bad); }

.context-row.waiting .lbl { color: var(--waiting); }
.context-row.waiting input {
  background: rgba(59, 130, 246, 0.06);
  border: 1px solid rgba(59, 130, 246, 0.2);
}
.context-row.waiting input:focus { border-color: var(--waiting); }

/* Done footer */
.done-footer {
  margin-top: 6px;
  font-size: 11px; color: var(--text-4);
  cursor: pointer; padding: 6px 0;
  border-top: 1px dashed var(--border);
  display: flex; align-items: center; gap: 6px;
}
.done-footer:hover { color: var(--text-2); }
.done-footer .caret { font-size: 9px; }
.done-footer.expanded { color: var(--text-3); }

.empty-line {
  font-size: 11px; color: var(--text-4); font-style: italic;
  padding: 4px 0 6px;
}

.empty-state {
  text-align: center; padding: 60px 20px;
  border: 1px dashed var(--border-strong); border-radius: 12px;
  color: var(--text-3);
}
.empty-state h2 { font-size: 16px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
.empty-state p { font-size: 12px; margin-bottom: 14px; }

/* Today view */
.today-list { display: flex; flex-direction: column; gap: 6px; }
.today-group { margin-bottom: 18px; }
.today-group h3 {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-3); margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.today-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
}
.today-item input[type="checkbox"] {
  accent-color: var(--good); width: 16px; height: 16px; cursor: pointer; flex-shrink: 0;
}
.today-item .text { flex: 1; font-size: 13px; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.today-item.done .text { color: var(--text-4); text-decoration: line-through; }
.today-item .proj-tag {
  font-size: 10px; color: var(--text-2);
  background: var(--card-hover); padding: 3px 8px; border-radius: 8px;
  font-weight: 500; cursor: pointer; white-space: nowrap;
}
.today-item .proj-tag:hover { background: #2a2a30; color: var(--text); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Projects</h1>
    <div class="date" id="header-date"></div>
  </div>
  <div class="header-actions">
    <input type="file" id="import-file" accept=".json" style="display:none;">
    <div class="search-wrap">
      <input type="text" class="search" id="search-input" placeholder="Search projects, actionables…">
      <kbd>⌘K</kbd>
    </div>
    <button class="btn ghost" id="labels-btn" title="Manage labels">Labels</button>
    <button class="btn ghost" id="import-btn" title="Import projects from JSON">Import</button>
    <button class="btn ghost" id="export-btn" title="Export projects as JSON">Export</button>
    <button class="btn accent" id="new-project">+ New project</button>
  </div>
</header>

<div class="daily-dashboard" id="daily-dashboard">
  <div class="dd-top">
    <div class="dd-date" id="dd-date-text"></div>
    <div class="dd-stats" id="dd-stats"></div>
  </div>
  <div class="dd-progress-row">
    <div class="dd-progress-bar"><div id="dd-progress-fill" style="width:0%"></div></div>
    <div class="dd-progress-label" id="dd-progress-label">—</div>
  </div>
  <div class="dd-quick" id="dd-quick"></div>
</div>

<div class="labels-panel hidden" id="labels-panel">
  <h3>Labels</h3>
  <div id="labels-list"></div>
  <button class="btn add-line" id="add-label-btn">+ New label</button>
</div>

<div class="tabs">
  <button class="tab" data-view="today" id="tab-today">Today <span class="pill" id="today-pill">0</span></button>
  <button class="tab" data-view="projects" id="tab-projects">Projects <span class="pill" id="projects-pill">0</span></button>
</div>

<div id="today-view" style="display:none;">
  <div id="today-list-container"></div>
</div>

<div id="projects-view">
  <div id="projects-container"></div>
</div>

<script>
// ─── Status definitions ────────────────────────────────
const STATUSES = ["today", "backburner", "waiting", "stuck"];
const STATUS_META = {
  today:      { label: "Today",      color: "#f59e0b" },
  backburner: { label: "Backburner", color: "#71717a" },
  waiting:    { label: "Waiting",    color: "#3b82f6" },
  stuck:      { label: "Stuck",      color: "#ef4444" }
};

// ─── State ──────────────────────────────────────────────
const STORE_KEY = "projects-v1";
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { projects: [], labels: [] }; }
  catch(e) { return { projects: [], labels: [] }; }
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
let state = loadState();
state.projects = state.projects || [];
state.labels = state.labels || [];

const COLOR_PALETTE = [
  { name: "purple", hex: "#a855f7" },
  { name: "blue",   hex: "#3b82f6" },
  { name: "cyan",   hex: "#06b6d4" },
  { name: "green",  hex: "#22c55e" },
  { name: "yellow", hex: "#eab308" },
  { name: "orange", hex: "#f97316" },
  { name: "red",    hex: "#ef4444" },
  { name: "pink",   hex: "#ec4899" },
  { name: "gray",   hex: "#71717a" }
];

// Migrate schema
const NOW = new Date().toISOString();
state.projects.forEach(p => {
  if (p.labelId === undefined) p.labelId = null;
  if (!p.createdAt) p.createdAt = NOW;
  (p.actionables || []).forEach(a => {
    // Convert legacy labels array to single status
    if (a.status === undefined) {
      const labs = Array.isArray(a.labels) ? a.labels : [];
      if (labs.includes("stuck"))         a.status = "stuck";
      else if (labs.includes("today"))    a.status = "today";
      else if (labs.includes("waiting"))  a.status = "waiting";
      else                                 a.status = null;
    }
    // Legacy blockedBy → blocker text
    if (Array.isArray(a.blockedBy) && a.blockedBy.length && Array.isArray(p.blockers)) {
      const texts = a.blockedBy
        .map(bid => (p.blockers.find(b => b.id === bid) || {}).text)
        .filter(Boolean);
      if (texts.length && !a.blocker) a.blocker = texts.join("; ");
    }
    if (typeof a.blocker !== "string")    a.blocker = "";
    if (typeof a.waitingFor !== "string") a.waitingFor = "";
    if (!a.createdAt) a.createdAt = p.createdAt || NOW;
    if (!a.updatedAt) a.updatedAt = a.createdAt;
    if (typeof a.priority !== "number") a.priority = 0;
    if (a.stuckSince === undefined) {
      a.stuckSince = a.status === "stuck" ? NOW : null;
    }
    if (a.doneAt === undefined) a.doneAt = a.done ? NOW : null;
    delete a.labels;
    delete a.blockedBy;
    delete a.dueDate;
  });
  delete p.blockers;
});
saveState();

let currentView = (window.localStorage.getItem("view") || "projects");
let activeLabelPicker = null;
let activeStatusPicker = null; // "<projId>:<itemId>" or null
let searchTerm = "";
let expandedDone = new Set();

const ARCHIVE_AFTER_MS = 24 * 60 * 60 * 1000;

function uid() { return Math.random().toString(36).slice(2,10); }
function escapeAttr(s) {
  const div = document.createElement("div");
  div.textContent = s == null ? "" : String(s);
  return div.innerHTML.replace(/"/g, "&quot;");
}
function findProject(id) { return state.projects.find(p => p.id === id); }
function findActionable(p, id) { return p && p.actionables.find(a => a.id === id); }
function findLabel(id) { return state.labels.find(l => l.id === id); }

function daysSince(iso) {
  if (!iso) return 0;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}
function ageBadgeData(updatedAtIso) {
  if (!updatedAtIso) return null;
  const ms = Date.now() - new Date(updatedAtIso).getTime();
  if (ms < 3600000) return null;
  const hours = Math.floor(ms / 3600000);
  if (hours < 24) return { text: hours + "h", level: "fresh" };
  const days = Math.floor(hours / 24);
  let level = "normal";
  if (days >= 14) level = "bad";
  else if (days >= 7) level = "warn";
  return { text: days + "d", level };
}
function touchActionable(a) { a.updatedAt = new Date().toISOString(); }

// ─── Project CRUD ──────────────────────────────────────
function addProject() {
  const p = {
    id: uid(), name: "", goal: "", labelId: null,
    actionables: [], createdAt: new Date().toISOString()
  };
  state.projects.unshift(p);
  saveState(); renderAll();
  setTimeout(() => {
    const el = document.querySelector('[data-project-id="' + p.id + '"] .proj-name');
    if (el) el.focus();
  }, 0);
}
function deleteProject(id) {
  if (!confirm("Delete this project? Its actionables will be removed.")) return;
  state.projects = state.projects.filter(p => p.id !== id);
  saveState(); renderAll();
}
function updateProjectField(id, field, value) {
  const p = findProject(id); if (!p) return;
  p[field] = value; saveState();
}
function setProjectLabel(projId, labelId) {
  const p = findProject(projId); if (!p) return;
  p.labelId = labelId || null;
  saveState(); renderProjects();
}

// ─── Actionables ───────────────────────────────────────
function addActionable(projId) {
  const p = findProject(projId); if (!p) return;
  const now = new Date().toISOString();
  p.actionables.push({
    id: uid(), text: "", done: false,
    status: null,
    blocker: "", waitingFor: "",
    createdAt: now, updatedAt: now,
    priority: 0, stuckSince: null, doneAt: null
  });
  saveState(); renderProjects();
  setTimeout(() => {
    const items = document.querySelectorAll('[data-project-id="' + projId + '"] .actionables-list input.item-text');
    const last = items[items.length - 1];
    if (last) last.focus();
  }, 0);
}
function updateActionable(projId, itemId, field, value) {
  const p = findProject(projId); if (!p) return;
  const it = findActionable(p, itemId); if (!it) return;
  if (field === "done") {
    if (value && !it.done) it.doneAt = new Date().toISOString();
    if (!value) it.doneAt = null;
  }
  it[field] = value;
  touchActionable(it);
  saveState();
}
function removeActionable(projId, itemId) {
  const p = findProject(projId); if (!p) return;
  p.actionables = p.actionables.filter(a => a.id !== itemId);
  saveState(); renderAll();
}
function setActionableStatus(projId, itemId, status) {
  const p = findProject(projId); if (!p) return;
  const a = findActionable(p, itemId); if (!a) return;
  const prevStatus = a.status;
  a.status = STATUSES.includes(status) ? status : null;
  // Manage stuckSince timer
  if (a.status === "stuck" && prevStatus !== "stuck") a.stuckSince = new Date().toISOString();
  if (a.status !== "stuck") a.stuckSince = null;
  // Clear context fields when leaving those statuses
  if (a.status !== "stuck") a.blocker = "";
  if (a.status !== "waiting") a.waitingFor = "";
  touchActionable(a);
  saveState(); renderAll();
}
function cyclePriority(projId, itemId) {
  const p = findProject(projId); if (!p) return;
  const a = findActionable(p, itemId); if (!a) return;
  a.priority = (a.priority + 1) % 4;
  touchActionable(a);
  saveState(); renderProjects();
}
function reorderActionables(projId, draggedId, targetId) {
  const p = findProject(projId); if (!p) return;
  const draggedIdx = p.actionables.findIndex(a => a.id === draggedId);
  if (draggedIdx === -1) return;
  const dragged = p.actionables[draggedIdx];
  p.actionables.splice(draggedIdx, 1);
  const newTargetIdx = p.actionables.findIndex(a => a.id === targetId);
  if (newTargetIdx === -1) { p.actionables.splice(draggedIdx, 0, dragged); return; }
  p.actionables.splice(newTargetIdx, 0, dragged);
  saveState(); renderProjects();
}

// ─── Labels CRUD ───────────────────────────────────────
function addLabel() {
  const used = state.labels.map(l => l.color);
  const next = COLOR_PALETTE.find(c => !used.includes(c.hex)) || COLOR_PALETTE[0];
  state.labels.push({ id: uid(), name: "", color: next.hex });
  saveState(); renderLabelsPanel();
  setTimeout(() => {
    const inputs = document.querySelectorAll("#labels-list .label-name");
    const last = inputs[inputs.length - 1];
    if (last) last.focus();
  }, 0);
}
function updateLabel(id, field, value) {
  const l = findLabel(id); if (!l) return;
  l[field] = value; saveState();
  if (field === "color") renderLabelsPanel();
  renderProjects();
}
function deleteLabel(id) {
  if (!confirm("Delete this label? Projects using it will become unlabeled.")) return;
  state.labels = state.labels.filter(l => l.id !== id);
  state.projects.forEach(p => { if (p.labelId === id) p.labelId = null; });
  saveState(); renderLabelsPanel(); renderAll();
}

// ─── View switching ────────────────────────────────────
function setView(view) {
  currentView = view;
  window.localStorage.setItem("view", view);
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.getElementById('today-view').style.display = view === 'today' ? 'block' : 'none';
  document.getElementById('projects-view').style.display = view === 'projects' ? 'block' : 'none';
  renderAll();
}
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => setView(t.dataset.view));
});

// ─── Date header ───────────────────────────────────────
function renderDateHeader() {
  const now = new Date();
  document.getElementById("header-date").textContent =
    now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  document.getElementById("dd-date-text").textContent =
    now.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

// ─── Daily progress dashboard ──────────────────────────
function renderDailyDashboard() {
  let todayTotal = 0, todayDone = 0;
  let openTotal = 0, stuck = 0, waiting = 0, backburner = 0;
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (a.status === "today") {
        todayTotal++;
        if (a.done) todayDone++;
      }
      if (!a.done) {
        openTotal++;
        if (a.status === "stuck") stuck++;
        else if (a.status === "waiting") waiting++;
        else if (a.status === "backburner") backburner++;
      }
    });
  });
  const pct = todayTotal === 0 ? 0 : Math.round((todayDone / todayTotal) * 100);
  document.getElementById("dd-progress-fill").style.width = pct + "%";
  document.getElementById("dd-progress-label").textContent =
    todayTotal === 0 ? "Nothing on today" :
    todayDone + " / " + todayTotal + "  ·  " + pct + "%";
  document.getElementById("dd-stats").innerHTML =
    "<strong>" + state.projects.length + "</strong> project" + (state.projects.length === 1 ? "" : "s");

  document.getElementById("dd-quick").innerHTML =
    '<span><strong>' + openTotal + '</strong> open</span>' +
    '<span class="pill-stuck"><strong>' + stuck + '</strong> stuck</span>' +
    '<span class="pill-waiting"><strong>' + waiting + '</strong> waiting</span>' +
    '<span class="pill-backburner"><strong>' + backburner + '</strong> backburner</span>';
}

function renderTabPills() {
  let todayOpen = 0;
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (!a.done && a.status === "today") todayOpen++;
    });
  });
  document.getElementById("today-pill").textContent = todayOpen;
  document.getElementById("projects-pill").textContent = state.projects.length;
}

// ─── Render: Labels panel ─────────────────────────────
function renderLabelsPanel() {
  const list = document.getElementById("labels-list");
  if (state.labels.length === 0) {
    list.innerHTML = '<div class="empty-line" style="text-align:center; padding:8px 0;">No labels yet — hit "+ New label" to add one</div>';
    return;
  }
  list.innerHTML = state.labels.map(l => {
    const swatches = COLOR_PALETTE.map(c =>
      '<div class="color-swatch ' + (l.color === c.hex ? "selected" : "") + '" ' +
        'data-color="' + c.hex + '" data-label-id="' + l.id + '" ' +
        'style="background:' + c.hex + ';" title="' + c.name + '"></div>'
    ).join("");
    return (
      '<div class="label-row" data-label-id="' + l.id + '">' +
        '<input type="text" class="label-name" data-label-id="' + l.id + '" ' +
          'placeholder="Label name (e.g. Work)" value="' + escapeAttr(l.name) + '">' +
        '<div class="color-swatches">' + swatches + '</div>' +
        '<button class="li-rm" data-label-id="' + l.id + '" title="Delete label">×</button>' +
      '</div>'
    );
  }).join("");

  list.querySelectorAll('input.label-name').forEach(inp => {
    inp.addEventListener("input", () => updateLabel(inp.dataset.labelId, "name", inp.value));
  });
  list.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener("click", () => updateLabel(sw.dataset.labelId, "color", sw.dataset.color));
  });
  list.querySelectorAll('.li-rm').forEach(rm => {
    rm.addEventListener("click", () => deleteLabel(rm.dataset.labelId));
  });
}

// ─── Render: Projects view ─────────────────────────────
function renderProjects() {
  const container = document.getElementById("projects-container");
  if (state.projects.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>No projects yet</h2>' +
        '<p>Hit <strong>+ New project</strong> to start.</p>' +
      '</div>';
    return;
  }
  container.innerHTML = '<div class="projects">' +
    state.projects.map(renderProject).join("") +
    '</div>';
  wireProjects();
  attachDragHandlers();
  applySearchFilter();
}

function renderLabelChip(p) {
  const l = findLabel(p.labelId);
  if (!l) {
    return '<button class="label-chip unset" data-action="open-label-picker">+ Label</button>';
  }
  return (
    '<button class="label-chip" data-action="open-label-picker" ' +
      'style="background:' + l.color + '22; color:' + l.color + '; border-color:' + l.color + '55;">' +
      '<span class="dot" style="background:' + l.color + ';"></span>' +
      escapeAttr(l.name || "Unnamed") +
    '</button>'
  );
}

function renderProject(p) {
  const l = findLabel(p.labelId);
  const colorAttrs = l ? 'data-label-color="' + l.color + '" style="--proj-color:' + l.color + ';"' : '';
  const pickerOpen = activeLabelPicker === p.id;
  let pickerHtml = "";
  if (pickerOpen) {
    const options = state.labels.map(ll =>
      '<div class="picker-option" data-action="set-label" data-label-id="' + ll.id + '">' +
        '<span class="dot" style="background:' + ll.color + ';"></span>' +
        '<span>' + escapeAttr(ll.name || "Unnamed") + '</span>' +
      '</div>'
    ).join("");
    pickerHtml =
      '<div class="label-picker">' +
        (state.labels.length === 0
          ? '<div class="picker-option" style="cursor:default; color:var(--text-4);">No labels yet — create one in the Labels panel</div>'
          : options) +
        (state.labels.length > 0
          ? '<div class="picker-divider"></div><div class="picker-option clear" data-action="set-label" data-label-id="">Clear label</div>'
          : '') +
      '</div>';
  }

  const active = [];
  const recentDone = [];
  const archived = [];
  p.actionables.forEach(a => {
    if (!a.done) active.push(a);
    else {
      const age = a.doneAt ? (Date.now() - new Date(a.doneAt).getTime()) : ARCHIVE_AFTER_MS + 1;
      if (age < ARCHIVE_AFTER_MS) recentDone.push(a);
      else archived.push(a);
    }
  });
  const showArchived = expandedDone.has(p.id);
  const visible = active.concat(recentDone).concat(showArchived ? archived : []);

  const doneFooter = archived.length > 0
    ? '<div class="done-footer ' + (showArchived ? "expanded" : "") + '" data-action="toggle-done-footer">' +
        '<span class="caret">' + (showArchived ? "▼" : "▶") + '</span>' +
        (showArchived ? "Hide" : "Show") + ' ' + archived.length + ' completed' +
      '</div>'
    : "";

  return (
    '<article class="project" data-project-id="' + p.id + '" ' + colorAttrs + '>' +
      '<div class="drag-handle" data-drag-handle>⋮⋮</div>' +
      '<button class="delete-btn" data-action="delete-project">Delete</button>' +
      '<div class="proj-header-row">' +
        '<input type="text" class="proj-name" placeholder="Project name" value="' + escapeAttr(p.name) + '">' +
        '<div style="position:relative;">' +
          renderLabelChip(p) +
          pickerHtml +
        '</div>' +
      '</div>' +
      '<input type="text" class="proj-goal" placeholder="Goal — what does success look like?" value="' + escapeAttr(p.goal) + '">' +
      '<div class="section-head">Actionables ' +
        '<span class="count">' + active.length + ' open</span>' +
      '</div>' +
      '<ul class="items actionables-list">' +
        (visible.length === 0
          ? '<li style="border:none; padding:0;"><div class="empty-line">No actionables — add one below</div></li>'
          : visible.map(a => renderActionable(p, a)).join("")
        ) +
      '</ul>' +
      '<button class="btn add-line" data-action="add-actionable">+ Add actionable</button>' +
      doneFooter +
    '</article>'
  );
}

function renderStatusChip(p, a) {
  const s = a.status;
  if (!s) {
    return '<button class="status-chip unset" data-action="open-status-picker">Status</button>';
  }
  const meta = STATUS_META[s];
  let label = meta.label;
  if (s === "stuck" && a.stuckSince) {
    const sD = daysSince(a.stuckSince);
    if (sD >= 1) label = "Stuck · " + sD + "d";
  }
  return (
    '<button class="status-chip ' + s + '" data-action="open-status-picker">' +
      '<span class="dot" style="background:' + meta.color + ';"></span>' +
      label +
    '</button>'
  );
}

function renderStatusPicker(p, a) {
  const key = p.id + ":" + a.id;
  if (activeStatusPicker !== key) return "";
  const opts = STATUSES.map(s =>
    '<div class="picker-option" data-action="set-status" data-status="' + s + '">' +
      '<span class="dot" style="background:' + STATUS_META[s].color + ';"></span>' +
      '<span>' + STATUS_META[s].label + '</span>' +
    '</div>'
  ).join("");
  return (
    '<div class="status-picker">' +
      opts +
      (a.status ? '<div class="picker-divider"></div><div class="picker-option clear" data-action="set-status" data-status="">Clear status</div>' : '') +
    '</div>'
  );
}

function renderActionable(p, a) {
  const prioLabels = ["P", "LOW", "MED", "HIGH"];
  const prioBtn = '<button class="priority-chip p-' + a.priority + '" data-action="cycle-priority" title="Cycle priority">' +
    (a.priority === 0 ? "P" : prioLabels[a.priority]) + '</button>';

  const ageInfo = ageBadgeData(a.updatedAt || a.createdAt);
  const ageBadge = ageInfo
    ? '<span class="meta-badge level-' + ageInfo.level + '" title="Time since last update">' + ageInfo.text + '</span>'
    : "";

  let contextRow = "";
  if (a.status === "stuck") {
    contextRow =
      '<div class="context-row stuck">' +
        '<span class="lbl">Blocker:</span>' +
        '<input type="text" data-action="update-blocker" ' +
          'placeholder="What\'s in the way?" value="' + escapeAttr(a.blocker || "") + '">' +
      '</div>';
  } else if (a.status === "waiting") {
    contextRow =
      '<div class="context-row waiting">' +
        '<span class="lbl">Waiting for:</span>' +
        '<input type="text" data-action="update-waiting-for" ' +
          'placeholder="Who or what?" value="' + escapeAttr(a.waitingFor || "") + '">' +
      '</div>';
  }

  return (
    '<li data-item-id="' + a.id + '" class="' + (a.done ? "done" : "") + '">' +
      '<div class="item-row">' +
        '<span class="item-drag-handle" data-item-drag-handle>⋮⋮</span>' +
        '<input type="checkbox" data-action="toggle-actionable"' + (a.done ? " checked" : "") + '>' +
        prioBtn +
        '<input type="text" class="item-text" data-action="update-actionable" ' +
          'placeholder="What needs to be done?" value="' + escapeAttr(a.text) + '">' +
        ageBadge +
        '<div class="status-wrap">' +
          renderStatusChip(p, a) +
          renderStatusPicker(p, a) +
        '</div>' +
        '<button class="li-rm" data-action="remove-actionable" title="Remove">×</button>' +
      '</div>' +
      contextRow +
    '</li>'
  );
}

// ─── Wire project events ───────────────────────────────
function wireProjects() {
  const container = document.getElementById("projects-container");

  container.querySelectorAll('[data-action]').forEach(el => {
    if (el.tagName === "INPUT") return;
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const action = el.dataset.action;
      const proj = el.closest('[data-project-id]');
      const projId = proj && proj.dataset.projectId;
      const item = el.closest('[data-item-id]');
      const itemId = item && item.dataset.itemId;

      if (action === "delete-project")          deleteProject(projId);
      else if (action === "add-actionable")     addActionable(projId);
      else if (action === "remove-actionable")  removeActionable(projId, itemId);
      else if (action === "cycle-priority")     cyclePriority(projId, itemId);
      else if (action === "toggle-done-footer") {
        if (expandedDone.has(projId)) expandedDone.delete(projId);
        else expandedDone.add(projId);
        renderProjects();
      }
      else if (action === "open-label-picker") {
        activeLabelPicker = activeLabelPicker === projId ? null : projId;
        activeStatusPicker = null;
        renderProjects();
      }
      else if (action === "set-label") {
        const labelId = el.dataset.labelId || null;
        setProjectLabel(projId, labelId);
        activeLabelPicker = null;
        renderProjects();
      }
      else if (action === "open-status-picker") {
        const key = projId + ":" + itemId;
        activeStatusPicker = activeStatusPicker === key ? null : key;
        activeLabelPicker = null;
        renderProjects();
      }
      else if (action === "set-status") {
        const status = el.dataset.status || null;
        setActionableStatus(projId, itemId, status);
        activeStatusPicker = null;
        // setActionableStatus calls renderAll
      }
    });
  });

  container.querySelectorAll('input[type="checkbox"][data-action="toggle-actionable"]').forEach(cb => {
    cb.addEventListener("change", () => {
      const proj = cb.closest('[data-project-id]');
      const item = cb.closest('[data-item-id]');
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "done", cb.checked);
      renderAll();
    });
  });

  container.querySelectorAll('input.proj-name, input.proj-goal').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const field = inp.classList.contains("proj-name") ? "name" : "goal";
      updateProjectField(proj.dataset.projectId, field, inp.value);
      if (searchTerm) applySearchFilter();
    });
  });

  container.querySelectorAll('input.item-text').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const item = inp.closest('[data-item-id]');
      if (!proj || !item) return;
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "text", inp.value);
      if (searchTerm) applySearchFilter();
    });
    inp.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const proj = inp.closest('[data-project-id]');
        if (proj) addActionable(proj.dataset.projectId);
      }
    });
  });

  container.querySelectorAll('input[data-action="update-blocker"]').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const item = inp.closest('[data-item-id]');
      if (!proj || !item) return;
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "blocker", inp.value);
    });
  });

  container.querySelectorAll('input[data-action="update-waiting-for"]').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const item = inp.closest('[data-item-id]');
      if (!proj || !item) return;
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "waitingFor", inp.value);
    });
  });
}

document.addEventListener("click", (e) => {
  if (activeLabelPicker && !e.target.closest('.label-picker') && !e.target.closest('[data-action="open-label-picker"]')) {
    activeLabelPicker = null;
    renderProjects();
  }
  if (activeStatusPicker && !e.target.closest('.status-picker') && !e.target.closest('[data-action="open-status-picker"]')) {
    activeStatusPicker = null;
    renderProjects();
  }
});

// ─── Drag and drop ─────────────────────────────────────
function attachDragHandlers() {
  document.querySelectorAll('.project').forEach(article => {
    const handle = article.querySelector('[data-drag-handle]');
    if (!handle) return;
    handle.addEventListener("mousedown", () => { article.draggable = true; });
    handle.addEventListener("mouseup", () => { article.draggable = false; });
    article.addEventListener("dragstart", (e) => {
      if (!article.draggable) return;
      e.stopPropagation();
      article.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("application/x-project", article.dataset.projectId);
    });
    article.addEventListener("dragend", () => {
      article.classList.remove("dragging");
      article.draggable = false;
      document.querySelectorAll('.project.drag-over').forEach(el => el.classList.remove("drag-over"));
    });
    article.addEventListener("dragover", (e) => {
      if (!Array.from(e.dataTransfer.types).includes("application/x-project")) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (!article.classList.contains("dragging")) article.classList.add("drag-over");
    });
    article.addEventListener("dragleave", () => article.classList.remove("drag-over"));
    article.addEventListener("drop", (e) => {
      const draggedId = e.dataTransfer.getData("application/x-project");
      if (!draggedId) return;
      e.preventDefault();
      article.classList.remove("drag-over");
      const targetId = article.dataset.projectId;
      if (draggedId === targetId) return;
      reorderProjects(draggedId, targetId);
    });

    article.querySelectorAll('.actionables-list > li').forEach(li => {
      const ah = li.querySelector('[data-item-drag-handle]');
      if (!ah) return;
      ah.addEventListener("mousedown", () => { li.draggable = true; });
      ah.addEventListener("mouseup", () => { li.draggable = false; });
      li.addEventListener("dragstart", (e) => {
        if (!li.draggable) return;
        e.stopPropagation();
        li.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("application/x-actionable", li.dataset.itemId);
        e.dataTransfer.setData("application/x-actionable-proj", article.dataset.projectId);
      });
      li.addEventListener("dragend", () => {
        li.classList.remove("dragging");
        li.draggable = false;
        article.querySelectorAll('.actionables-list > li.drag-over').forEach(el => el.classList.remove("drag-over"));
      });
      li.addEventListener("dragover", (e) => {
        if (!Array.from(e.dataTransfer.types).includes("application/x-actionable")) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        if (!li.classList.contains("dragging")) li.classList.add("drag-over");
      });
      li.addEventListener("dragleave", () => li.classList.remove("drag-over"));
      li.addEventListener("drop", (e) => {
        const draggedId = e.dataTransfer.getData("application/x-actionable");
        const draggedProj = e.dataTransfer.getData("application/x-actionable-proj");
        if (!draggedId) return;
        e.preventDefault();
        li.classList.remove("drag-over");
        if (draggedProj !== article.dataset.projectId) return;
        if (draggedId === li.dataset.itemId) return;
        reorderActionables(article.dataset.projectId, draggedId, li.dataset.itemId);
      });
    });
  });
}

function reorderProjects(draggedId, targetId) {
  const draggedIdx = state.projects.findIndex(p => p.id === draggedId);
  if (draggedIdx === -1) return;
  const dragged = state.projects[draggedIdx];
  state.projects.splice(draggedIdx, 1);
  const newTargetIdx = state.projects.findIndex(p => p.id === targetId);
  if (newTargetIdx === -1) { state.projects.splice(draggedIdx, 0, dragged); return; }
  state.projects.splice(newTargetIdx, 0, dragged);
  saveState(); renderProjects();
}

// ─── Search ────────────────────────────────────────────
function applySearchFilter() {
  const term = searchTerm.trim().toLowerCase();
  document.querySelectorAll('.project').forEach(article => {
    const p = findProject(article.dataset.projectId);
    if (!p) return;
    let projectMatches = !term ||
      (p.name && p.name.toLowerCase().includes(term)) ||
      (p.goal && p.goal.toLowerCase().includes(term));
    let anyActionableMatches = false;
    article.querySelectorAll('.actionables-list > li').forEach(li => {
      const item = findActionable(p, li.dataset.itemId);
      if (!item) return;
      const matches = !term ||
        projectMatches ||
        (item.text && item.text.toLowerCase().includes(term)) ||
        (item.blocker && item.blocker.toLowerCase().includes(term)) ||
        (item.waitingFor && item.waitingFor.toLowerCase().includes(term));
      li.classList.toggle("hidden-by-search", !matches);
      if (matches && !projectMatches) anyActionableMatches = true;
    });
    article.classList.toggle("hidden-by-search", !!term && !projectMatches && !anyActionableMatches);
  });
}

document.getElementById("search-input").addEventListener("input", (e) => {
  searchTerm = e.target.value;
  applySearchFilter();
});
document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "k") {
    e.preventDefault();
    if (currentView !== "projects") setView("projects");
    setTimeout(() => document.getElementById("search-input").focus(), 0);
  }
  if (e.key === "Escape" && document.activeElement === document.getElementById("search-input")) {
    document.getElementById("search-input").value = "";
    searchTerm = "";
    applySearchFilter();
    document.getElementById("search-input").blur();
  }
});

// ─── Render: Today view ────────────────────────────────
function renderToday() {
  const container = document.getElementById("today-list-container");
  const groups = [];
  state.projects.forEach(p => {
    const items = p.actionables.filter(a => a.status === "today");
    if (items.length) groups.push({ project: p, items });
  });

  if (groups.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>Nothing on today</h2>' +
        '<p>Open the Projects tab and set an actionable\'s status to <strong>Today</strong>.</p>' +
      '</div>';
    return;
  }

  groups.forEach(g => {
    g.items.sort((x, y) => (x.done === y.done ? 0 : x.done ? 1 : -1));
  });

  container.innerHTML = groups.map(g => {
    const openCount = g.items.filter(i => !i.done).length;
    const l = findLabel(g.project.labelId);
    const labelChip = l ?
      ' <span class="label-chip" style="background:' + l.color + '22; color:' + l.color + '; border-color:' + l.color + '55;">' +
        '<span class="dot" style="background:' + l.color + ';"></span>' + escapeAttr(l.name || "") +
      '</span>'
      : "";
    return (
      '<div class="today-group">' +
        '<h3>' + escapeAttr(g.project.name || "(untitled project)") + labelChip +
          '<span style="color:var(--text-4); font-weight:400; text-transform:none; letter-spacing:0; margin-left:auto;">' +
            openCount + ' / ' + g.items.length +
          '</span>' +
        '</h3>' +
        '<div class="today-list">' +
          g.items.map(a => renderTodayItem(g.project, a)).join("") +
        '</div>' +
      '</div>'
    );
  }).join("");

  wireTodayView();
}

function renderTodayItem(p, a) {
  return (
    '<div class="today-item' + (a.done ? " done" : "") + '" data-project-id="' + p.id + '" data-item-id="' + a.id + '">' +
      '<input type="checkbox" data-action="today-toggle"' + (a.done ? " checked" : "") + '>' +
      '<div class="text">' + escapeAttr(a.text || "(untitled)") + '</div>' +
      '<div class="proj-tag" data-action="jump-to-project">' + escapeAttr(p.name || "(untitled project)") + '</div>' +
    '</div>'
  );
}

function wireTodayView() {
  const container = document.getElementById("today-list-container");
  container.querySelectorAll('input[type="checkbox"][data-action="today-toggle"]').forEach(cb => {
    cb.addEventListener("change", () => {
      const wrap = cb.closest('.today-item');
      updateActionable(wrap.dataset.projectId, wrap.dataset.itemId, "done", cb.checked);
      renderAll();
    });
  });
  container.querySelectorAll('[data-action="jump-to-project"]').forEach(tag => {
    tag.addEventListener("click", () => {
      setView("projects");
      setTimeout(() => {
        const wrap = tag.closest('.today-item');
        const el = document.querySelector('[data-project-id="' + wrap.dataset.projectId + '"]');
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 0);
    });
  });
}

function renderAll() {
  renderDateHeader();
  renderDailyDashboard();
  renderTabPills();
  if (currentView === "today") renderToday();
  else renderProjects();
}

// ─── Export / Import ──────────────────────────────────
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "projects-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importDataFromFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.projects || !Array.isArray(parsed.projects)) throw new Error("Missing 'projects' array");
      if (!confirm("This will replace your current data with the imported file. Continue?")) return;
      state = parsed;
      state.labels = state.labels || [];
      state.projects.forEach(p => {
        if (p.labelId === undefined) p.labelId = null;
        if (!p.createdAt) p.createdAt = NOW;
        (p.actionables || []).forEach(a => {
          if (a.status === undefined) {
            const labs = Array.isArray(a.labels) ? a.labels : [];
            if (labs.includes("stuck")) a.status = "stuck";
            else if (labs.includes("today")) a.status = "today";
            else if (labs.includes("waiting")) a.status = "waiting";
            else a.status = null;
          }
          if (typeof a.blocker !== "string") a.blocker = "";
          if (typeof a.waitingFor !== "string") a.waitingFor = "";
          if (!a.createdAt) a.createdAt = NOW;
          if (!a.updatedAt) a.updatedAt = a.createdAt;
          if (typeof a.priority !== "number") a.priority = 0;
          if (a.stuckSince === undefined) a.stuckSince = a.status === "stuck" ? NOW : null;
          if (a.doneAt === undefined) a.doneAt = a.done ? NOW : null;
          delete a.labels;
          delete a.dueDate;
        });
      });
      saveState();
      renderAll();
      renderLabelsPanel();
      alert("✓ Imported " + state.projects.length + " projects, " + state.labels.length + " labels");
    } catch (err) {
      alert("Couldn't read that file: " + err.message);
    }
  };
  reader.readAsText(file);
}
document.getElementById("export-btn").addEventListener("click", exportData);
document.getElementById("import-btn").addEventListener("click", () => document.getElementById("import-file").click());
document.getElementById("import-file").addEventListener("change", (e) => {
  if (e.target.files[0]) importDataFromFile(e.target.files[0]);
  e.target.value = "";
});

// ─── Labels panel toggle ───────────────────────────────
document.getElementById("labels-btn").addEventListener("click", () => {
  const panel = document.getElementById("labels-panel");
  panel.classList.toggle("hidden");
  if (!panel.classList.contains("hidden")) renderLabelsPanel();
});
document.getElementById("add-label-btn").addEventListener("click", addLabel);

// ─── Init ──────────────────────────────────────────────
document.getElementById("new-project").addEventListener("click", () => {
  setView("projects");
  addProject();
});
renderLabelsPanel();
setView(currentView);
</script>
