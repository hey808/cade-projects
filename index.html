// ─── History panel ────────────────────────────────────
// List of recent days on entry → click a day to drill into journal + tasks.
let historyDate = null; // null = list view, YYYY-MM-DD = detail view
function dateAddDays(yyyymmdd, delta) {
  const [y, m, d] = yyyymmdd.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + delta);
  return dt.getFullYear() + "-" +
    String(dt.getMonth() + 1).padStart(2, "0") + "-" +
    String(dt.getDate()).padStart(2, "0");
}
function prettyDate(yyyymmdd) {
  const [y, m, d] = yyyymmdd.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
}
function tasksCompletedOn(yyyymmdd) {
  const out = [];
  state.projects.forEach(p => p.actionables.forEach(a => {
    if (!a.done || !a.doneAt) return;
    const d = new Date(a.doneAt);
    const ds = d.getFullYear() + "-" +
      String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0");
    if (ds === yyyymmdd) out.push({ p, a });
  }));
  return out;
}
function renderHistoryPanel() {
  const titleEl = document.getElementById("history-title");
  const body    = document.getElementById("history-body");
  const backBtn = document.getElementById("history-back");
  if (!body) return;

  if (historyDate === null) {
    // ── List view: last 30 days, each clickable ──
    titleEl.textContent = "History";
    backBtn.style.display = "none";
    const today = todayDateString();
    const items = [];
    for (let i = 0; i < 30; i++) {
      const d = dateAddDays(today, -i);
      const hasJ = !!(state.journal && state.journal[d] &&
        JOURNAL_QUESTIONS.some(q => (state.journal[d][q.key] || "").trim().length));
      const taskCount = tasksCompletedOn(d).length;
      items.push({ date: d, hasJournal: hasJ, tasks: taskCount });
    }
    body.innerHTML =
      '<div class="history-list">' +
        items.map(it => {
          const label = it.date === today ? "Today" : prettyDate(it.date);
          const meta =
            (it.hasJournal ? '<span><span class="dot j"></span>Journal</span>' : '') +
            (it.tasks ? '<span><span class="dot t"></span>' + it.tasks + ' done</span>' : '');
          return '<div class="history-list-item" data-history-date="' + it.date + '">' +
            '<div class="date">' + label + '</div>' +
            '<div class="meta">' + meta + '</div>' +
          '</div>';
        }).join("") +
      '</div>';
    body.querySelectorAll('[data-history-date]').forEach(el => {
      el.addEventListener("click", () => {
        historyDate = el.dataset.historyDate;
        renderHistoryPanel();
      });
    });
    return;
  }

  // ── Detail view for one date ──
  backBtn.style.display = "";
  const isToday = historyDate === todayDateString();
  titleEl.textContent = isToday ? "Today" : prettyDate(historyDate);

  const entry = (state.journal && state.journal[historyDate]) || null;
  const hasJournal = entry && JOURNAL_QUESTIONS.some(q => (entry[q.key] || "").trim().length);
  let journalHtml = '<h3>Journal</h3>';
  if (!hasJournal) {
    journalHtml += '<div class="history-empty">No journal entry for this day.</div>';
  } else {
    journalHtml += JOURNAL_QUESTIONS.map(q => {
      const a = (entry[q.key] || "").trim();
      if (!a) return '';
      return '<div class="history-entry">' +
        '<div class="q">' + q.text + '</div>' +
        '<div class="a">' + escapeAttr(a) + '</div>' +
      '</div>';
    }).join("");
  }
  const completed = tasksCompletedOn(historyDate);
  let doneHtml = '<h3>Completed (' + completed.length + ')</h3>';
  if (completed.length === 0) {
    doneHtml += '<div class="history-empty">Nothing completed on this day.</div>';
  } else {
    doneHtml += completed.map(c =>
      '<div class="history-task">' +
        '<span class="check">✓</span>' +
        '<span class="text">' + escapeAttr(c.a.text || "(untitled)") + '</span>' +
        '<span class="proj">' + escapeAttr(c.p.name || "(untitled)") + '</span>' +
      '</div>'
    ).join("");
  }
  body.innerHTML =
    '<div class="history-section">' + journalHtml + '</div>' +
    '<div class="history-section">' + doneHtml + '</div>';
}
function openHistoryPanel() {
  document.getElementById("history-panel").classList.add("open");
  document.getElementById("history-toggle").classList.add("open");
  historyDate = null; // always open to the list
  renderHistoryPanel();
}
function closeHistoryPanel() {
  document.getElementById("history-panel").classList.remove("open");
  document.getElementById("history-toggle").classList.remove("open");
}
document.getElementById("history-toggle").addEventListener("click", openHistoryPanel);
document.getElementById("history-close").addEventListener("click", closeHistoryPanel);
document.getElementById("history-back").addEventListener("click", () => {
  historyDate = null;
  renderHistoryPanel();
});

// Shows every archived actionable across projects, newest first.
function renderArchive() {
  const container = document.getElementById("archive-container");
  const rows = [];
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (a.archived) rows.push({ p, a });
    });
  });
  rows.sort((x, y) => {
    const xt = x.a.archivedAt ? new Date(x.a.archivedAt).getTime() : 0;
    const yt = y.a.archivedAt ? new Date(y.a.archivedAt).getTime() : 0;
    return yt - xt;
  });

  if (rows.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>Archive is empty</h2>' +
        '<p>Click the archive icon on any task to tuck it away here. Archived items stay around in case you want them back.</p>' +
      '</div>';
    return;
  }

  container.innerHTML =
    '<div class="archive-header"><h2>Archive</h2>' +
      '<div class="archive-sub">' + rows.length + ' archived ' +
      (rows.length === 1 ? 'item' : 'items') + '</div>' +
    '</div>' +
    '<div class="archive-list">' +
      rows.map(r => {
        const when = r.a.archivedAt
          ? new Date(r.a.archivedAt).toLocaleDateString("en-US", { month: "short", day: "numeric" })
          : "";
        return '<div class="archive-row" data-project-id="' + r.p.id + '" data-item-id="' + r.a.id + '">' +
          '<div class="archive-row-main">' +
            '<div class="archive-row-text' + (r.a.done ? " done" : "") + '">' +
              escapeAttr(r.a.text || "(untitled)") +
            '</div>' +
            '<div class="archive-row-meta">' +
              '<span class="proj-tag">' + escapeAttr(r.p.name || "(untitled project)") + '</span>' +
              (when ? '<span class="when">archived ' + when + '</span>' : '') +
            '</div>' +
          '</div>' +
          '<div class="archive-row-actions">' +
            '<button class="btn ghost" data-action="restore-archived">Restore</button>' +
            '<button class="li-rm" data-action="delete-archived" title="Delete forever">×</button>' +

      }).join("") +
    '</div>';
  wireArchive();

function wireArchive() {
  const c = document.getElementById("archive-container");
  c.querySelectorAll('[data-action="restore-archived"]').forEach(btn => {
    btn.addEventListener("click", () => {
      const row = btn.closest('.archive-row');

const JOURNAL_QUESTIONS = [
  { key: "q1", icon: "rewind",

    text: "What's the smallest thing you can do right now to get a win?" }
];
let journalStep = 0;           // Currently visible question (0..3)
let journalReviewMode = false; // After Submit, show read-only review
let journalStarted = false;    // false → show the "Let's have a good day" start screen
let journalCreatedTaskIds = []; // ids of actionables added via the review screen this session
let journalNewProjectMode = false; // true → show the inline "new project" form on review

function getJournalEntry(date) {
  if (!state.journal[date]) state.journal[date] = { q1: "", q2: "", q3: "", q4: "" };
  return state.journal[date];
}
function initJournalView() {
  const entry = getJournalEntry(todayDateString());
  const filled = JOURNAL_QUESTIONS.map(q => (entry[q.key] || "").trim().length > 0);
  journalCreatedTaskIds = []; // reset the "added this visit" list
  journalNewProjectMode = false;
  if (filled.every(Boolean)) {
    journalReviewMode = true;
    journalStarted = true;
  } else if (filled.some(Boolean)) {
    // In-progress today — skip the start screen, resume at the next empty
    journalReviewMode = false;
    journalStarted = true;
    const firstEmpty = filled.findIndex(f => !f);
    journalStep = firstEmpty === -1 ? 0 : firstEmpty;
  } else {
    // Fresh day, no answers yet — show the start screen
    journalReviewMode = false;
    journalStarted = false;
    journalStep = 0;
  }
}
function updateJournal(date, key, value) {
  const e = getJournalEntry(date);
  e[key] = value;
  markJournalDirty(date);
  saveState();
  // Keep the stepper progress markers in sync without disturbing the textarea
  refreshJournalStepper();
}
function renderJournal() {
  const container = document.getElementById("journal-container");
  const date = todayDateString();
  const entry = getJournalEntry(date);

  // Start screen — gentle landing before the first question
  if (!journalStarted && !journalReviewMode) {
    container.innerHTML =
      '<div class="journal-start">' +
        '<div class="journal-start-title">Let\'s have a good day</div>' +
        '<button class="nav-btn primary" id="journal-begin">Begin</button>' +
      '</div>';
    const begin = document.getElementById("journal-begin");
    if (begin) begin.addEventListener("click", () => {
      journalStarted = true;
      renderJournal();
    });
    return;
  }

  // Review screen — read-only summary shown after Submit
  if (journalReviewMode) {
    const today = new Date();
    const dateLabel = today.toLocaleDateString("en-US", {
      weekday: "long", month: "long", day: "numeric"
    });
    const entries = JOURNAL_QUESTIONS.map(q => {
      const ans = (entry[q.key] || "").trim();
      const icon = JOURNAL_ICONS[q.icon] || "";
      return '<div class="entry">' +
        '<div class="q-row">' +
          '<span class="q-icon">' + icon + '</span>' +
          '<div class="q">' + q.text + '</div>' +
        '</div>' +
        '<div class="a' + (ans ? "" : " empty") + '">' +
          (ans ? escapeAttr(ans) : "(no answer)") +
        '</div>' +
      '</div>';
    }).join("");
    // Actionable creator — turn journal answers into action
    const tabsHtml = state.labels.map(l =>
      '<option value="' + l.id + '">' + escapeAttr(l.name || "Unnamed") + '</option>'
    ).join("");
    const statusOpts = STATUSES.map(s =>
      '<option value="' + s + '">' + STATUS_META[s].label + '</option>'
    ).join("");
    const addedHtml = journalCreatedTaskIds.length === 0 ? '' :
      '<div class="journal-tasks-added">' +
        '<div class="added-head">Added today:</div>' +
        journalCreatedTaskIds.map(ref => {
          const proj = findProject(ref.projId);
          const act  = proj ? findActionable(proj, ref.itemId) : null;

          return '<div class="added-row">' +
            '<span class="added-text">' + escapeAttr(act.text || "(untitled)") + '</span>' +

    const projectFieldHtml = journalNewProjectMode
      ? ('<input type="text" id="jt-new-proj-name" class="jt-select jt-new-proj-input" placeholder="New project name *">' +
         '<button class="jt-iconbtn" id="jt-new-proj-cancel" title="Cancel">×</button>')
      : ('<select id="jt-project" class="jt-select" disabled>' +
         '<option value="">Project *</option>' +
         '</select>');

      '<div class="journal-tasks-empty">Create a board first to add actionables here.</div>' :
      ('<div class="journal-task-form">' +

        (journalNewProjectMode ? '' :

    return;

  if (journalStep < 0 || journalStep >= JOURNAL_QUESTIONS.length) journalStep = 0;
  const q = JOURNAL_QUESTIONS[journalStep];
  const value = entry[q.key] || "";

  const steps = JOURNAL_QUESTIONS.map((qq, i) => {
    const filled = (entry[qq.key] || "").trim().length > 0;
    const active = i === journalStep;
    const cls = "step" + (active ? " active" : (filled ? " filled" : ""));
    return '<button class="' + cls + '" data-step="' + i + '" ' +
      'title="Question ' + (i + 1) + (filled ? " · answered" : "") + '"></button>';
  }).join("");

  const isLast = journalStep === JOURNAL_QUESTIONS.length - 1;
  const prevDisabled = journalStep === 0 ? " disabled" : "";

  const iconHtml = JOURNAL_ICONS[q.icon] || "";

  // Only the immediately previous question + answer, grayed for context,
  // rendered below the current question's textarea.
  let priorHtml = "";
  if (journalStep > 0) {
    const pq = JOURNAL_QUESTIONS[journalStep - 1];
    const pa = (entry[pq.key] || "").trim();
    priorHtml =
      '<div class="journal-prior">' +
        '<div class="prior-q">' + pq.text + '</div>' +
        '<div class="prior-a' + (pa ? "" : " empty") + '">' +
          (pa ? escapeAttr(pa) : "(no answer)") +
        '</div>' +
      '</div>';
  }

  container.innerHTML =
    '<div class="journal-card">' +
      '<div class="question-icon">' + iconHtml + '</div>' +
      '<div class="question">' + q.text + '</div>' +
      '<textarea id="journal-textarea" placeholder="Write…">' + escapeAttr(value) + '</textarea>' +
      priorHtml +
      '<div class="journal-nav">' +
        '<button class="nav-btn" id="journal-prev"' + prevDisabled + '>← Previous</button>' +
        '<div class="journal-stepper">' + steps + '</div>' +
        '<button class="nav-btn primary" id="journal-next">' +
          (isLast ? "Submit" : "Next →") +
        '</button>' +
      '</div>' +
    '</div>';
  wireJournal();
  // Auto-focus the textarea for fast typing
  setTimeout(() => {
    const ta = document.getElementById("journal-textarea");
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }, 0);
}
function refreshJournalStepper() {
  const date = todayDateString();
  const entry = getJournalEntry(date);
  document.querySelectorAll('.journal-stepper .step').forEach((el, i) => {
    const filled = (entry[JOURNAL_QUESTIONS[i].key] || "").trim().length > 0;
    el.classList.toggle("active", i === journalStep);
    el.classList.toggle("filled", i !== journalStep && filled);
  });
}
function wireJournal() {
  const container = document.getElementById("journal-container");
  const date = todayDateString();

  // Review screen wiring
  const edit = container.querySelector('#journal-edit');
  if (edit) {
    edit.addEventListener("click", () => {

    // Actionable creator on the review screen — wire inputs + Add button
    const tabSel  = container.querySelector('#jt-tab');

    const newProjToggle  = container.querySelector('#jt-new-proj-toggle');
    const newProjCancel  = container.querySelector('#jt-new-proj-cancel');
    const textInp = container.querySelector('#jt-text');
    const statSel = container.querySelector('#jt-status');
    const todayChk = container.querySelector('#jt-today');
    const addBtn  = container.querySelector('#jt-add');

    function fillProjects(tabId) {
      if (!projSel) return;
      if (!tabId) {
        projSel.innerHTML = '<option value="">Project *</option>';
        projSel.disabled = true;
        return;
      }
      const projs = state.projects.filter(p => p.labelId === tabId);
      projSel.innerHTML = '<option value="">Project *</option>' +
        projs.map(p => '<option value="' + p.id + '">' +
          escapeAttr(p.name || "(untitled)") + '</option>').join("");
      projSel.disabled = false;
    }
    if (tabSel) tabSel.addEventListener("change", () => fillProjects(tabSel.value));

    // "+ Create new project" — swap the project dropdown for a name input
    if (newProjToggle) newProjToggle.addEventListener("click", (e) => {
      e.preventDefault();
      journalNewProjectMode = true;
      renderJournal();
      setTimeout(() => {
        const i = document.getElementById("jt-new-proj-name");
        if (i) i.focus();
      }, 0);
    });
    if (newProjCancel) newProjCancel.addEventListener("click", (e) => {
      e.preventDefault();
      journalNewProjectMode = false;
      renderJournal();
    });

    if (addBtn) addBtn.addEventListener("click", () => {
      const text  = (textInp.value || "").trim();
      const tabId = tabSel.value;
      if (!text)  { textInp.focus(); return; }
      if (!tabId) { tabSel.focus();  return; }

      // Resolve the target project — either pick existing or create-on-the-fly
      let proj;
      if (journalNewProjectMode) {
        const name = (newProjInp.value || "").trim();
        if (!name) { newProjInp.focus(); return; }
        const now = new Date().toISOString();
        proj = { id: uid(), name, goal: "", labelId: tabId, actionables: [], createdAt: now };
        state.projects.unshift(proj);
        markProjectDirty(proj.id);
        // Other projects shifted down — sync their positions
        markAllProjectsDirty();
      } else {
        const projId = projSel.value;
        if (!projId) { projSel.focus(); return; }
        proj = findProject(projId);
        if (!proj) return;
      }

      // Build the actionable so status/today apply atomically
      const now = new Date().toISOString();
      const a = {
        id: uid(), text, done: false, status: null,
        blocker: "", waitingFor: "",
        createdAt: now, updatedAt: now,
        priority: 0,
        stuckSince: null, doneAt: null,
        parentId: null, notes: "",
        archived: false, archivedAt: null,
        today: !!(todayChk && todayChk.checked)
      };
      const st = statSel.value || null;
      if (st && STATUSES.includes(st)) {
        a.status = st;
        if (st === "stuck") a.stuckSince = now;
      }
      proj.actionables.push(a);
      markActionDirty(a.id);
      saveState();
      journalCreatedTaskIds.unshift({ projId: proj.id, itemId: a.id });

      // Reset inputs (close new-project mode after creating) and re-render
      journalNewProjectMode = false;
      renderJournal();
      setTimeout(() => {
        const ta = document.getElementById("jt-text");
        if (ta) ta.focus();
      }, 0);
    });
    return;
  }

  const ta = container.querySelector('#journal-textarea');
  if (ta) {
    ta.addEventListener("input", () => {
      updateJournal(date, JOURNAL_QUESTIONS[journalStep].key, ta.value);
    });
  }
  container.querySelectorAll('.journal-stepper .step').forEach(btn => {
    btn.addEventListener("click", () => {
      const i = parseInt(btn.dataset.step, 10);
      if (Number.isNaN(i)) return;
      journalStep = i;
      renderJournal();
    });
  });
  const prev = container.querySelector('#journal-prev');
  if (prev) prev.addEventListener("click", () => {
    if (journalStep > 0) { journalStep--; renderJournal(); }
  });
  const next = container.querySelector('#journal-next');
  if (next) next.addEventListener("click", () => {
    if (journalStep < JOURNAL_QUESTIONS.length - 1) {
      journalStep++; renderJournal();
    } else {
      // Submitting the last answer → flip to read-only review
      journalReviewMode = true;
      renderJournal();
    }
  });
}

function renderAll() {
  renderDateHeader();
  renderDailyDashboard();
  renderWindDown();
  renderFilterBar();
  renderTabs();
  // Re-validate currentView in case labels/projects changed
  const valid = validViews();
  if (!valid.has(currentView)) {
    currentView = "home";
    window.localStorage.setItem("view", currentView);
    renderTabs();
  }
  document.getElementById('journal-view').style.display  = currentView === 'journal' ? 'block' : 'none';
  document.getElementById('home-view').style.display     = currentView === 'home'    ? 'block' : 'none';
  document.getElementById('archive-view').style.display  = currentView === 'archive' ? 'block' : 'none';
  document.getElementById('projects-view').style.display =
    (currentView !== 'home' && currentView !== 'journal' && currentView !== 'archive') ? 'block' : 'none';
  document.body.classList.toggle('journal-mode', currentView === 'journal');
  if (currentView === "journal")      renderJournal();
  else if (currentView === "archive") renderArchive();
  else if (currentView === "home")    renderHome();
  else                                 renderProjects();
}

// ─── Export / Import ──────────────────────────────────
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "projects-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importDataFromFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.projects || !Array.isArray(parsed.projects)) throw new Error("Missing 'projects' array");
      if (!confirm("This will replace your current data with the imported file. Continue?")) return;
      state = parsed;
      state.labels = state.labels || [];
      state.projects.forEach(p => {
        if (p.labelId === undefined) p.labelId = null;
        if (!p.createdAt) p.createdAt = NOW;
        (p.actionables || []).forEach(a => {
          if (a.status === undefined) {
            const labs = Array.isArray(a.labels) ? a.labels : [];
            if (labs.includes("stuck")) a.status = "stuck";
            else if (labs.includes("today")) a.status = "today";
            else if (labs.includes("waiting")) a.status = "waiting";
            else a.status = null;
          }
          if (typeof a.blocker !== "string") a.blocker = "";
          if (typeof a.waitingFor !== "string") a.waitingFor = "";
          if (!a.createdAt) a.createdAt = NOW;
          if (!a.updatedAt) a.updatedAt = a.createdAt;
          if (typeof a.priority !== "number") a.priority = 0;
          if (a.stuckSince === undefined) a.stuckSince = a.status === "stuck" ? NOW : null;
          if (a.doneAt === undefined) a.doneAt = a.done ? NOW : null;
          delete a.labels;
          delete a.dueDate;
        });
      });
      saveState();
      renderAll();
      alert("✓ Imported " + state.projects.length + " projects, " + state.labels.length + " tabs");
    } catch (err) {
      alert("Couldn't read that file: " + err.message);
    }
  };
  reader.readAsText(file);
}

document.getElementById("import-btn").addEventListener("click", () => document.getElementById("import-file").click());
document.getElementById("import-file").addEventListener("change", (e) => {

});

// ─── Cloud data layer ──────────────────────────────────
async function loadStateFromCloud() {
  if (!sb || !currentUser) return;
  const [tabsRes, projectsRes, actionablesRes, prefsRes, journalRes] = await Promise.all([
    sb.from('tabs').select('*').order('position', { ascending: true }),
    sb.from('projects').select('*').order('position', { ascending: true }),
    sb.from('actionables').select('*').order('position', { ascending: true }),
    sb.from('user_prefs').select('*').eq('user_id', currentUser.id).maybeSingle(),
    sb.from('journal_entries').select('*').order('entry_date', { ascending: false }).limit(60)
  ]);
  if (tabsRes.error)        console.error('tabs', tabsRes.error);
  if (projectsRes.error)    console.error('projects', projectsRes.error);
  if (actionablesRes.error) console.error('actionables', actionablesRes.error);
  if (prefsRes.error)       console.error('prefs', prefsRes.error);
  if (journalRes && journalRes.error) console.error('journal', journalRes.error);

  state.labels = (tabsRes.data || []).map(t => ({ id: t.id, name: t.name || '', color: t.color || '#ff6b47' }));

  const byProject = {};
  (actionablesRes.data || []).forEach(a => {
    // Migrate legacy cloud rows where status was "today" / "waiting"
    let st = a.status || null;
    let todayFlag = !!a.today;
    if (st === "today") { st = "in_progress"; todayFlag = true; }
    if (st === "waiting") st = null;
    (byProject[a.project_id] = byProject[a.project_id] || []).push({
      id: a.id, text: a.text || '', done: !!a.done, status: st,
      priority: a.priority || 0, blocker: a.blocker || '', waitingFor: a.waiting_for || '',
      notes: a.notes || '',
      parentId: a.parent_id || null,
      archived: !!a.archived,
      archivedAt: a.archived_at || null,
      today: todayFlag,
      createdAt: a.created_at, updatedAt: a.updated_at, doneAt: a.done_at, stuckSince: a.stuck_since,
      labels: []
    });
  });

  state.projects = (projectsRes.data || []).map(p => ({
    id: p.id, name: p.name || '', goal: p.goal || '', labelId: p.tab_id || null,
    actionables: byProject[p.id] || [], createdAt: p.created_at
  }));

  // Per-view filter selections live only in localStorage (state.filters is
  // already populated from there). Pull view + keystone from cloud.
  state.filters = state.filters || {};
  let cloudView = (prefsRes.data && prefsRes.data.current_view) || "home";
  if (cloudView === "today") cloudView = "home";
  currentView = cloudView;
  if (prefsRes.data) {
    state.keystone = {
      date: prefsRes.data.keystone_date || null,
      text: prefsRes.data.keystone_text || "",
      done: !!prefsRes.data.keystone_done
    };
    state.windDown = {
      hour:   (typeof prefsRes.data.winddown_hour   === "number") ? prefsRes.data.winddown_hour   : 20,
      minute: (typeof prefsRes.data.winddown_minute === "number") ? prefsRes.data.winddown_minute : 0,
      startHour:   (typeof prefsRes.data.winddown_start_hour   === "number") ? prefsRes.data.winddown_start_hour   : 8,
      startMinute: (typeof prefsRes.data.winddown_start_minute === "number") ? prefsRes.data.winddown_start_minute : 0,
      lastTriggeredDate: prefsRes.data.winddown_last_triggered || null
    };
  }
  // Journal entries (last 60 days)
  state.journal = {};
  (journalRes && journalRes.data || []).forEach(row => {
    state.journal[row.entry_date] = {
      q1: row.q1 || '', q2: row.q2 || '', q3: row.q3 || '', q4: row.q4 || ''
    };
  });
}

// ─── Dirty tracking + debounced flush ──────────────────
const dirty = {
  tabs: new Set(), projects: new Set(), actionables: new Set(),
  delTabs: new Set(), delProjects: new Set(), delActionables: new Set(),
  journal: new Set(),
  prefs: false
};
let flushTimer = null;
function scheduleFlush() {
  if (!syncEnabled) return;
  if (flushTimer) return;
  flushTimer = setTimeout(async () => { flushTimer = null; await flushDirty(); }, 600);
}
function markTabDirty(id)        { dirty.tabs.add(id);        scheduleFlush(); }
function markTabDeleted(id)      { dirty.delTabs.add(id);     dirty.tabs.delete(id); scheduleFlush(); }
function markProjectDirty(id)    { dirty.projects.add(id);    scheduleFlush(); }
function markProjectDeleted(id)  { dirty.delProjects.add(id); dirty.projects.delete(id); scheduleFlush(); }
function markActionDirty(id)     { dirty.actionables.add(id); scheduleFlush(); }
function markActionDeleted(id)   { dirty.delActionables.add(id); dirty.actionables.delete(id); scheduleFlush(); }
function markPrefsDirty()        { dirty.prefs = true;        scheduleFlush(); }
function markJournalDirty(date)  { dirty.journal.add(date);   scheduleFlush(); }
function markAllTabsDirty()      { state.labels.forEach(l => dirty.tabs.add(l.id)); scheduleFlush(); }
function markAllProjectsDirty()  { state.projects.forEach(p => dirty.projects.add(p.id)); scheduleFlush(); }
function markProjectActionsDirty(projId) {
  const p = findProject(projId); if (!p) return;
  p.actionables.forEach(a => dirty.actionables.add(a.id));
  scheduleFlush();
}

function findActionableLocation(id) {
  for (const p of state.projects) {
    const idx = p.actionables.findIndex(a => a.id === id);
    if (idx !== -1) return { project: p, actionable: p.actionables[idx], position: idx };
  }
  return null;
}

async function flushDirty() {
  if (!sb || !currentUser) return;
  const ops = [];

  // Tabs upsert (parent rows before children)
  dirty.tabs.forEach(id => {
    const idx = state.labels.findIndex(l => l.id === id);
    if (idx === -1) return;
    const t = state.labels[idx];
    ops.push(sb.from('tabs').upsert({
      id: t.id, owner_id: currentUser.id,
      name: t.name || '', color: t.color || '#ff6b47',
      position: idx
    }));
  });
  dirty.projects.forEach(id => {
    const idx = state.projects.findIndex(p => p.id === id);
    if (idx === -1) return;
    const p = state.projects[idx];
    ops.push(sb.from('projects').upsert({
      id: p.id, owner_id: currentUser.id, tab_id: p.labelId || null,
      name: p.name || '', goal: p.goal || '', position: idx
    }));
  });
  dirty.actionables.forEach(id => {
    const loc = findActionableLocation(id);
    if (!loc) return;
    const a = loc.actionable;
    ops.push(sb.from('actionables').upsert({
      id: a.id, project_id: loc.project.id,
      text: a.text || '', done: !!a.done, status: a.status || null,
      priority: a.priority || 0,
      blocker: a.blocker || '', waiting_for: a.waitingFor || '',
      notes: a.notes || '',
      parent_id: a.parentId || null,
      archived: !!a.archived,
      archived_at: a.archivedAt || null,
      today: !!a.today,
      position: loc.position,
      updated_at: a.updatedAt || new Date().toISOString(),
      done_at: a.doneAt || null, stuck_since: a.stuckSince || null
    }));
  });
  // Deletions: children first
  dirty.delActionables.forEach(id => ops.push(sb.from('actionables').delete().eq('id', id)));
  dirty.delProjects.forEach(id    => ops.push(sb.from('projects').delete().eq('id', id)));
  dirty.delTabs.forEach(id        => ops.push(sb.from('tabs').delete().eq('id', id)));
  if (dirty.prefs) {
    // Filters stay device-local; view name + keystone + wind-down sync.
    const k = state.keystone || {};
    const w = state.windDown || {};
    ops.push(sb.from('user_prefs').upsert({
      user_id: currentUser.id,
      current_view: currentView || 'home',
      keystone_date: k.date || null,
      keystone_text: k.text || '',
      keystone_done: !!k.done,
      winddown_hour: (typeof w.hour === "number") ? w.hour : 20,
      winddown_minute: (typeof w.minute === "number") ? w.minute : 0,
      winddown_start_hour: (typeof w.startHour === "number") ? w.startHour : 8,
      winddown_start_minute: (typeof w.startMinute === "number") ? w.startMinute : 0,
      winddown_last_triggered: w.lastTriggeredDate || null
    }));
  }
  // Journal entries: upsert each dirty day
  dirty.journal.forEach(date => {
    const e = (state.journal && state.journal[date]) || { q1: "", q2: "", q3: "", q4: "" };
    ops.push(sb.from('journal_entries').upsert({
      user_id: currentUser.id,
      entry_date: date,
      q1: e.q1 || '', q2: e.q2 || '', q3: e.q3 || '', q4: e.q4 || '',
      updated_at: new Date().toISOString()
    }));
  });
  // reset
  dirty.tabs.clear(); dirty.projects.clear(); dirty.actionables.clear();
  dirty.delTabs.clear(); dirty.delProjects.clear(); dirty.delActionables.clear();
  dirty.journal.clear();
  dirty.prefs = false;
  try {
    const results = await Promise.all(ops);
    const errs = results.filter(r => r && r.error);
    if (errs.length) console.error('sync errors', errs.map(r => r.error));
  } catch (e) {
    console.error('Sync failed:', e);
  }
}

// ─── Migration from localStorage ───────────────────────
async function maybeMigrateLocalStorage() {
  if (!sb || !currentUser) return;
  // Check if user already has cloud data
  const { count } = await sb.from('projects').select('*', { count: 'exact', head: true });
  if (count && count > 0) return;
  const raw = localStorage.getItem('projects-v1');
  if (!raw) return;
  let local;
  try { local = JSON.parse(raw); } catch (e) { return; }
  if (!local || !local.projects || !local.projects.length) return;

  const total = local.projects.length;
  if (!confirm("Found " + total + " project" + (total === 1 ? "" : "s") + " saved on this device. Import them into your Slate account so they sync across devices?")) return;

  if (local.labels && local.labels.length) {
    const tabs = local.labels.map((l, i) => ({
      id: l.id, owner_id: currentUser.id,
      name: l.name || '', color: l.color || '#ff6b47', position: i
    }));
    const tabsRes = await sb.from('tabs').insert(tabs);
    if (tabsRes.error) console.error('tab migration error', tabsRes.error);
  }
  const projects = local.projects.map((p, i) => ({
    id: p.id, owner_id: currentUser.id, tab_id: p.labelId || null,
    name: p.name || '', goal: p.goal || '', position: i
  }));
  const projsRes = await sb.from('projects').insert(projects);
  if (projsRes.error) console.error('project migration error', projsRes.error);

  const acts = [];
  local.projects.forEach(p => {
    (p.actionables || []).forEach((a, i) => {
      let st = a.status || null;
      let todayFlag = !!a.today;
      if (st === "today") { st = "in_progress"; todayFlag = true; }
      acts.push({
        id: a.id, project_id: p.id,
        text: a.text || '', done: !!a.done, status: st,
        priority: a.priority || 0,
        blocker: a.blocker || '', waiting_for: a.waitingFor || '',
        notes: a.notes || '',
        parent_id: a.parentId || null,
        today: todayFlag,
        position: i,
        created_at: a.createdAt || new Date().toISOString(),
        updated_at: a.updatedAt || a.createdAt || new Date().toISOString(),
        done_at:    a.doneAt    || null,
        stuck_since: a.stuckSince || null
      });
    });
  });
  if (acts.length) {
    const actsRes = await sb.from('actionables').insert(acts);
    if (actsRes.error) console.error('actionable migration error', actsRes.error);
  }
}

// ─── Init flow ─────────────────────────────────────────
async function initAfterAuth() {
  syncEnabled = false;
  await maybeMigrateLocalStorage();
  await loadStateFromCloud();
  document.getElementById('signed-in').style.display = '';
  const emailEl = document.getElementById('signed-in-email');
  if (emailEl) emailEl.textContent = (currentUser && currentUser.email) || '';
  showApp();
  setView(currentView);
  syncEnabled = true;
}

async function bootstrap() {
  if (!sb) {
    setAuthError('Auth library failed to load. Refresh the page.');
    showAuthScreen();
    return;
  }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      currentUser = session.user;
      await initAfterAuth();
    } else {
      showAuthScreen();
    }
  } catch (e) {
    console.error(e);
    showAuthScreen();
  }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session && session.user && !currentUser) {
      currentUser = session.user;
      await initAfterAuth();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      state = {
        projects: [], labels: [], filters: {},
        keystone: { date: null, text: "", done: false },
        windDown: { hour: 20, minute: 0, startHour: 8, startMinute: 0, lastTriggeredDate: null },
        deepWork: { active: false, startedAt: null, durationMs: 75 * 60 * 1000,
                    completedToday: 0, completedDate: null },
        journal: {}
      };
      showAuthScreen();
    }
  });
}

bootstrap();

// Wind-down countdown ticker: refreshes the chip every second and triggers
// the auto-clear at the configured time. Runs for the whole app lifetime.
setInterval(tickWindDown, 1000);
</script>
