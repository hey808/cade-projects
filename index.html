function renderDateHeader() {
  const now = new Date();
  document.getElementById("header-date").textContent =
    now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  document.getElementById("dd-date-text").textContent =
    now.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

// ─── Daily progress dashboard ──────────────────────────
function renderDailyDashboard() {
  let todayTotal = 0, todayDone = 0;
  let openTotal = 0, stuck = 0, waiting = 0, backburner = 0;
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (a.status === "today") {
        todayTotal++;
        if (a.done) todayDone++;
      }
      if (!a.done) {
        openTotal++;
        if (a.status === "stuck") stuck++;
        else if (a.status === "waiting") waiting++;
        else if (a.status === "backburner") backburner++;
      }
    });
  });
  const pct = todayTotal === 0 ? 0 : Math.round((todayDone / todayTotal) * 100);
  document.getElementById("dd-progress-fill").style.width = pct + "%";
  document.getElementById("dd-progress-label").textContent =
    todayTotal === 0 ? "Nothing on today" :
    todayDone + " / " + todayTotal + "  ·  " + pct + "%";
  document.getElementById("dd-stats").innerHTML =
    "<strong>" + state.projects.length + "</strong> project" + (state.projects.length === 1 ? "" : "s");
}

// ─── Filter bar ────────────────────────────────────────
function buildDropdownHtml(type, labelText, currentValue, options) {
  const isOpen = activeFilterDropdown === type;
  const current = options.find(o => o.value === currentValue) || options[0];
  const isActive = currentValue !== null;

  let menuHtml = "";
  if (isOpen) {
    const opts = options.map(o => {
      const selected = o.value === currentValue;
      let valAttr;
      if (o.value === null) valAttr = "__null__";
      else valAttr = String(o.value);
      return '<div class="option' + (selected ? " selected" : "") + '" ' +
        'data-filter-type="' + type + '" data-filter-value="' + escapeAttr(valAttr) + '">' +
        (o.color ? '<span class="dot" style="background:' + o.color + ';"></span>' : '') +
        '<span>' + escapeAttr(o.label) + '</span>' +
        (selected ? '<span class="check">✓</span>' : '') +
      '</div>';
    }).join("");
    menuHtml = '<div class="filter-dropdown-menu">' + opts + '</div>';
  }

  return '<div class="filter-dropdown">' +
    '<button class="filter-dropdown-btn' + (isActive ? " active" : "") + '" data-filter-dropdown="' + type + '">' +
      (current.color ? '<span class="dot small" style="background:' + current.color + ';"></span>' : '') +
      '<span class="label">' + labelText + ':</span>' +
      '<span class="value">' + escapeAttr(current.label) + '</span>' +
      '<span class="caret">▾</span>' +
    '</button>' +
    menuHtml +
  '</div>';
}

function renderFilterBar() {
  const bar = document.getElementById("filter-bar");
  const fs = getCurrentFilters();

  const statusOpts = [
    { value: null,        label: "All" },
    { value: "today",     label: "Today",      color: "#ff6b47" },
    { value: "backburner",label: "Backburner", color: "#888890" },
    { value: "waiting",   label: "Waiting",    color: "#3b82f6" },
    { value: "stuck",     label: "Stuck",      color: "#dc2626" },
    { value: "none",      label: "No status",  color: "#4d4d54" }
  ];
  const priorityOpts = [
    { value: null, label: "All" },
    { value: 0,    label: "None",   color: "#5c5c64" },
    { value: 1,    label: "Low",    color: "#3b82f6" },
    { value: 2,    label: "Medium", color: "#eab308" },
    { value: 3,    label: "High",   color: "#dc2626" }
  ];
  let leftHtml = "";
  // Deep-work button leads the row — toggles between Start and End.
  // Today's completed sessions render as a row of 3 circles right after it.
  const dwActive = !!(state.deepWork && state.deepWork.active);
  const today = todayDateString();
  const completedToday = (state.deepWork.completedDate === today)
    ? (state.deepWork.completedToday || 0) : 0;
  leftHtml += '<button class="btn accent' + (dwActive ? " ending" : "") + '" id="deep-toggle-btn" ' +
    'title="' + (dwActive ? "End the focus session" : "Start a 75-minute focus session") + '">' +
    (dwActive ? "End deep work" : "Start deep work") +
  '</button>';
  let circles = '<div class="deep-circles" title="' + completedToday + ' of 3 sessions today">';
  for (let i = 0; i < 3; i++) {
    circles += '<span class="dc' + (i < completedToday ? " filled" : "") + '"></span>';
  }
  circles += '</div>';
  leftHtml += circles;
  leftHtml += buildDropdownHtml("status",   "Status",   fs.status,   statusOpts);
  leftHtml += buildDropdownHtml("priority", "Priority", fs.priority, priorityOpts);
  if (isStatusFilterActive() || isPriorityFilterActive()) {
    leftHtml += '<button class="filter-clear" id="filter-clear-btn">Clear filters</button>';
  }
  // Stats live on the right edge of the same row, scoped to the active tab
  bar.innerHTML =
    '<div class="filter-bar-left">' + leftHtml + '</div>' +
    renderStatsStrip();

  const tgl = document.getElementById("deep-toggle-btn");
  if (tgl) {
    tgl.addEventListener("click", (e) => {
      e.stopPropagation();
      if (state.deepWork && state.deepWork.active) {
        endDeepWork({ playChime: false });
      } else {
        startDeepWork();
      }
    });
  }

  bar.querySelectorAll('.filter-dropdown-btn').forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const type = btn.dataset.filterDropdown;
      activeFilterDropdown = activeFilterDropdown === type ? null : type;
      renderFilterBar();
    });
  });
  bar.querySelectorAll('.filter-dropdown-menu .option').forEach(opt => {
    opt.addEventListener("click", (e) => {
      e.stopPropagation();
      const type = opt.dataset.filterType;
      let val = opt.dataset.filterValue;
      if (val === "__null__") val = null;
      else if (type === "priority") val = parseInt(val);
      setFilter(type, val);
      activeFilterDropdown = null;
      renderFilterBar();
      if (currentView === "home") renderHome();
      else renderProjects();
      renderTabs(); // home pill count depends on filter
    });
  });
  const clearBtn = document.getElementById("filter-clear-btn");
  if (clearBtn) clearBtn.addEventListener("click", clearFilters);
}

document.addEventListener("click", (e) => {
  if (activeFilterDropdown && !e.target.closest(".filter-dropdown")) {
    activeFilterDropdown = null;
    renderFilterBar();
  }
});


// ─── Render: Projects view ─────────────────────────────
function renderProjects() {
  const container = document.getElementById("projects-container");
  if (state.projects.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>No projects yet</h2>' +
        '<p>Hit <strong>+ New project</strong> to start.</p>' +
      '</div>';
    return;
  }
  const inView = projectsInCurrentView();
  if (inView.length === 0) {
    const viewName =
      currentView === "all" ? "this view" :
      currentView === "uncategorized" ? "Uncategorized" :
      (findLabel(currentView) || {}).name || "this category";
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>No projects in ' + escapeAttr(viewName) + '</h2>' +
        '<p>Hit <strong>+ New project</strong> to add one here, or drag an existing project onto this tab.</p>' +
      '</div>';
    return;
  }
  const finalProjects = inView.filter(p => {
    if (!isItemFilterActive()) return true;
    return p.actionables.some(a => passesAllItemFilters(a));
  });
  if (finalProjects.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>No projects match the current filters</h2>' +
        '<p>Try clearing filters above, or change your filter selection.</p>' +
      '</div>';
    return;
  }
  container.innerHTML = '<div class="projects">' +
    finalProjects.map(renderProject).join("") +
    '</div>';
  wireProjects();
  attachDragHandlers();
  applySearchFilter();
}

function renderProject(p) {
  const l = findLabel(p.labelId);
  const colorAttrs = l ? 'data-label-color="' + l.color + '" style="--proj-color:' + l.color + ';"' : '';

  const filterActive = isItemFilterActive();
  const cutoff = archiveCutoffMs();
  const active = [];
  const recentDone = [];
  const archived = [];
  p.actionables.forEach(a => {
    if (filterActive && !passesAllItemFilters(a)) return;
    if (!a.done) { active.push(a); return; }
    // Completed today → still inline. Completed before today → into archive footer.
    const doneMs = a.doneAt ? new Date(a.doneAt).getTime() : 0;
    if (doneMs >= cutoff) recentDone.push(a);
    else archived.push(a);
  });
  const showArchived = expandedDone.has(p.id);
  let visible = active.concat(recentDone).concat(showArchived ? archived : []);
  // Pull in ancestors so indented children always show their parent context
  // (without this, a visible child whose parent isn't in `visible` would
  // get orphaned by the tree walker).
  visible = withAncestors(p, visible);

  const flat = buildActionableTree(p, visible);

  const doneFooter = archived.length > 0
    ? '<div class="done-footer ' + (showArchived ? "expanded" : "") + '" data-action="toggle-done-footer">' +
        '<span class="caret">' + (showArchived ? "▼" : "▶") + '</span>' +
        (showArchived ? "Hide" : "Show") + ' ' + archived.length + ' completed' +
      '</div>'
    : "";

  return (
    '<article class="project" data-project-id="' + p.id + '" ' + colorAttrs + '>' +
      '<div class="drag-handle" data-drag-handle>⋮⋮</div>' +
      '<button class="delete-btn" data-action="delete-project">Delete</button>' +
      '<div class="proj-header">' +
        '<input type="text" class="proj-name" placeholder="Project name" value="' + escapeAttr(p.name) + '">' +
        '<div class="proj-meta">Actionables<span class="count">' + active.length + ' open</span></div>' +
      '</div>' +
      '<div class="proj-body">' +
        '<ul class="items actionables-list">' +
          (flat.length === 0
            ? '<li style="border:none; padding:0;"><div class="empty-line">No actionables — add one below</div></li>'
            : flat.map(node => renderActionable(p, node.item, node.depth)).join("")
          ) +
        '</ul>' +
        '<button class="btn add-line" data-action="add-actionable">+ Add actionable</button>' +
        doneFooter +
      '</div>' +
    '</article>'
  );
}

function renderStatusChip(p, a) {
  const s = a.status;
  if (!s) {
    return '<button class="status-chip unset" data-action="open-status-picker">Status</button>';
  }
  const meta = STATUS_META[s];
  let label = meta.label;
  if (s === "stuck" && a.stuckSince) {
    const sD = daysSince(a.stuckSince);
    if (sD >= 1) label = "Stuck · " + sD + "d";
  }
  return (
    '<button class="status-chip ' + s + '" data-action="open-status-picker">' +
      '<span class="dot" style="background:' + meta.color + ';"></span>' +
      label +
    '</button>'
  );
}

function renderStatusPicker(p, a) {
  const key = p.id + ":" + a.id;
  if (activeStatusPicker !== key) return "";
  const opts = STATUSES.map(s =>
    '<div class="picker-option" data-action="set-status" data-status="' + s + '">' +
      '<span class="dot" style="background:' + STATUS_META[s].color + ';"></span>' +
      '<span>' + STATUS_META[s].label + '</span>' +
    '</div>'
  ).join("");
  return (
    '<div class="status-picker">' +
      opts +
      (a.status ? '<div class="picker-divider"></div><div class="picker-option clear" data-action="set-status" data-status="">Clear status</div>' : '') +
    '</div>'
  );
}

function renderActionable(p, a, depth) {
  depth = depth || 0;
  const prioLabels = ["P", "LOW", "MED", "HIGH"];
  const prioBtn = '<button class="priority-chip p-' + a.priority + '" data-action="cycle-priority" title="Cycle priority">' +
    (a.priority === 0 ? "P" : prioLabels[a.priority]) + '</button>';

  const ageInfo = ageBadgeData(a.updatedAt || a.createdAt);
  const ageBadge = ageInfo
    ? '<span class="meta-badge level-' + ageInfo.level + '" title="Time since last update">' + ageInfo.text + '</span>'
    : "";

  let contextRow = "";
  if (a.status === "stuck") {
    contextRow =
      '<div class="context-row stuck">' +
        '<span class="lbl">Blocker:</span>' +
        '<input type="text" data-action="update-blocker" ' +
          'placeholder="What\'s in the way?" value="' + escapeAttr(a.blocker || "") + '">' +
      '</div>';
  } else if (a.status === "waiting") {
    contextRow =
      '<div class="context-row waiting">' +
        '<span class="lbl">Waiting for:</span>' +
        '<input type="text" data-action="update-waiting-for" ' +
          'placeholder="Who or what?" value="' + escapeAttr(a.waitingFor || "") + '">' +
      '</div>';
  }

  // Google Calendar prefill — opens calendar.google.com with a templated event
  const gcalHref = gcalUrl(a);
  const gcalBtn =
    '<a class="row-tool" href="' + escapeAttr(gcalHref) + '" target="_blank" rel="noopener" ' +
      'data-action="open-gcal" title="Add to Google Calendar">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<rect x="3" y="4" width="18" height="18" rx="2"/>' +
        '<line x1="16" y1="2" x2="16" y2="6"/>' +
        '<line x1="8" y1="2" x2="8" y2="6"/>' +
        '<line x1="3" y1="10" x2="21" y2="10"/>' +
      '</svg>' +
    '</a>';

  // Notes toggle — chevron caret. Highlights when notes exist or panel is open.
  const notesOpen = expandedNotes.has(a.id);
  const hasNotes = !!(a.notes && a.notes.trim().length);
  const notesClass = "row-tool" + (notesOpen ? " expanded" : (hasNotes ? " has-content" : ""));
  const notesBtn =
    '<button class="' + notesClass + '" data-action="toggle-notes" ' +
      'title="' + (hasNotes ? "Notes" : "Add notes") + '">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<line x1="4" y1="7" x2="20" y2="7"/>' +
        '<line x1="4" y1="12" x2="20" y2="12"/>' +
        '<line x1="4" y1="17" x2="14" y2="17"/>' +
      '</svg>' +
    '</button>';

  const notesPanel = notesOpen
    ? '<div class="notes-panel">' +
        '<textarea data-action="update-notes" placeholder="Notes, context, links…">' +
          escapeAttr(a.notes || "") +
        '</textarea>' +
      '</div>'
    : "";

  return (
    '<li data-item-id="' + a.id + '" data-depth="' + depth + '" class="' + (a.done ? "done" : "") + '">' +
      '<div class="item-row">' +
        '<span class="item-drag-handle" data-item-drag-handle>⋮⋮</span>' +
        '<input type="checkbox" data-action="toggle-actionable"' + (a.done ? " checked" : "") + '>' +
        prioBtn +
        '<input type="text" class="item-text" data-action="update-actionable" ' +
          'placeholder="What needs to be done?" value="' + escapeAttr(a.text) + '">' +
        ageBadge +
        '<div class="status-wrap">' +
          renderStatusChip(p, a) +
          renderStatusPicker(p, a) +
        '</div>' +
        gcalBtn +
        notesBtn +
        '<button class="li-rm" data-action="remove-actionable" title="Remove">×</button>' +
      '</div>' +
      contextRow +
      notesPanel +
    '</li>'
  );
}

// Google Calendar template URL with title + details prefilled.
// We don't pass `dates` so the user picks the time on Google's side.
function gcalUrl(a) {
  const title = (a.text && a.text.trim()) || 'Untitled task';
  const detailParts = [];
  if (a.notes && a.notes.trim()) detailParts.push(a.notes.trim());
  if (a.blocker)    detailParts.push('Blocker: ' + a.blocker);
  if (a.waitingFor) detailParts.push('Waiting for: ' + a.waitingFor);
  detailParts.push('— from Slate');
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: title,
    details: detailParts.join('\n\n')
  });
  return 'https://calendar.google.com/calendar/render?' + params.toString();
}

// ─── Wire project events ───────────────────────────────
function wireProjects() {
  const container = document.getElementById("projects-container");

  container.querySelectorAll('[data-action]').forEach(el => {
    if (el.tagName === "INPUT") return;
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const action = el.dataset.action;
      const proj = el.closest('[data-project-id]');
      const projId = proj && proj.dataset.projectId;
      const item = el.closest('[data-item-id]');
      const itemId = item && item.dataset.itemId;

      if (action === "delete-project")          deleteProject(projId);
      else if (action === "add-actionable")     addActionable(projId);
      else if (action === "remove-actionable")  removeActionable(projId, itemId);
      else if (action === "cycle-priority")     cyclePriority(projId, itemId);
      else if (action === "toggle-done-footer") {
        if (expandedDone.has(projId)) expandedDone.delete(projId);
        else expandedDone.add(projId);
        renderProjects();
      }
      else if (action === "open-status-picker") {
        const key = projId + ":" + itemId;
        activeStatusPicker = activeStatusPicker === key ? null : key;
        renderProjects();
      }
      else if (action === "set-status") {
        const status = el.dataset.status || null;
        setActionableStatus(projId, itemId, status);
        activeStatusPicker = null;
        // setActionableStatus calls renderAll
      }
      else if (action === "toggle-notes") {
        if (expandedNotes.has(itemId)) expandedNotes.delete(itemId);
        else expandedNotes.add(itemId);

            const ta = document.querySelector('[data-item-id="' + itemId + '"] textarea[data-action="update-notes"]');
            if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }

// ─── Drag and drop ─────────────────────────────────────
function attachDragHandlers() {
  document.querySelectorAll('.project').forEach(article => {
    const handle = article.querySelector('[data-drag-handle]');
    if (!handle) return;
    handle.addEventListener("mousedown", () => { article.draggable = true; });
    handle.addEventListener("mouseup", () => { article.draggable = false; });
    article.addEventListener("dragstart", (e) => {
      if (!article.draggable) return;
      e.stopPropagation();
      article.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("application/x-project", article.dataset.projectId);
    });
    article.addEventListener("dragend", () => {
      article.classList.remove("dragging");
      article.draggable = false;
      document.querySelectorAll('.project.drag-over').forEach(el => el.classList.remove("drag-over"));
    });
    article.addEventListener("dragover", (e) => {
      if (!Array.from(e.dataTransfer.types).includes("application/x-project")) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (!article.classList.contains("dragging")) article.classList.add("drag-over");
    });
    article.addEventListener("dragleave", () => article.classList.remove("drag-over"));
    article.addEventListener("drop", (e) => {
      const draggedId = e.dataTransfer.getData("application/x-project");
      if (!draggedId) return;
      e.preventDefault();
      article.classList.remove("drag-over");
      const targetId = article.dataset.projectId;
      if (draggedId === targetId) return;
      reorderProjects(draggedId, targetId);
    });

    // ── Actionable rows: drag to reorder OR nest as sub-item ──
    // Three drop zones per row (by mouse Y within the row):
    //   top 30%    → place ABOVE as sibling
    //   middle 40% → NEST as child (depth permitting)
    //   bottom 30% → place BELOW as sibling
    function clearActionableDropMarkers() {
      article.querySelectorAll('.actionables-list > li').forEach(el =>
        el.classList.remove("drag-over-above", "drag-over-below", "drag-over-nest"));
    }
    function dropModeFor(li, e) {
      const rect = li.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const h = rect.height;
      if (y < h * 0.30) return "above";
      if (y > h * 0.70) return "below";
      return "nest";
    }

    article.querySelectorAll('.actionables-list > li').forEach(li => {
      const ah = li.querySelector('[data-item-drag-handle]');
      if (!ah) return;
      ah.addEventListener("mousedown", () => { li.draggable = true; });
      ah.addEventListener("mouseup", () => { li.draggable = false; });
      li.addEventListener("dragstart", (e) => {
        if (!li.draggable) return;
        e.stopPropagation();
        li.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("application/x-actionable", li.dataset.itemId);
        e.dataTransfer.setData("application/x-actionable-proj", article.dataset.projectId);
      });
      li.addEventListener("dragend", () => {
        li.classList.remove("dragging");
        li.draggable = false;
        clearActionableDropMarkers();
      });
      li.addEventListener("dragover", (e) => {
        if (!Array.from(e.dataTransfer.types).includes("application/x-actionable")) return;
        if (li.classList.contains("dragging")) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        const mode = dropModeFor(li, e);
        // Reset siblings, then mark this one with the right zone class
        clearActionableDropMarkers();
        li.classList.add("drag-over-" + mode);
      });
      li.addEventListener("dragleave", (e) => {
        // Only clear if leaving the row itself (not a child element)
        if (!li.contains(e.relatedTarget)) {
          li.classList.remove("drag-over-above", "drag-over-below", "drag-over-nest");
        }
      });
      li.addEventListener("drop", (e) => {
        const draggedId = e.dataTransfer.getData("application/x-actionable");
        const draggedProj = e.dataTransfer.getData("application/x-actionable-proj");
        if (!draggedId) return;
        e.preventDefault();
        const mode = dropModeFor(li, e);
        clearActionableDropMarkers();
        if (draggedProj !== article.dataset.projectId) return;
        if (draggedId === li.dataset.itemId) return;
        dropActionable(article.dataset.projectId, draggedId, li.dataset.itemId, mode);
      });
    });
  });
}

function reorderLabels(draggedId, targetId) {
  const draggedIdx = state.labels.findIndex(l => l.id === draggedId);
  if (draggedIdx === -1) return;
  const dragged = state.labels[draggedIdx];
  state.labels.splice(draggedIdx, 1);
  const newTargetIdx = state.labels.findIndex(l => l.id === targetId);
  if (newTargetIdx === -1) { state.labels.splice(draggedIdx, 0, dragged); return; }
  state.labels.splice(newTargetIdx, 0, dragged);
  markAllTabsDirty();
  saveState();
  renderTabs();
}

function reorderProjects(draggedId, targetId) {
  const draggedIdx = state.projects.findIndex(p => p.id === draggedId);
  if (draggedIdx === -1) return;
  const dragged = state.projects[draggedIdx];
  state.projects.splice(draggedIdx, 1);
  const newTargetIdx = state.projects.findIndex(p => p.id === targetId);
  if (newTargetIdx === -1) { state.projects.splice(draggedIdx, 0, dragged); return; }
  state.projects.splice(newTargetIdx, 0, dragged);
  markAllProjectsDirty();
  saveState(); renderProjects();
}

// ─── Search ────────────────────────────────────────────
function applySearchFilter() {
  const term = searchTerm.trim().toLowerCase();
  document.querySelectorAll('.project').forEach(article => {
    const p = findProject(article.dataset.projectId);
    if (!p) return;
    let projectMatches = !term ||
      (p.name && p.name.toLowerCase().includes(term));
    let anyActionableMatches = false;
    article.querySelectorAll('.actionables-list > li').forEach(li => {
      const item = findActionable(p, li.dataset.itemId);
      if (!item) return;
      const matches = !term ||
        projectMatches ||
        (item.text && item.text.toLowerCase().includes(term)) ||
        (item.blocker && item.blocker.toLowerCase().includes(term)) ||
        (item.waitingFor && item.waitingFor.toLowerCase().includes(term));
      li.classList.toggle("hidden-by-search", !matches);
      if (matches && !projectMatches) anyActionableMatches = true;
    });
    article.classList.toggle("hidden-by-search", !!term && !projectMatches && !anyActionableMatches);
  });
}

document.getElementById("search-input").addEventListener("input", (e) => {
  searchTerm = e.target.value;
  applySearchFilter();
});
document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "k") {
    e.preventDefault();
    // Search lives in the projects pane — jump out of Home if needed
    if (currentView === "home") {
      const target = state.labels.length > 0
        ? state.labels[0].id
        : (state.projects.some(p => !p.labelId) ? "uncategorized" : "all");
      setView(target);
    }
    setTimeout(() => document.getElementById("search-input").focus(), 0);
  }
  if (e.key === "Escape" && document.activeElement === document.getElementById("search-input")) {
    document.getElementById("search-input").value = "";
    searchTerm = "";
    applySearchFilter();
    document.getElementById("search-input").blur();
  }
});

// ─── Tab-aware stats (inline in the filter bar) ───────
// Scope: Home counts every project; a tab counts only its own projects.
// All three metrics respect the active per-view filter (status/priority).
function projectsInStatScope() {
  if (currentView === "home") return state.projects;
  return projectsInCurrentView();
}
function calcStatsOpenTotal() {
  let n = 0;
  projectsInStatScope().forEach(p => p.actionables.forEach(a => {
    if (!a.done && passesAllItemFilters(a)) n++;
  }));
  return n;
}
function calcStatsHighPriority() {
  let n = 0;
  projectsInStatScope().forEach(p => p.actionables.forEach(a => {
    if (!a.done && a.priority === 3 && passesAllItemFilters(a)) n++;
  }));
  return n;
}
function calcStatsCompletedThisWeek() {
  // Calendar week starting Sunday at 00:00 local time
  const sunday = new Date();
  sunday.setHours(0, 0, 0, 0);
  sunday.setDate(sunday.getDate() - sunday.getDay());
  const sundayMs = sunday.getTime();
  let n = 0;
  projectsInStatScope().forEach(p => p.actionables.forEach(a => {
    if (!a.done || !a.doneAt) return;
    if (new Date(a.doneAt).getTime() < sundayMs) return;
    if (!passesAllItemFilters(a)) return;
    n++;
  }));
  return n;
}

function renderStatsStrip() {
  const total = calcStatsOpenTotal();
  const high  = calcStatsHighPriority();
  const done  = calcStatsCompletedThisWeek();
  return '<div class="filter-bar-stats">' +
    '<div class="stat high"><span class="lbl">High Prio</span><span class="val">' + high + '</span></div>' +
    '<div class="stat"><span class="lbl">Total</span><span class="val">' + total + '</span></div>' +
    '<div class="stat good"><span class="lbl">Completed</span><span class="val">' + done + '</span></div>' +
  '</div>';
}

// ─── Keystone (One Thing Today) ───────────────────────
function todayDateString() {
  const d = new Date();
  return d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}
function getKeystone() {
  const today = todayDateString();
  // If keystone is from a previous day, surface a blank one for today (but
  // we don't wipe yesterday's text until the user replaces it — they may
  // want to glance back at what their One Thing was).
  if (!state.keystone || state.keystone.date !== today) {
    return { date: today, text: "", done: false, isToday: false,
             previousText: state.keystone && state.keystone.text || "",
             previousDate: state.keystone && state.keystone.date || null };
  }
  return Object.assign({}, state.keystone, { isToday: true });
}
function updateKeystone(field, value) {
  const today = todayDateString();
  if (!state.keystone || state.keystone.date !== today) {
    state.keystone = { date: today, text: "", done: false };
  }
  state.keystone[field] = value;
  if (field === "done") {
    state.keystone.doneAt = value ? new Date().toISOString() : null;
  }
  markPrefsDirty();
  saveState();
}
function renderKeystone() {
  const k = getKeystone();
  const today = new Date();
  const dateLabel = today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  return '<div class="keystone-card">' +
    '<div class="keystone-label">The One Thing</div>' +
    '<div class="keystone-sub">If I do nothing else today — ' + dateLabel + '</div>' +
    '<div class="keystone-row">' +
      '<input type="checkbox" data-action="keystone-done"' + (k.done ? ' checked' : '') + '>' +
      '<input type="text" class="keystone-input' + (k.done ? ' done' : '') + '" ' +
        'data-action="keystone-text" placeholder="One thing that would make today count…" ' +
        'value="' + escapeAttr(k.text) + '">' +
    '</div>' +
  '</div>';
}

// ─── Render: Home view ─────────────────────────────────
// Home shows tasks across ALL tabs, filtered by the Home view's status/priority
// selection (defaults to status="today"). Groups items by their parent project.
function renderHome() {
  const container = document.getElementById("home-list-container");

  const keystoneHtml = renderKeystone();
  const ok = (a) => passesAllItemFilters(a);
  const filters = getCurrentFilters();
  const filterActive = filters.status !== null || filters.priority !== null;

  const groups = [];
  state.projects.forEach(p => {
    let items = p.actionables.filter(a => !a.done && ok(a));
    if (!items.length) return;
    // Keep ancestor context so indentation makes sense in the Home list
    items = withAncestors(p, items);
    const tree = buildActionableTree(p, items);
    groups.push({ project: p, tree });
  });

  if (groups.length === 0) {
    let msg;
    if (filters.status === "today" && filters.priority === null) {
      msg = '<h2>Nothing on today</h2>' +
            '<p>Open a project tab and set an actionable\'s status to <strong>Today</strong>.</p>';
    } else if (filterActive) {
      msg = '<h2>Nothing matches the current filters</h2>' +
            '<p>Try clearing filters above or adjusting the status / priority selection.</p>';
    } else {
      msg = '<h2>No open tasks</h2>' +
            '<p>Add a project and some actionables to get started.</p>';
    }
    container.innerHTML = keystoneHtml + '<div class="empty-state">' + msg + '</div>';
    wireKeystone();
    return;
  }

  container.innerHTML = keystoneHtml + groups.map(g => {
    const items = g.tree.map(n => n.item);
    const openCount = items.filter(i => !i.done).length;
    const l = findLabel(g.project.labelId);
    const labelChip = l ?
      ' <span class="label-chip" style="background:' + l.color + '22; color:' + l.color + '; border-color:' + l.color + '55;">' +
        '<span class="dot" style="background:' + l.color + ';"></span>' + escapeAttr(l.name || "") +
      '</span>'
      : "";
    return (
      '<div class="today-group">' +
        '<h3>' + escapeAttr(g.project.name || "(untitled project)") + labelChip +
          '<span style="color:var(--text-4); font-weight:400; text-transform:none; letter-spacing:0; margin-left:auto;">' +
            openCount + ' / ' + items.length +
          '</span>' +
        '</h3>' +
        '<div class="today-list">' +
          g.tree.map(n => renderHomeItem(g.project, n.item, n.depth)).join("") +
        '</div>' +
      '</div>'
    );
  }).join("");

  wireHomeView();
  wireKeystone();
}

function wireKeystone() {
  const container = document.getElementById("home-list-container");
  const txt = container.querySelector('input[data-action="keystone-text"]');
  const cb  = container.querySelector('input[data-action="keystone-done"]');
  if (txt) {
    txt.addEventListener("input", () => updateKeystone("text", txt.value));
    txt.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); txt.blur(); }
    });
  }
  if (cb) {
    cb.addEventListener("change", () => {
      updateKeystone("done", cb.checked);
      renderHome();
    });
  }
}

function renderHomeItem(p, a, depth) {
  depth = depth || 0;
  return (
    '<div class="today-item' + (a.done ? " done" : "") + '" data-depth="' + depth + '" data-project-id="' + p.id + '" data-item-id="' + a.id + '">' +
      '<input type="checkbox" data-action="home-toggle"' + (a.done ? " checked" : "") + '>' +
      '<div class="text">' + escapeAttr(a.text || "(untitled)") + '</div>' +
      '<div class="proj-tag" data-action="jump-to-project">' + escapeAttr(p.name || "(untitled project)") + '</div>' +
    '</div>'
  );
}

function wireHomeView() {
  const container = document.getElementById("home-list-container");
  container.querySelectorAll('input[type="checkbox"][data-action="home-toggle"]').forEach(cb => {
    cb.addEventListener("change", () => {
      const wrap = cb.closest('.today-item');
      updateActionable(wrap.dataset.projectId, wrap.dataset.itemId, "done", cb.checked);
      renderAll();
    });
  });
  container.querySelectorAll('[data-action="jump-to-project"]').forEach(tag => {
    tag.addEventListener("click", () => {
      const wrap = tag.closest('.today-item');
      const proj = findProject(wrap.dataset.projectId);
      // Jump to the tab that actually contains the project
      const target = proj
        ? (proj.labelId || (state.labels.length === 0 ? "all" : "uncategorized"))
        : (state.labels.length === 0 ? "all" : "uncategorized");
      setView(target);
      setTimeout(() => {
        const el = document.querySelector('[data-project-id="' + wrap.dataset.projectId + '"]');
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 0);
    });
  });
}

        '<div class="review-head">' +
          '<h2>Today\'s Journal</h2>' +
          '<div class="review-sub">' + dateLabel + '</div>' +
        '</div>' +
        entries +
        '<div class="review-actions">' +
          '<button class="btn ghost" id="journal-edit">Edit answers</button>' +
        '</div>' +
      '</div>';
    wireJournal();
    return;
  }

  if (journalStep < 0 || journalStep >= JOURNAL_QUESTIONS.length) journalStep = 0;
  const q = JOURNAL_QUESTIONS[journalStep];
  const value = entry[q.key] || "";

  const steps = JOURNAL_QUESTIONS.map((qq, i) => {
    const filled = (entry[qq.key] || "").trim().length > 0;
    const active = i === journalStep;
    const cls = "step" + (active ? " active" : (filled ? " filled" : ""));
    return '<button class="' + cls + '" data-step="' + i + '" ' +
      'title="Question ' + (i + 1) + (filled ? " · answered" : "") + '"></button>';
  }).join("");

  const isLast = journalStep === JOURNAL_QUESTIONS.length - 1;
  const prevDisabled = journalStep === 0 ? " disabled" : "";

  const iconHtml = JOURNAL_ICONS[q.icon] || "";

  container.innerHTML =
    '<div class="journal-card">' +
      '<div class="question-icon">' + iconHtml + '</div>' +
      '<div class="question">' + q.text + '</div>' +
      '<textarea id="journal-textarea" placeholder="Write…">' + escapeAttr(value) + '</textarea>' +
      '<div class="journal-nav">' +
        '<button class="nav-btn" id="journal-prev"' + prevDisabled + '>← Previous</button>' +
        '<div class="journal-stepper">' + steps + '</div>' +
        '<button class="nav-btn primary" id="journal-next">' +
          (isLast ? "Submit" : "Next →") +
        '</button>' +
      '</div>' +
    '</div>';
  wireJournal();
  // Auto-focus the textarea for fast typing
  setTimeout(() => {
    const ta = document.getElementById("journal-textarea");
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }, 0);
}
function refreshJournalStepper() {
  const date = todayDateString();
  const entry = getJournalEntry(date);
  document.querySelectorAll('.journal-stepper .step').forEach((el, i) => {
    const filled = (entry[JOURNAL_QUESTIONS[i].key] || "").trim().length > 0;
    el.classList.toggle("active", i === journalStep);
    el.classList.toggle("filled", i !== journalStep && filled);
  });
}
function wireJournal() {
  const container = document.getElementById("journal-container");
  const date = todayDateString();

  // Review screen wiring
  const edit = container.querySelector('#journal-edit');
  if (edit) {
    edit.addEventListener("click", () => {
      journalReviewMode = false;
      journalStep = 0;
      renderJournal();
    });
    return;
  }

  const ta = container.querySelector('#journal-textarea');
  if (ta) {
    ta.addEventListener("input", () => {
      updateJournal(date, JOURNAL_QUESTIONS[journalStep].key, ta.value);
    });
  }
  container.querySelectorAll('.journal-stepper .step').forEach(btn => {
    btn.addEventListener("click", () => {
      const i = parseInt(btn.dataset.step, 10);
      if (Number.isNaN(i)) return;
      journalStep = i;
      renderJournal();
    });
  });
  const prev = container.querySelector('#journal-prev');
  if (prev) prev.addEventListener("click", () => {
    if (journalStep > 0) { journalStep--; renderJournal(); }
  });
  const next = container.querySelector('#journal-next');
  if (next) next.addEventListener("click", () => {
    if (journalStep < JOURNAL_QUESTIONS.length - 1) {
      journalStep++; renderJournal();
    } else {
      // Submitting the last answer → flip to read-only review
      journalReviewMode = true;
      renderJournal();
    }
  });
}

function renderAll() {
  renderDateHeader();
  renderDailyDashboard();
  renderWindDown();
  renderFilterBar();
  renderTabs();
  // Re-validate currentView in case labels/projects changed
  const valid = validViews();
  if (!valid.has(currentView)) {
    currentView = "home";
    window.localStorage.setItem("view", currentView);
    renderTabs();
  }
  document.getElementById('journal-view').style.display  = currentView === 'journal' ? 'block' : 'none';
  document.getElementById('home-view').style.display     = currentView === 'home'    ? 'block' : 'none';
  document.getElementById('projects-view').style.display = (currentView !== 'home' && currentView !== 'journal') ? 'block' : 'none';
  document.body.classList.toggle('journal-mode', currentView === 'journal');
  if (currentView === "journal")   renderJournal();
  else if (currentView === "home") renderHome();
  else                              renderProjects();
}

// ─── Export / Import ──────────────────────────────────
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "projects-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importDataFromFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.projects || !Array.isArray(parsed.projects)) throw new Error("Missing 'projects' array");
      if (!confirm("This will replace your current data with the imported file. Continue?")) return;
      state = parsed;
      state.labels = state.labels || [];
      state.projects.forEach(p => {
        if (p.labelId === undefined) p.labelId = null;
        if (!p.createdAt) p.createdAt = NOW;
        (p.actionables || []).forEach(a => {
          if (a.status === undefined) {
            const labs = Array.isArray(a.labels) ? a.labels : [];
            if (labs.includes("stuck")) a.status = "stuck";
            else if (labs.includes("today")) a.status = "today";
            else if (labs.includes("waiting")) a.status = "waiting";
            else a.status = null;
          }
          if (typeof a.blocker !== "string") a.blocker = "";
          if (typeof a.waitingFor !== "string") a.waitingFor = "";
          if (!a.createdAt) a.createdAt = NOW;
          if (!a.updatedAt) a.updatedAt = a.createdAt;
          if (typeof a.priority !== "number") a.priority = 0;
          if (a.stuckSince === undefined) a.stuckSince = a.status === "stuck" ? NOW : null;
          if (a.doneAt === undefined) a.doneAt = a.done ? NOW : null;
          delete a.labels;
          delete a.dueDate;
        });
      });
      saveState();
      renderAll();
      alert("✓ Imported " + state.projects.length + " projects, " + state.labels.length + " tabs");
    } catch (err) {
      alert("Couldn't read that file: " + err.message);
    }
  };
  reader.readAsText(file);
}
document.getElementById("export-btn").addEventListener("click", exportData);
document.getElementById("import-btn").addEventListener("click", () => document.getElementById("import-file").click());
document.getElementById("import-file").addEventListener("change", (e) => {
  if (e.target.files[0]) importDataFromFile(e.target.files[0]);
  e.target.value = "";
});

function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.querySelector('.sidebar').style.display = 'none';
  document.querySelector('.main').style.display = 'none';
  document.getElementById('boot-loading').classList.add('hidden');
}
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.querySelector('.sidebar').style.display = '';
  document.querySelector('.main').style.display = '';
  document.getElementById('boot-loading').classList.add('hidden');
}
function setAuthError(msg) {
  document.getElementById('auth-error').textContent = msg || '';
}
function setAuthBusy(busy) {
  document.getElementById('auth-submit').disabled = busy;
  document.getElementById('auth-google').disabled = busy;
}

// Auth form toggle (sign in / sign up)
document.getElementById('auth-toggle').addEventListener('click', () => {
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  document.getElementById('auth-submit').textContent = authMode === 'signin' ? 'Sign in' : 'Create account';
  document.getElementById('auth-subtitle').textContent = authMode === 'signin' ? 'Sign in to your projects' : 'Create your Slate account';
  document.getElementById('auth-switch-text').textContent = authMode === 'signin' ? "Don't have an account?" : 'Already have an account?';
  document.getElementById('auth-toggle').textContent = authMode === 'signin' ? 'Sign up' : 'Sign in';
  setAuthError('');
});

document.getElementById('auth-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  setAuthError('');
  if (!sb) { setAuthError('Auth library failed to load. Check your connection.'); return; }
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  setAuthBusy(true);
  let res;
  try {
    if (authMode === 'signin') res = await sb.auth.signInWithPassword({ email, password });
    else                       res = await sb.auth.signUp({ email, password });
    if (res.error) setAuthError(res.error.message);
    else if (authMode === 'signup' && !res.data.session) {
      setAuthError('Check your email for a confirmation link, then sign in.');
    }
  } catch (err) {
    setAuthError(err.message || 'Auth failed');
  } finally {
    setAuthBusy(false);
  }
});

document.getElementById('auth-google').addEventListener('click', async () => {
  if (!sb) return;
  setAuthError('');
  setAuthBusy(true);
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
  if (error) { setAuthError(error.message); setAuthBusy(false); }
});

document.getElementById('sign-out-btn').addEventListener('click', async () => {
  if (!sb) return;
  syncEnabled = false;
  await sb.auth.signOut();
});

// ─── Cloud data layer ──────────────────────────────────
async function loadStateFromCloud() {
  if (!sb || !currentUser) return;
  const [tabsRes, projectsRes, actionablesRes, prefsRes, journalRes] = await Promise.all([
    sb.from('tabs').select('*').order('position', { ascending: true }),
    sb.from('projects').select('*').order('position', { ascending: true }),
    sb.from('actionables').select('*').order('position', { ascending: true }),
    sb.from('user_prefs').select('*').eq('user_id', currentUser.id).maybeSingle(),
    sb.from('journal_entries').select('*').order('entry_date', { ascending: false }).limit(60)
  ]);
  if (tabsRes.error)        console.error('tabs', tabsRes.error);
  if (projectsRes.error)    console.error('projects', projectsRes.error);
  if (actionablesRes.error) console.error('actionables', actionablesRes.error);
  if (prefsRes.error)       console.error('prefs', prefsRes.error);
  if (journalRes && journalRes.error) console.error('journal', journalRes.error);

  state.labels = (tabsRes.data || []).map(t => ({ id: t.id, name: t.name || '', color: t.color || '#ff6b47' }));

  const byProject = {};
  (actionablesRes.data || []).forEach(a => {
    (byProject[a.project_id] = byProject[a.project_id] || []).push({
      id: a.id, text: a.text || '', done: !!a.done, status: a.status || null,
      priority: a.priority || 0, blocker: a.blocker || '', waitingFor: a.waiting_for || '',
      notes: a.notes || '',
      parentId: a.parent_id || null,
      createdAt: a.created_at, updatedAt: a.updated_at, doneAt: a.done_at, stuckSince: a.stuck_since,
      labels: []
    });
  });

  state.projects = (projectsRes.data || []).map(p => ({
    id: p.id, name: p.name || '', goal: p.goal || '', labelId: p.tab_id || null,
    actionables: byProject[p.id] || [], createdAt: p.created_at
  }));

  // Per-view filter selections live only in localStorage (state.filters is
  // already populated from there). Pull view + keystone from cloud.
  state.filters = state.filters || {};
  let cloudView = (prefsRes.data && prefsRes.data.current_view) || "home";
  if (cloudView === "today") cloudView = "home";
  currentView = cloudView;
  if (prefsRes.data) {
    state.keystone = {
      date: prefsRes.data.keystone_date || null,
      text: prefsRes.data.keystone_text || "",
      done: !!prefsRes.data.keystone_done
    };
    state.windDown = {
      hour:   (typeof prefsRes.data.winddown_hour   === "number") ? prefsRes.data.winddown_hour   : 20,
      minute: (typeof prefsRes.data.winddown_minute === "number") ? prefsRes.data.winddown_minute : 0,
      lastTriggeredDate: prefsRes.data.winddown_last_triggered || null
    };
  }
  // Journal entries (last 60 days)
  state.journal = {};
  (journalRes && journalRes.data || []).forEach(row => {
    state.journal[row.entry_date] = {
      q1: row.q1 || '', q2: row.q2 || '', q3: row.q3 || '', q4: row.q4 || ''
    };
  });
}

// ─── Dirty tracking + debounced flush ──────────────────
const dirty = {
  tabs: new Set(), projects: new Set(), actionables: new Set(),
  delTabs: new Set(), delProjects: new Set(), delActionables: new Set(),
  journal: new Set(),
  prefs: false
};
let flushTimer = null;
function scheduleFlush() {
  if (!syncEnabled) return;
  if (flushTimer) return;
  flushTimer = setTimeout(async () => { flushTimer = null; await flushDirty(); }, 600);
}
function markTabDirty(id)        { dirty.tabs.add(id);        scheduleFlush(); }
function markTabDeleted(id)      { dirty.delTabs.add(id);     dirty.tabs.delete(id); scheduleFlush(); }
function markProjectDirty(id)    { dirty.projects.add(id);    scheduleFlush(); }
function markProjectDeleted(id)  { dirty.delProjects.add(id); dirty.projects.delete(id); scheduleFlush(); }
function markActionDirty(id)     { dirty.actionables.add(id); scheduleFlush(); }
function markActionDeleted(id)   { dirty.delActionables.add(id); dirty.actionables.delete(id); scheduleFlush(); }
function markPrefsDirty()        { dirty.prefs = true;        scheduleFlush(); }
function markJournalDirty(date)  { dirty.journal.add(date);   scheduleFlush(); }
function markAllTabsDirty()      { state.labels.forEach(l => dirty.tabs.add(l.id)); scheduleFlush(); }
function markAllProjectsDirty()  { state.projects.forEach(p => dirty.projects.add(p.id)); scheduleFlush(); }
function markProjectActionsDirty(projId) {
  const p = findProject(projId); if (!p) return;
  p.actionables.forEach(a => dirty.actionables.add(a.id));
  scheduleFlush();
}

function findActionableLocation(id) {
  for (const p of state.projects) {
    const idx = p.actionables.findIndex(a => a.id === id);
    if (idx !== -1) return { project: p, actionable: p.actionables[idx], position: idx };
  }
  return null;
}

async function flushDirty() {
  if (!sb || !currentUser) return;
  const ops = [];

  // Tabs upsert (parent rows before children)
  dirty.tabs.forEach(id => {
    const idx = state.labels.findIndex(l => l.id === id);
    if (idx === -1) return;
    const t = state.labels[idx];
    ops.push(sb.from('tabs').upsert({
      id: t.id, owner_id: currentUser.id,
      name: t.name || '', color: t.color || '#ff6b47',
      position: idx
    }));
  });
  dirty.projects.forEach(id => {
    const idx = state.projects.findIndex(p => p.id === id);
    if (idx === -1) return;
    const p = state.projects[idx];
    ops.push(sb.from('projects').upsert({
      id: p.id, owner_id: currentUser.id, tab_id: p.labelId || null,
      name: p.name || '', goal: p.goal || '', position: idx
    }));
  });
  dirty.actionables.forEach(id => {
    const loc = findActionableLocation(id);
    if (!loc) return;
    const a = loc.actionable;
    ops.push(sb.from('actionables').upsert({
      id: a.id, project_id: loc.project.id,
      text: a.text || '', done: !!a.done, status: a.status || null,
      priority: a.priority || 0,
      blocker: a.blocker || '', waiting_for: a.waitingFor || '',
      notes: a.notes || '',
      parent_id: a.parentId || null,
      position: loc.position,
      updated_at: a.updatedAt || new Date().toISOString(),
      done_at: a.doneAt || null, stuck_since: a.stuckSince || null
    }));
  });
  // Deletions: children first
  dirty.delActionables.forEach(id => ops.push(sb.from('actionables').delete().eq('id', id)));
  dirty.delProjects.forEach(id    => ops.push(sb.from('projects').delete().eq('id', id)));
  dirty.delTabs.forEach(id        => ops.push(sb.from('tabs').delete().eq('id', id)));
  if (dirty.prefs) {
    // Filters stay device-local; view name + keystone + wind-down sync.
    const k = state.keystone || {};
    const w = state.windDown || {};
    ops.push(sb.from('user_prefs').upsert({
      user_id: currentUser.id,
      current_view: currentView || 'home',
      keystone_date: k.date || null,
      keystone_text: k.text || '',
      keystone_done: !!k.done,
      winddown_hour: (typeof w.hour === "number") ? w.hour : 20,
      winddown_minute: (typeof w.minute === "number") ? w.minute : 0,
      winddown_last_triggered: w.lastTriggeredDate || null
    }));
  }
  // Journal entries: upsert each dirty day
  dirty.journal.forEach(date => {
    const e = (state.journal && state.journal[date]) || { q1: "", q2: "", q3: "", q4: "" };
    ops.push(sb.from('journal_entries').upsert({
      user_id: currentUser.id,
      entry_date: date,
      q1: e.q1 || '', q2: e.q2 || '', q3: e.q3 || '', q4: e.q4 || '',
      updated_at: new Date().toISOString()
    }));
  });
  // reset
  dirty.tabs.clear(); dirty.projects.clear(); dirty.actionables.clear();
  dirty.delTabs.clear(); dirty.delProjects.clear(); dirty.delActionables.clear();
  dirty.journal.clear();
  dirty.prefs = false;
  try {
    const results = await Promise.all(ops);
    const errs = results.filter(r => r && r.error);
    if (errs.length) console.error('sync errors', errs.map(r => r.error));
  } catch (e) {
    console.error('Sync failed:', e);
  }
}

// ─── Migration from localStorage ───────────────────────
async function maybeMigrateLocalStorage() {
  if (!sb || !currentUser) return;
  // Check if user already has cloud data
  const { count } = await sb.from('projects').select('*', { count: 'exact', head: true });
  if (count && count > 0) return;
  const raw = localStorage.getItem('projects-v1');
  if (!raw) return;
  let local;
  try { local = JSON.parse(raw); } catch (e) { return; }
  if (!local || !local.projects || !local.projects.length) return;

  const total = local.projects.length;
  if (!confirm("Found " + total + " project" + (total === 1 ? "" : "s") + " saved on this device. Import them into your Slate account so they sync across devices?")) return;

  if (local.labels && local.labels.length) {
    const tabs = local.labels.map((l, i) => ({
      id: l.id, owner_id: currentUser.id,
      name: l.name || '', color: l.color || '#ff6b47', position: i
    }));
    const tabsRes = await sb.from('tabs').insert(tabs);
    if (tabsRes.error) console.error('tab migration error', tabsRes.error);
  }
  const projects = local.projects.map((p, i) => ({
    id: p.id, owner_id: currentUser.id, tab_id: p.labelId || null,
    name: p.name || '', goal: p.goal || '', position: i
  }));
  const projsRes = await sb.from('projects').insert(projects);
  if (projsRes.error) console.error('project migration error', projsRes.error);

  const acts = [];
  local.projects.forEach(p => {
    (p.actionables || []).forEach((a, i) => {
      acts.push({
        id: a.id, project_id: p.id,
        text: a.text || '', done: !!a.done, status: a.status || null,
        priority: a.priority || 0,
        blocker: a.blocker || '', waiting_for: a.waitingFor || '',
        notes: a.notes || '',
        parent_id: a.parentId || null,
        position: i,
        created_at: a.createdAt || new Date().toISOString(),
        updated_at: a.updatedAt || a.createdAt || new Date().toISOString(),
        done_at:    a.doneAt    || null,
        stuck_since: a.stuckSince || null
      });
    });
  });
  if (acts.length) {
    const actsRes = await sb.from('actionables').insert(acts);
    if (actsRes.error) console.error('actionable migration error', actsRes.error);
  }
}

// ─── Init flow ─────────────────────────────────────────
async function initAfterAuth() {
  syncEnabled = false;
  await maybeMigrateLocalStorage();
  await loadStateFromCloud();
  document.getElementById('signed-in').style.display = '';
  const emailEl = document.getElementById('signed-in-email');
  if (emailEl) emailEl.textContent = (currentUser && currentUser.email) || '';
  showApp();
  setView(currentView);
  syncEnabled = true;
}

async function bootstrap() {
  if (!sb) {
    setAuthError('Auth library failed to load. Refresh the page.');
    showAuthScreen();
    return;
  }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      currentUser = session.user;
      await initAfterAuth();
    } else {
      showAuthScreen();
    }
  } catch (e) {
    console.error(e);
    showAuthScreen();
  }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session && session.user && !currentUser) {
      currentUser = session.user;
      await initAfterAuth();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      state = {
        projects: [], labels: [], filters: {},
        keystone: { date: null, text: "", done: false },
        windDown: { hour: 20, minute: 0, lastTriggeredDate: null },
        deepWork: { active: false, startedAt: null, durationMs: 75 * 60 * 1000,
                    completedToday: 0, completedDate: null },
        journal: {}
      };
      showAuthScreen();
    }
  });
}

bootstrap();

// Wind-down countdown ticker: refreshes the chip every second and triggers
// the auto-clear at the configured time. Runs for the whole app lifetime.
setInterval(tickWindDown, 1000);
