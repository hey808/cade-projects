<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  color-scheme: dark;

  /* Dark grey + red-orange */
  --bg: #1c1c1e;
  --card: #28282c;
  --card-hover: #34343a;
  --border: #3a3a40;
  --border-strong: #4d4d54;
  --text: #f5f5f5;
  --text-2: #b8b8bc;
  --text-3: #888890;
  --text-4: #5c5c64;
  --good: #22c55e;
  --warn: #eab308;
  --bad:  #dc2626;
  --accent: #ff6b47;
  --waiting: #3b82f6;
  --backburner: #888890;
  --prio-high: #dc2626;
  --prio-med:  #eab308;
  --prio-low:  #3b82f6;

  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-serif: 'Fraunces', Georgia, "Times New Roman", serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  background: #16161a;
  border-right: 1px solid var(--border);
  padding: 22px 12px 16px;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 100vh;
  position: sticky;
  top: 0;
}
.sidebar-header { padding: 0 10px; margin-bottom: 18px; }
.sidebar-header h1 {
  font-family: var(--font-serif);
  font-size: 28px; font-weight: 600;
  letter-spacing: -0.02em;
  font-variation-settings: "opsz" 72;
  line-height: 1.05;
}
.sidebar-date {
  font-size: 11px; color: var(--text-3);
  margin-top: 4px; font-weight: 500;
}
.sidebar-tabs {
  display: flex; flex-direction: column;
  gap: 1px;
  flex: 1;
  overflow-y: auto;
  margin: 0 -2px;
  padding: 0 2px;
}
.sidebar-tab-wrap { position: relative; }
.sidebar-tab {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 11px;
  border-radius: 6px;
  cursor: pointer; font-size: 14px;
  color: var(--text-2);
  background: transparent;
  border: none;
  width: 100%;
  font-family: inherit;
  text-align: left;
}
.sidebar-tab:hover { background: var(--card-hover); color: var(--text); }
.sidebar-tab.active { background: var(--card); color: var(--text); font-weight: 600; }
.sidebar-tab.drag-target { background: rgba(255, 107, 71, 0.18); color: var(--text); }
.sidebar-tab.dragging { opacity: 0.4; }
.sidebar-tab[draggable="true"] { cursor: grab; }
.sidebar-tab[draggable="true"]:active { cursor: grabbing; }
.sidebar-tab .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.sidebar-tab .name {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sidebar-tab .pill {
  background: rgba(255, 255, 255, 0.06); color: var(--text-3);
  padding: 1px 7px; border-radius: 8px; font-size: 10px;
  font-variant-numeric: tabular-nums; font-weight: 600;
  flex-shrink: 0;
}
.sidebar-tab.active .pill { background: var(--accent); color: var(--bg); }
.sidebar-tab .edit-icon {
  display: none; color: var(--text-4); font-size: 14px;
  padding: 0 2px; line-height: 1; flex-shrink: 0;
}
.sidebar-tab:hover .edit-icon, .sidebar-tab.active .edit-icon { display: inline-block; }
.sidebar-tab .edit-icon:hover { color: var(--text); }
.sidebar-add {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer; font-size: 13px;
  color: var(--text-4);
  background: transparent;
  border: 1px dashed transparent;
  font-family: inherit;
  width: 100%; text-align: left;
  margin-top: 6px;
}
.sidebar-add:hover {
  color: var(--accent);
  border-color: var(--border-strong);
  background: rgba(255, 107, 71, 0.05);
}
.sidebar-add .dot {
  width: 9px; height: 9px; border-radius: 50%;
  border: 1px dashed currentColor;
  background: transparent;
  flex-shrink: 0;
}
.sidebar-footer {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 2px;
}
.sidebar-footer .btn {
  text-align: left;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text-3);
  padding: 7px 10px;
  font-size: 12px;
  border-radius: 6px;
  font-weight: 500;
}
.sidebar-footer .btn:hover { color: var(--text); background: var(--card); }

/* Popover repositioned for sidebar (open to the right) */
.sidebar-tab-wrap .tab-edit-popover {
  top: 0; left: calc(100% + 8px); right: auto;
  margin-top: 0;
}

/* ── Main column ── */
.main {
  flex: 1;
  padding: 24px 28px 60px;
  min-width: 0;
  max-width: 1100px;
}
.main-header {
  display: flex; justify-content: flex-end; align-items: center;
  gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
}

/* Mobile: stack the layout */
@media (max-width: 760px) {
  body { flex-direction: column; }
  .sidebar {
    width: 100%; height: auto;
    border-right: none; border-bottom: 1px solid var(--border);
    position: relative;
    padding: 16px 14px;
  }
  .sidebar-tabs {
    flex-direction: row; gap: 4px;
    overflow-x: auto; overflow-y: visible;
    padding-bottom: 4px;
  }
  .sidebar-tab { width: auto; white-space: nowrap; }
  .sidebar-add { width: auto; }
  .sidebar-footer {
    flex-direction: row; margin-top: 12px; padding-top: 10px;
  }
  .main { padding: 18px 18px 60px; max-width: none; }
  .sidebar-tab-wrap .tab-edit-popover {
    top: 100%; left: 0; right: auto; margin-top: 6px;
  }
}

/* Search */
.search-wrap { position: relative; }
input.search {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px;
  padding: 7px 11px 7px 28px;
  font-size: 12px; font-family: inherit;
  width: 220px;
  transition: border-color 0.15s, width 0.2s;
}
input.search:focus { outline: none; border-color: var(--accent); width: 280px; }
input.search::placeholder { color: var(--text-4); }
.search-wrap::before {
  content: "⌕"; position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--text-4); font-size: 14px; pointer-events: none;
}
.search-wrap kbd {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: var(--border); color: var(--text-3);
  padding: 1px 5px; border-radius: 3px;
  font-size: 9px; font-family: inherit; font-weight: 500;
  pointer-events: none;
}
input.search:focus + kbd { display: none; }

/* Hero row: wind-down + daily-dashboard side by side */
.hero-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
  align-items: stretch;
}
@media (max-width: 900px) {
  .hero-row { grid-template-columns: 1fr; }
}

/* Wind-down hero section (left half of the hero row) */
.wind-down {
  position: relative;
  background: linear-gradient(135deg, rgba(255,107,71,0.14), rgba(255,107,71,0.02));
  border: 1px solid rgba(255, 107, 71, 0.35);
  border-radius: 12px;
  padding: 14px 18px;
  display: flex; flex-direction: column; justify-content: center;
  gap: 6px;
  cursor: pointer; user-select: none;
  transition: border-color 0.15s, background 0.15s;
  min-height: 100%;
}
.wind-down:hover { border-color: rgba(255, 107, 71, 0.55); }
.wind-down .wd-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.wind-down .wd-label {
  color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.10em;
  font-weight: 700; font-size: 11px;
}
.wind-down .wd-target {
  color: var(--text-3);
  font-size: 12px;
}
.wind-down .wd-time {
  color: var(--text);
  font-family: var(--font-sans);
  font-weight: 800;
  font-size: 34px;
  line-height: 1;
  letter-spacing: -0.025em;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  margin-top: 2px;
}
.wind-down.urgent {
  background: linear-gradient(135deg, rgba(220, 38, 38, 0.18), rgba(220, 38, 38, 0.04));
  border-color: rgba(220, 38, 38, 0.45);
}
.wind-down.urgent .wd-label { color: var(--bad); }
.wind-down.urgent .wd-time  { color: var(--bad); }
.wind-down.done {
  background: linear-gradient(135deg, rgba(34, 197, 94, 0.12), rgba(34, 197, 94, 0.02));
  border-color: rgba(34, 197, 94, 0.35);
}
.wind-down.done .wd-label { color: var(--good); }
.wind-down.done .wd-time  { color: var(--good); font-size: 22px; font-family: var(--font-sans); font-weight: 600; }

/* Deep Work mode — replaces the wind-down card while a focus session runs */
.wind-down.deep {
  background: linear-gradient(135deg, rgba(59, 130, 246, 0.14), rgba(59, 130, 246, 0.02));
  border-color: rgba(59, 130, 246, 0.45);
  cursor: default;
}
.wind-down.deep .wd-label { color: var(--waiting); }
.wind-down.deep .wd-time  { color: var(--waiting); }
.wind-down.deep:hover { border-color: rgba(59, 130, 246, 0.60); }

.deep-corner-btn {
  position: absolute; top: 10px; right: 12px;
  background: transparent;
  border: 1px solid rgba(255,107,71,0.32);
  color: var(--accent);
  padding: 4px 10px; border-radius: 5px;
  font-family: inherit; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  cursor: pointer;
}
.deep-corner-btn:hover {
  background: rgba(255,107,71,0.12);
  border-color: rgba(255,107,71,0.55);
}
.deep-corner-btn.end {
  border-color: rgba(255,255,255,0.18);
  color: var(--text-3);
}
.deep-corner-btn.end:hover {
  color: var(--text);
  background: rgba(255,255,255,0.06);
  border-color: var(--text-3);
}

/* Deep-work toggle + session circles inside the filter bar */
.btn.accent.ending {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
}
.btn.accent.ending:hover { background: rgba(255,107,71,0.10); }

.deep-circles {
  display: inline-flex; align-items: center; gap: 6px;
  margin-left: 2px;
}
.deep-circles .dc {
  width: 11px; height: 11px; border-radius: 50%;
  border: 1.5px solid var(--text-4);
  background: transparent;
  transition: background 0.2s, border-color 0.2s;
}
.deep-circles .dc.filled {
  background: var(--accent);
  border-color: var(--accent);
}

/* Sidebar: Morning Journal special tab + divider */
.sidebar-tab.journal-tab {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 16px;
  letter-spacing: -0.01em;
  color: var(--accent);
  background: rgba(255, 107, 71, 0.05);
  border: 1px solid rgba(255, 107, 71, 0.18);
  padding: 10px 12px;
}
.sidebar-tab.journal-tab:hover {
  background: rgba(255, 107, 71, 0.10);
  border-color: rgba(255, 107, 71, 0.32);
  color: var(--accent);
}
.sidebar-tab.journal-tab.active {
  background: rgba(255, 107, 71, 0.16);
  border-color: rgba(255, 107, 71, 0.45);
  color: var(--accent);
}
.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 10px 8px 10px;
}

/* Morning Journal view — one question at a time, vertically centered */
#journal-view {
  max-width: 760px; margin: 0 auto; padding: 0;
  min-height: calc(100vh - 84px);
  display: flex; flex-direction: column; justify-content: center;
}
.journal-stepper {
  display: flex; gap: 10px;
  margin: 0;
}
.journal-stepper .step {
  width: 10px; height: 10px; border-radius: 50%;
  background: transparent; border: 1.5px solid var(--text-4);
  cursor: pointer; padding: 0;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
}
.journal-stepper .step:hover { border-color: var(--text-3); transform: scale(1.1); }
.journal-stepper .step.active {
  background: var(--accent); border-color: var(--accent);
}
.journal-stepper .step.filled {
  background: var(--accent); border-color: var(--accent); opacity: 0.55;
}
.journal-card {
  display: flex; flex-direction: column; align-items: center;
  gap: 22px;
}
.journal-card .question-icon {
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
  margin-bottom: -4px;
}
.journal-card .question-icon .journal-icon {
  width: 28px; height: 28px;
}
.journal-card .question {
  font-family: var(--font-serif); font-weight: 500;
  font-size: 30px; line-height: 1.25; letter-spacing: -0.02em;
  color: var(--text);
  text-align: center;
  max-width: 640px;
  font-variation-settings: "opsz" 72;
}
.journal-card textarea {
  width: 100%; max-width: 640px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); font-family: inherit;
  font-size: 15px; line-height: 1.6;
  padding: 16px 18px; border-radius: 10px;
  resize: vertical; min-height: 200px;
  text-align: left;
}
.journal-card textarea:focus { outline: none; border-color: var(--accent); }
.journal-card textarea::placeholder { color: var(--text-4); font-style: italic; }
.journal-nav {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  width: 100%; max-width: 640px;
  margin-top: 4px;
}
.journal-nav > .nav-btn:first-child { justify-self: start; }
.journal-nav > .journal-stepper     { justify-self: center; }
.journal-nav > .nav-btn:last-child  { justify-self: end; }
.journal-nav .nav-btn {
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-2);
  padding: 9px 18px; border-radius: 6px;
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.journal-nav .nav-btn:hover:not(:disabled) { color: var(--text); border-color: var(--text-3); }
.journal-nav .nav-btn:disabled { opacity: 0.35; cursor: default; }
.journal-nav .nav-btn.primary {
  background: var(--accent); color: #0a0a0a;
  border-color: var(--accent);
}
.journal-nav .nav-btn.primary:hover { background: #ff7a59; }

/* Hide the daily-dashboard / wind-down / filter bar / page header when
   the journal tab is open — keeps the focus on just the writing. */
body.journal-mode header,
body.journal-mode .hero-row,
body.journal-mode .filter-bar { display: none !important; }

/* Journal review (read-only summary shown after submit) */
.journal-review {
  max-width: 720px; margin: 0 auto;
}
.journal-review .review-head {
  display: flex; align-items: baseline; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 14px;
}
.journal-review .review-head h2 {
  font-family: var(--font-serif); font-weight: 500;
  font-size: 26px; letter-spacing: -0.02em; color: var(--text);
  font-variation-settings: "opsz" 60;
}
.journal-review .review-head .review-sub {
  font-size: 13px; color: var(--text-3);
}
.journal-review .entry {
  margin-bottom: 22px;
  padding: 16px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.journal-review .entry .q-row {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 10px;
}
.journal-review .entry .q-icon {
  color: var(--accent); display: inline-flex;
  flex-shrink: 0;
}
.journal-review .entry .q-icon .journal-icon {
  width: 20px; height: 20px;
}
.journal-review .entry .q {
  font-family: var(--font-serif); font-weight: 500;
  font-size: 17px; line-height: 1.35; letter-spacing: -0.01em;
  color: var(--accent);
}
.journal-review .entry .a {
  font-size: 14px; line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap; word-break: break-word;
}
.journal-review .entry .a.empty {
  color: var(--text-4); font-style: italic;
}
.journal-review .review-actions {
  display: flex; justify-content: center; gap: 12px;
  margin-top: 24px;
}
.journal-review .review-actions .btn {
  padding: 9px 18px; font-size: 13px;
}

.wind-down-popover {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 14px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  z-index: 100; min-width: 240px;
  cursor: default;
}
.wind-down-popover .wd-title {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-3); margin-bottom: 8px;
}
.wind-down-popover .wd-time-input {
  width: 100%;
  background: var(--bg); border: 1px solid var(--border-strong);
  color: var(--text); font-family: inherit;
  padding: 9px 11px; border-radius: 6px; font-size: 14px;
  font-variant-numeric: tabular-nums;
  color-scheme: dark;
}
.wind-down-popover .wd-time-input:focus { outline: none; border-color: var(--accent); }
.wind-down-popover .wd-hint {
  font-size: 12px; color: var(--text-3);
  margin-top: 10px; line-height: 1.45;
}
.wind-down-popover .wd-trigger {
  background: transparent; border: 1px dashed var(--border-strong);
  color: var(--text-3); padding: 8px 11px; border-radius: 5px;
  font-family: inherit; font-size: 12px; cursor: pointer;
  width: 100%; margin-top: 12px;
}
.wind-down-popover .wd-trigger:hover { color: var(--accent); border-color: var(--accent); }

/* Daily progress dashboard — compact, right half of the hero row */
.daily-dashboard {
  background: linear-gradient(135deg, #2e2925 0%, #1c1c1e 100%);
  border: 1px solid rgba(255, 107, 71, 0.28);
  border-radius: 12px;
  padding: 14px 18px;
  display: flex; flex-direction: column; justify-content: center;
  gap: 10px;
}
.dd-progress-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px;
}
.dd-progress-bar {
  flex: 1; height: 8px; background: rgba(255,255,255,0.05);
  border-radius: 4px; overflow: hidden;
}
.dd-progress-bar > div {
  height: 100%; background: linear-gradient(90deg, var(--good) 0%, #16a34a 100%);
  transition: width 0.4s ease-out;
}
.dd-progress-label {
  font-size: 12px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.dd-bottom {
  display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
}
.dd-date {
  font-size: 12px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.08em;
  white-space: nowrap;
}
.dd-bottom-sep { color: var(--text-4); font-size: 11px; }
.dd-quick {
  font-size: 11px; color: var(--text-3);
  display: flex; gap: 14px; flex-wrap: wrap;
}
.dd-quick span strong { color: var(--text-2); font-weight: 600; }
.dd-quick .pill-stuck { color: var(--bad); }
.dd-quick .pill-waiting { color: var(--waiting); }
.dd-quick .pill-backburner { color: var(--text-3); }
.dd-stats {
  font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums;
  margin-left: auto;
}
.dd-stats strong { color: var(--text); font-weight: 600; }

/* Tabs */
.tabs {
  display: flex; gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.tab {
  background: transparent; border: none; color: var(--text-3);
  padding: 10px 16px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: inline-flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab .pill {
  display: inline-block;
  background: var(--card); color: var(--text-3);
  padding: 1px 7px; border-radius: 8px; font-size: 10px;
  font-variant-numeric: tabular-nums; font-weight: 600;
}
.tab.active .pill { background: var(--accent); color: #0a0a0a; }
.tab .tab-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.tab.drag-target {
  background: rgba(255, 107, 71, 0.15);
  border-radius: 6px 6px 0 0;
}
.tab-wrap { position: relative; display: inline-flex; align-items: center; }
.tab .tab-edit-icon {
  display: none; margin-left: 4px; color: var(--text-4);
  font-size: 14px; line-height: 1; cursor: pointer; padding: 0 2px;
  border-radius: 3px;
}
.tab:hover .tab-edit-icon, .tab.active .tab-edit-icon { display: inline-flex; }
.tab .tab-edit-icon:hover { color: var(--text); background: var(--card-hover); }

.tab-add {
  background: transparent; border: 1px dashed var(--border-strong);
  color: var(--text-3);
  padding: 4px 12px;
  border-radius: 6px 6px 0 0;
  font-size: 16px; font-weight: 400; line-height: 1;
  cursor: pointer; font-family: inherit;
  margin-bottom: -1px;
  align-self: stretch;
}
.tab-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(255, 107, 71, 0.08); }

.tab-edit-popover {
  position: absolute; top: 100%; left: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 100; min-width: 240px; margin-top: 6px;
}
.tab-edit-popover input.name {
  width: 100%; background: var(--bg); border: 1px solid var(--border-strong);
  color: var(--text); border-radius: 5px;
  padding: 6px 9px; font-size: 13px; font-family: inherit;
  margin-bottom: 10px;
}
.tab-edit-popover input.name:focus { outline: none; border-color: var(--accent); }
.tab-edit-popover .swatches {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
}
.tab-edit-popover .delete-btn {
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-3);
  padding: 5px 10px; font-size: 11px;
  border-radius: 5px; cursor: pointer; font-family: inherit;
  width: 100%;
}
.tab-edit-popover .delete-btn:hover { color: var(--bad); border-color: var(--bad); background: rgba(239, 68, 68, 0.1); }

/* Filter bar — filters on the left, metric strip on the right */
.filter-bar {
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
  padding: 0 0 14px;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.filter-bar-left {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.filter-bar-stats {
  display: flex; align-items: center; gap: 18px;
  margin-left: auto;
  flex-wrap: wrap;
}
.filter-bar-stats .stat {
  display: inline-flex; align-items: baseline; gap: 6px;
  white-space: nowrap;
}
.filter-bar-stats .stat .lbl {
  font-size: 9px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
}
.filter-bar-stats .stat .val {
  font-size: 14px; font-weight: 700;
  font-variant-numeric: tabular-nums; color: var(--text);
  letter-spacing: -0.01em;
}
.filter-bar-stats .stat.high .val { color: var(--prio-high); }
.filter-bar-stats .stat.good .val { color: var(--good); }
@media (max-width: 720px) {
  .filter-bar-stats { margin-left: 0; gap: 14px; }
}
.filter-dropdown { position: relative; }
.filter-dropdown-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text-2);
  padding: 7px 12px; border-radius: 6px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.filter-dropdown-btn:hover { border-color: var(--border-strong); color: var(--text); }
.filter-dropdown-btn.active { border-color: var(--accent); }
.filter-dropdown-btn .label { color: var(--text-3); }
.filter-dropdown-btn .value { color: var(--text); font-weight: 600; }
.filter-dropdown-btn .caret { color: var(--text-4); font-size: 9px; margin-left: 2px; }
.filter-dropdown-btn .dot.small {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}

.filter-dropdown-menu {
  position: absolute; top: 100%; left: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 50; min-width: 180px; margin-top: 4px;
}
.filter-dropdown-menu .option {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 5px;
  cursor: pointer; font-size: 12px;
  color: var(--text);
}
.filter-dropdown-menu .option:hover { background: var(--card-hover); }
.filter-dropdown-menu .option.selected { background: var(--card-hover); }
.filter-dropdown-menu .option .dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}
.filter-dropdown-menu .option .check {
  margin-left: auto; color: var(--accent); font-size: 11px;
}

.filter-clear {
  font-size: 11px; color: var(--text-3);
  background: none; border: none; cursor: pointer;
  text-decoration: underline; font-family: inherit;
  margin-left: auto;
}
.filter-clear:hover { color: var(--text); }

/* Buttons */
.btn {
  background: var(--text); color: var(--bg); border: none; border-radius: 6px;
  padding: 8px 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.btn:hover { background: var(--text-2); }
.btn.accent { background: var(--accent); color: #0a0a0a; }
.btn.accent:hover { background: #fbbf24; }
.btn.ghost {
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-2); padding: 5px 10px; font-size: 11px;
}
.btn.ghost:hover { background: var(--card-hover); color: var(--text); }
.btn.add-line {
  background: transparent; border: 1px dashed var(--border-strong); color: var(--text-3);
  padding: 7px 11px; font-size: 12px; width: 100%; text-align: left;
  border-radius: 5px; margin-top: 8px;
}
.btn.add-line:hover { border-color: var(--accent); color: var(--accent); }

/* Labels management panel */
.labels-panel {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 14px;
}
.labels-panel.hidden { display: none; }
.labels-panel h3 {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 10px;
}
.label-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.label-row:last-of-type { border-bottom: none; }
.label-row input.label-name {
  flex: 1; background: transparent; border: none;
  font-size: 13px; color: var(--text); font-family: inherit;
  padding: 4px 0; min-width: 0;
}
.label-row input.label-name:focus { outline: none; }
.label-row input.label-name::placeholder { color: var(--text-4); }
.color-swatches { display: flex; gap: 4px; flex-wrap: wrap; }
.color-swatch {
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--text); }
.label-row .li-rm {
  background: none; border: none; color: var(--text-4); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0 4px;
  opacity: 0; transition: opacity 0.15s;
}
.label-row:hover .li-rm { opacity: 1; }
.label-row .li-rm:hover { color: var(--bad); }

/* Project list */
.projects { display: flex; flex-direction: column; gap: 14px; }

.project {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 22px 18px 26px;
  position: relative;
  transition: opacity 0.15s;
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 28px;
  align-items: start;
}
.project:hover { border-color: var(--border-strong); }
.project::before {
  content: ""; position: absolute; left: 0; right: 0; top: -3px;
  height: 2px; background: var(--accent); border-radius: 1px;
  opacity: 0; transition: opacity 0.15s;
}
.project.drag-over::before { opacity: 1; }
.project.dragging { opacity: 0.4; }
.project.hidden-by-search { display: none; }

.project[data-label-color]::after {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--proj-color, transparent);
  border-radius: 12px 0 0 12px;
}

.drag-handle {
  position: absolute; left: 6px; top: 18px;
  width: 14px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  cursor: grab; opacity: 0;
  color: var(--text-4); font-size: 13px; line-height: 1;
  user-select: none; transition: opacity 0.15s;
}
.project:hover .drag-handle { opacity: 1; }
.drag-handle:hover { color: var(--text-2); }
.drag-handle:active { cursor: grabbing; }

.project .delete-btn {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: var(--text-4);
  cursor: pointer; padding: 4px 9px; font-size: 12px;
  border-radius: 5px; font-family: inherit;
  opacity: 0; transition: opacity 0.15s;
}
.project:hover .delete-btn { opacity: 1; }
.project .delete-btn:hover { color: var(--bad); background: rgba(239, 68, 68, 0.1); }

/* Left column: project name + meta */
.proj-header { min-width: 0; padding-right: 50px; }
.proj-name {
  width: 100%; min-width: 0; background: transparent; border: none;
  font-family: var(--font-serif);
  font-size: 24px; font-weight: 500; letter-spacing: -0.01em;
  font-variation-settings: "opsz" 36;
  color: var(--text); padding: 2px 0;
  line-height: 1.2;
}
.proj-name:focus { outline: none; }
.proj-name::placeholder { color: var(--text-4); font-weight: 500; }

.proj-meta {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-3);
  margin-top: 8px;
  display: inline-flex; align-items: center; gap: 6px;
}
.proj-meta .count {
  background: #27272a; color: var(--text-2);
  border-radius: 4px; padding: 1px 7px; font-size: 10px;
  font-weight: 600; letter-spacing: 0;
}

/* Right column: actionables */
.proj-body { min-width: 0; }

/* Narrow screens: stack header above actionables */
@media (max-width: 720px) {
  .project { grid-template-columns: 1fr; gap: 14px; padding-right: 18px; }
  .proj-header { padding-right: 60px; }
}

/* Project label chip */
.label-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 11px;
  font-size: 10px; font-weight: 600;
  cursor: pointer; font-family: inherit; border: 1px solid transparent;
  text-transform: uppercase; letter-spacing: 0.04em;
  white-space: nowrap;
}
.label-chip.unset {
  background: transparent; color: var(--text-4);
  border-color: var(--border-strong);
}
.label-chip.unset:hover { color: var(--text-2); border-color: var(--border); }
.label-chip .dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}

.label-picker {
  position: absolute; top: 100%; right: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 50; min-width: 180px; margin-top: 4px;
}
.label-picker .picker-option {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 5px;
  cursor: pointer; font-size: 12px;
}
.label-picker .picker-option:hover { background: var(--card-hover); }
.label-picker .picker-option .dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.label-picker .picker-divider { height: 1px; background: var(--border); margin: 4px 0; }
.label-picker .picker-option.clear { color: var(--text-3); font-style: italic; }

/* Items (actionables) */
ul.items { list-style: none; }
ul.items > li {
  padding: 7px 0; border-bottom: 1px solid var(--border);
  position: relative;
}
ul.items > li:last-child { border-bottom: none; }
ul.items > li:first-child { padding-top: 0; }
ul.items > li.dragging { opacity: 0.4; }

/* Drop indicators: above/below as sibling + nest as child */
ul.items > li::before,
ul.items > li::after {
  content: ""; position: absolute; left: -8px; right: 0;
  height: 2px; background: var(--accent); border-radius: 1px;
  opacity: 0; pointer-events: none;
}
ul.items > li::before { top: -1px; }
ul.items > li::after  { bottom: -1px; }
ul.items > li.drag-over-above::before { opacity: 1; }
ul.items > li.drag-over-below::after  { opacity: 1; }
ul.items > li.drag-over-nest > .item-row {
  background: rgba(255, 107, 71, 0.10);
  outline: 1px dashed var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}
ul.items > li.hidden-by-search { display: none; }

/* Subtask indentation — guide line on the left */
ul.items > li[data-depth="1"] > .item-row,
ul.items > li[data-depth="1"] > .context-row { padding-left: 24px; }
ul.items > li[data-depth="2"] > .item-row,
ul.items > li[data-depth="2"] > .context-row { padding-left: 48px; }
ul.items > li[data-depth="1"]::before { left: 16px; }
ul.items > li[data-depth="1"]::after  { left: 16px; }
ul.items > li[data-depth="2"]::before { left: 40px; }
ul.items > li[data-depth="2"]::after  { left: 40px; }
ul.items > li[data-depth="1"] > .item-row::before,
ul.items > li[data-depth="2"] > .item-row::before {
  content: ""; position: absolute; top: 50%; width: 10px; height: 1px;
  background: var(--border-strong);
}
ul.items > li[data-depth="1"] > .item-row::before { left: 10px; }
ul.items > li[data-depth="2"] > .item-row::before { left: 34px; }
ul.items > li[data-depth="1"] > .item-row,
ul.items > li[data-depth="2"] > .item-row { position: relative; }

.item-row {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}

.item-drag-handle {
  width: 12px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: grab; opacity: 0;
  color: var(--text-4); font-size: 11px; line-height: 1;
  user-select: none; transition: opacity 0.15s;
  flex-shrink: 0;
}
ul.items > li:hover .item-drag-handle { opacity: 1; }
.item-drag-handle:active { cursor: grabbing; }

ul.items input[type="checkbox"] {
  accent-color: var(--good); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0;
}
ul.items input.item-text {
  flex: 1; min-width: 100px; border: none; background: transparent;
  font-size: 14px; color: var(--text); font-family: inherit;
  padding: 3px 0;
}
ul.items input.item-text:focus { outline: none; }
ul.items input.item-text::placeholder { color: var(--text-4); }
ul.items li.done input.item-text { color: var(--text-4); text-decoration: line-through; }

/* Priority chip */
.priority-chip {
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-4);
  padding: 2px 7px; border-radius: 8px; font-size: 10px;
  cursor: pointer; font-family: inherit; font-weight: 700;
  letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0;
  min-width: 24px; text-align: center;
}
.priority-chip:hover { background: var(--card-hover); color: var(--text-2); }
.priority-chip.p-1 { background: rgba(59, 130, 246, 0.15); color: var(--prio-low); border-color: var(--prio-low); }
.priority-chip.p-2 { background: rgba(234, 179, 8, 0.15); color: var(--prio-med); border-color: var(--prio-med); }
.priority-chip.p-3 { background: rgba(239, 68, 68, 0.15); color: var(--prio-high); border-color: var(--prio-high); }

/* Age badge (since last update) */
.meta-badge {
  font-size: 11px; font-variant-numeric: tabular-nums;
  white-space: nowrap; flex-shrink: 0;
  padding: 2px 7px; border-radius: 8px;
  font-weight: 500;
}
.meta-badge.level-fresh  { color: var(--text-4); }
.meta-badge.level-normal { color: var(--text-3); }
.meta-badge.level-warn   { color: var(--warn); background: rgba(234, 179, 8, 0.10); }
.meta-badge.level-bad    { color: var(--bad);  background: rgba(239, 68, 68, 0.10); }

/* Status chip + picker */
.status-wrap { position: relative; flex-shrink: 0; }
.status-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  border: 1px solid transparent;
  text-transform: uppercase; letter-spacing: 0.04em;
  white-space: nowrap;
}
.status-chip.unset {
  background: transparent; color: var(--text-4);
  border-color: var(--border-strong);
}
.status-chip.unset:hover { color: var(--text-2); border-color: var(--border); }
.status-chip.today      { background: rgba(255, 107, 71, 0.18); color: var(--accent);     border-color: var(--accent); }
.status-chip.backburner { background: rgba(113, 113, 122, 0.18); color: var(--text-2);    border-color: var(--text-3); }
.status-chip.waiting    { background: rgba(59, 130, 246, 0.15);  color: var(--waiting);   border-color: var(--waiting); }
.status-chip.stuck      { background: rgba(239, 68, 68, 0.15);   color: var(--bad);       border-color: var(--bad); }
.status-chip .dot {
  width: 7px; height: 7px; border-radius: 50%; display: inline-block;
}

.status-picker {
  position: absolute; top: 100%; right: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 50; min-width: 160px; margin-top: 4px;
}
.status-picker .picker-option {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 5px;
  cursor: pointer; font-size: 12px;
  text-transform: none; letter-spacing: 0;
}
.status-picker .picker-option:hover { background: var(--card-hover); }
.status-picker .picker-option .dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}
.status-picker .picker-divider { height: 1px; background: var(--border); margin: 4px 0; }
.status-picker .picker-option.clear { color: var(--text-3); font-style: italic; }

ul.items .li-rm {
  background: none; border: none; color: var(--text-4); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0 4px;
  opacity: 0; transition: opacity 0.15s;
  flex-shrink: 0;
}
ul.items li:hover .li-rm { opacity: 1; }
ul.items .li-rm:hover { color: var(--bad); }

/* Notes chevron + Google Calendar button (row-level utilities) */
.row-tool {
  background: none; border: none;
  color: var(--text-4); cursor: pointer;
  padding: 2px 5px; border-radius: 4px;
  line-height: 0;
  opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s;
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
}
ul.items li:hover .row-tool { opacity: 1; }
.row-tool:hover { color: var(--text); background: var(--card-hover); }
.row-tool.has-content { opacity: 1; color: var(--text-2); }
.row-tool.expanded { color: var(--accent); }
.row-tool svg { width: 13px; height: 13px; stroke: currentColor; }

/* Notes panel (collapsible body under the row) */
.notes-panel {
  margin-top: 6px; margin-left: 35px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
}
.notes-panel textarea {
  width: 100%;
  background: transparent; border: none;
  color: var(--text); font-family: inherit;
  font-size: 13px; line-height: 1.55;
  resize: vertical; min-height: 64px;
  padding: 0;
}
.notes-panel textarea:focus { outline: none; }
.notes-panel textarea::placeholder { color: var(--text-4); font-style: italic; }

/* Context rows under stuck/waiting */
.context-row {
  margin-top: 6px; margin-left: 35px;
  display: flex; align-items: center; gap: 8px;
}
.context-row.hidden { display: none; }
.context-row .lbl {
  font-size: 9px;
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
  white-space: nowrap;
}
.context-row input {
  flex: 1;
  border-radius: 5px;
  color: var(--text); font-family: inherit;
  padding: 5px 9px; font-size: 13px;
}
.context-row input:focus { outline: none; }
.context-row input::placeholder { color: var(--text-4); font-style: italic; }

.context-row.stuck .lbl { color: var(--bad); }
.context-row.stuck input {
  background: rgba(239, 68, 68, 0.06);
  border: 1px solid rgba(239, 68, 68, 0.2);
}
.context-row.stuck input:focus { border-color: var(--bad); }

.context-row.waiting .lbl { color: var(--waiting); }
.context-row.waiting input {
  background: rgba(59, 130, 246, 0.06);
  border: 1px solid rgba(59, 130, 246, 0.2);
}
.context-row.waiting input:focus { border-color: var(--waiting); }

/* Done footer */
.done-footer {
  margin-top: 6px;
  font-size: 12px; color: var(--text-4);
  cursor: pointer; padding: 6px 0;
  border-top: 1px dashed var(--border);
  display: flex; align-items: center; gap: 6px;
}
.done-footer:hover { color: var(--text-2); }
.done-footer .caret { font-size: 9px; }
.done-footer.expanded { color: var(--text-3); }

.empty-line {
  font-size: 12px; color: var(--text-4); font-style: italic;
  padding: 4px 0 6px;
}

.empty-state {
  text-align: center; padding: 60px 20px;
  border: 1px dashed var(--border-strong); border-radius: 12px;
  color: var(--text-3);
}
.empty-state h2 {
  font-family: var(--font-serif);
  font-size: 22px; font-weight: 500; color: var(--text-2);
  margin-bottom: 8px; letter-spacing: -0.01em;
  font-variation-settings: "opsz" 36;
}
.empty-state p { font-size: 12px; margin-bottom: 14px; }

/* Keystone — the "one thing today" card at the top of Home */
.keystone-card {
  background:
    linear-gradient(135deg, rgba(255,107,71,0.10), rgba(255,107,71,0.02));
  border: 1px solid rgba(255,107,71,0.30);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 18px;
  position: relative;
}
.keystone-label {
  font-size: 10px; color: var(--accent);

<script>
// ─── Supabase setup ────────────────────────────────────

// ─── State ──────────────────────────────────────────────
const STORE_KEY = "projects-v1";
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { projects: [], labels: [] }; }
  catch(e) { return { projects: [], labels: [] }; }
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
let state = loadState();
state.projects = state.projects || [];
state.labels = state.labels || [];
state.filters = state.filters || {};
state.keystone = state.keystone || { date: null, text: "", done: false };
state.windDown = state.windDown || { hour: 20, minute: 0, lastTriggeredDate: null };
// Backfill in case stored state is older
if (typeof state.windDown.hour   !== "number") state.windDown.hour = 20;
if (typeof state.windDown.minute !== "number") state.windDown.minute = 0;

// Deep Work session — transient timer that overrides the wind-down card
state.deepWork = state.deepWork || { active: false, startedAt: null, durationMs: 75 * 60 * 1000 };

if (state.deepWork.completedDate === undefined)        state.deepWork.completedDate = null;
if (state.deepWork.active && state.deepWork.startedAt) {

  if (Date.now() - state.deepWork.startedAt >= state.deepWork.durationMs) {
    state.deepWork.active = false;
    state.deepWork.startedAt = null;
  }

state.journal = state.journal || {};
// Migrate older flat-shape filters (status/priority/statuses/labelIds at top level)
// to the new per-view map. The old global filter is discarded — each view now

if ('status' in state.filters || 'priority' in state.filters ||
    'statuses' in state.filters || 'labelIds' in state.filters || 'labelId' in state.filters) {
  state.filters = {};
}

// Tab color palette — saturated tones that read on dark grey
const COLOR_PALETTE = [
  { name: "coral",   hex: "#ff6b47" },
  { name: "red",     hex: "#dc2626" },
  { name: "orange",  hex: "#f97316" },
  { name: "yellow",  hex: "#eab308" },
  { name: "green",   hex: "#22c55e" },
  { name: "cyan",    hex: "#06b6d4" },
  { name: "blue",    hex: "#3b82f6" },
  { name: "purple",  hex: "#a855f7" },
  { name: "pink",    hex: "#ec4899" }
];

// Migrate schema
const NOW = new Date().toISOString();
state.projects.forEach(p => {
  if (p.labelId === undefined) p.labelId = null;
  if (!p.createdAt) p.createdAt = NOW;
  (p.actionables || []).forEach(a => {
    // Convert legacy labels array to single status

      const labs = Array.isArray(a.labels) ? a.labels : [];
      if (labs.includes("stuck"))         a.status = "stuck";
      else if (labs.includes("today"))    a.status = "today";
      else if (labs.includes("waiting"))  a.status = "waiting";
      else                                 a.status = null;
    }
    // Legacy blockedBy → blocker text
    if (Array.isArray(a.blockedBy) && a.blockedBy.length && Array.isArray(p.blockers)) {
      const texts = a.blockedBy
        .map(bid => (p.blockers.find(b => b.id === bid) || {}).text)
        .filter(Boolean);
      if (texts.length && !a.blocker) a.blocker = texts.join("; ");
    }
    if (typeof a.blocker !== "string")    a.blocker = "";
    if (typeof a.waitingFor !== "string") a.waitingFor = "";
    if (!a.createdAt) a.createdAt = p.createdAt || NOW;
    if (!a.updatedAt) a.updatedAt = a.createdAt;
    if (typeof a.priority !== "number") a.priority = 0;
    if (a.stuckSince === undefined) {
      a.stuckSince = a.status === "stuck" ? NOW : null;
    }
    if (a.doneAt === undefined) a.doneAt = a.done ? NOW : null;
    if (a.parentId === undefined) a.parentId = null;
    if (typeof a.notes !== "string") a.notes = "";
    delete a.labels;
    delete a.blockedBy;
    delete a.dueDate;
  });
  // Repair any dangling parent references (orphans become top-level)
  const ids = new Set(p.actionables.map(a => a.id));
  p.actionables.forEach(a => { if (a.parentId && !ids.has(a.parentId)) a.parentId = null; });
  delete p.blockers;
});
saveState();

let currentView = (window.localStorage.getItem("view") || "home");
if (currentView === "today") currentView = "home"; // legacy → renamed view
window.localStorage.setItem("view", currentView);
let activeStatusPicker = null; // "<projId>:<itemId>" or null
let searchTerm = "";
let expandedDone = new Set();
let expandedNotes = new Set(); // actionable IDs whose notes panel is open

// Completed tasks roll into the "archived" footer at local midnight each day.

}

function findActionable(p, id) { return p && p.actionables.find(a => a.id === id); }

  if (!iso) return 0;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}

  if (!updatedAtIso) return null;
  const ms = Date.now() - new Date(updatedAtIso).getTime();
  if (ms < 3600000) return null;
  const hours = Math.floor(ms / 3600000);
  if (hours < 24) return { text: hours + "h", level: "fresh" };
  const days = Math.floor(hours / 24);

  else if (days >= 7) level = "warn";

}

// ─── Filter helpers (Status + Priority, scoped per-view) ──
// state.filters is a map of view-id → { status, priority }. Filters are
// remembered per tab so each one keeps its own selection. The "home" view

function getCurrentFilters() {
  let f = state.filters[currentView];
  if (!f) {
    f = (currentView === "home")
      ? { status: "today", priority: null }
      : { status: null, priority: null };
    state.filters[currentView] = f;
  }
  if (f.status === undefined)   f.status = null;
  if (f.priority === undefined) f.priority = null;

}

function isPriorityFilterActive() { return getCurrentFilters().priority !== null; }

function passesStatusFilter(a) {
  const f = getCurrentFilters();
  if (f.status === null) return true;
  const aStatus = a.status || "none";
  return aStatus === f.status;

  const f = getCurrentFilters();

  return passesStatusFilter(a) && passesPriorityFilter(a);

function setFilter(type, value) {
  const f = getCurrentFilters();
  if (type === "status")   f.status = value;
  else if (type === "priority") f.priority = value;

}

  const f = getCurrentFilters();

// ─── Sub-item tree helpers ─────────────────────────────
// Actionables form a tree via a.parentId. We keep the flat array as the
// source of truth (preserves order) and compute hierarchy on demand. Depth
// is capped at MAX_DEPTH (3 visible levels: 0, 1, 2).
const MAX_DEPTH = 2;

function getChildren(p, parentId) {
  return p.actionables.filter(a => (a.parentId || null) === (parentId || null));
}
function getDepth(p, a) {
  let d = 0, cur = a, guard = 0;
  while (cur && cur.parentId && guard++ < 10) {
    cur = findActionable(p, cur.parentId);
    if (!cur) break;
    d++;
  }
  return d;
}
function getSubtreeDepth(p, a) {
  // Max depth of a's descendant subtree, relative to a (0 = no children).
  const kids = getChildren(p, a.id);
  if (!kids.length) return 0;
  return 1 + Math.max(...kids.map(k => getSubtreeDepth(p, k)));
}
function getDescendants(p, a) {
  const out = [];
  const stack = [a.id];
  while (stack.length) {
    const id = stack.pop();
    p.actionables.forEach(x => {
      if ((x.parentId || null) === id) { out.push(x); stack.push(x.id); }
    });
  }
  return out;
}
function isAncestorOf(p, ancestorId, descendantId) {
  let cur = findActionable(p, descendantId);
  let guard = 0;
  while (cur && cur.parentId && guard++ < 10) {
    if (cur.parentId === ancestorId) return true;
    cur = findActionable(p, cur.parentId);
  }
  return false;
}
// Linearize the tree in render order, with depth annotations.
function buildActionableTree(p, items) {
  // items: subset of p.actionables to be considered "visible". The result
  // preserves p.actionables ordering and the parent→child structure.
  const visibleIds = new Set(items.map(a => a.id));
  const out = [];
  function walk(parentId, depth) {
    p.actionables
      .filter(a => (a.parentId || null) === (parentId || null) && visibleIds.has(a.id))
      .forEach(a => { out.push({ item: a, depth }); walk(a.id, depth + 1); });
  }
  walk(null, 0);
  return out;
}
// Given a set of items that match a filter, expand it to include ancestors
// so the indent context is preserved.
function withAncestors(p, items) {
  const ids = new Set(items.map(a => a.id));
  items.forEach(a => {
    let cur = a;
    while (cur.parentId) {
      if (ids.has(cur.parentId)) break;
      const parent = findActionable(p, cur.parentId);
      if (!parent) break;
      ids.add(parent.id);
      cur = parent;
    }
  });
  return p.actionables.filter(a => ids.has(a.id));
}

// View → project filter (tab is the category)
function projectsInCurrentView() {
  if (currentView === "home") return [];
  if (currentView === "all")          return state.projects;
  if (currentView === "uncategorized") return state.projects.filter(p => !p.labelId);
  return state.projects.filter(p => p.labelId === currentView);
}

let activeFilterDropdown = null;

function addProject() {

function addActionable(projId) {

function updateActionable(projId, itemId, field, value) {
  const p = findProject(projId); if (!p) return;
  const it = findActionable(p, itemId); if (!it) return;
  if (field === "done") {
    const now = new Date().toISOString();
    if (value && !it.done) it.doneAt = now;
    if (!value) it.doneAt = null;
    it.done = value;
    touchActionable(it);
    markActionDirty(itemId);
    // Cascade to descendants: checking parent checks all subs (and unchecking
    // unchecks them — matches Notion / Things behavior).
    getDescendants(p, it).forEach(d => {
      if (value && !d.done) d.doneAt = now;
      if (!value) d.doneAt = null;
      d.done = value;
      touchActionable(d);
      markActionDirty(d.id);
    });
    saveState();
    return;
  }
  it[field] = value;
  touchActionable(it);
  markActionDirty(itemId);
  saveState();
}

  const p = findProject(projId); if (!p) return;
  const target = findActionable(p, itemId);
  if (!target) return;
  // Remove the item plus all descendants
  const descIds = new Set(getDescendants(p, target).map(d => d.id));
  descIds.add(itemId);
  p.actionables = p.actionables.filter(a => !descIds.has(a.id));
  descIds.forEach(id => markActionDeleted(id));
  saveState(); renderAll();
}
function nestActionable(projId, draggedId, newParentId) {
  // Make draggedId a child of newParentId (or top-level if null).
  // Validates: no cycle, respects MAX_DEPTH.
  const p = findProject(projId); if (!p) return false;
  const dragged = findActionable(p, draggedId); if (!dragged) return false;
  if (newParentId === draggedId) return false;
  if (newParentId && isAncestorOf(p, draggedId, newParentId)) return false; // cycle
  const parent = newParentId ? findActionable(p, newParentId) : null;
  if (newParentId && !parent) return false;
  // Depth check: new depth of dragged + its own subtree depth must fit
  const parentDepth = parent ? getDepth(p, parent) : -1;
  const newDepth = parentDepth + 1;
  const sub = getSubtreeDepth(p, dragged);
  if (newDepth + sub > MAX_DEPTH) return false;
  dragged.parentId = newParentId || null;
  touchActionable(dragged);
  markActionDirty(draggedId);
  saveState();

}

  const a = findActionable(p, itemId); if (!a) return;

  a.status = STATUSES.includes(status) ? status : null;
  if (a.status === "stuck" && prevStatus !== "stuck") a.stuckSince = new Date().toISOString();
  if (a.status !== "stuck") a.stuckSince = null;
  if (a.status !== "stuck") a.blocker = "";

  markActionDirty(itemId);
  saveState(); renderAll();
}

  const p = findProject(projId); if (!p) return;
  const a = findActionable(p, itemId); if (!a) return;

// Unified drop: place dragged relative to target with one of three modes.
//   "above" → become a sibling of target, inserted just before it
//   "below" → become a sibling of target, inserted just after it
//   "nest"  → become a child of target (depth permitting)
// Returns true on success. Rejects cycles and over-depth nesting.
function dropActionable(projId, draggedId, targetId, mode) {
  const p = findProject(projId); if (!p) return false;
  if (draggedId === targetId) return false;
  const dragged = findActionable(p, draggedId); if (!dragged) return false;
  const target  = findActionable(p, targetId);  if (!target)  return false;
  // No cycles: target must not be inside dragged's subtree
  if (isAncestorOf(p, draggedId, targetId)) return false;

  let newParentId;
  if (mode === "nest") newParentId = target.id;
  else                 newParentId = target.parentId || null;

  // Depth check (root depth = 0, max visible depth = MAX_DEPTH)
  const newParent = newParentId ? findActionable(p, newParentId) : null;
  const parentDepth = newParent ? getDepth(p, newParent) : -1;
  const newDepth = parentDepth + 1;
  const subDepth = getSubtreeDepth(p, dragged);
  if (newDepth + subDepth > MAX_DEPTH) return false;

  // Splice dragged out (descendants stay in-place — they reference dragged by id)
  const draggedIdx = p.actionables.findIndex(a => a.id === draggedId);
  if (draggedIdx === -1) return false;
  p.actionables.splice(draggedIdx, 1);

  // Recompute target index after removal
  const targetIdx = p.actionables.findIndex(a => a.id === targetId);

  if (mode === "above")      insertAt = targetIdx;
  else if (mode === "below") insertAt = targetIdx + 1;
  else /* nest */            insertAt = targetIdx + 1;
  if (targetIdx === -1) insertAt = p.actionables.length;

  dragged.parentId = newParentId;
  touchActionable(dragged);
  p.actionables.splice(insertAt, 0, dragged);

  saveState(); renderAll();

// ─── Render tabs ───────────────────────────────────────

function wireTabs() {
  const tabsEl = document.getElementById("tabs");

  // Tab click → switch view (but not if clicking the edit icon)
  tabsEl.querySelectorAll('.sidebar-tab').forEach(t => {
    const view = t.dataset.view;
    const isLabel = !["home", "all", "uncategorized"].includes(view);

    t.addEventListener('click', (e) => {
      if (e.target.closest('[data-tab-edit]')) return;
      setView(view);
    });

    // Label tabs are themselves draggable (for reordering)
    if (isLabel) {
      t.draggable = true;
      t.addEventListener('dragstart', (e) => {
        e.stopPropagation();
        t.classList.add('dragging');
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("application/x-label", view);
      });
      t.addEventListener('dragend', () => {
        t.classList.remove('dragging');
        document.querySelectorAll('.sidebar-tab.drag-target').forEach(el => el.classList.remove('drag-target'));
      });
    }

    // Accept drops: projects (move project to tab) and labels (reorder tabs)
    t.addEventListener('dragover', (e) => {
      const types = Array.from(e.dataTransfer.types);
      if (types.includes("application/x-label")) {
        if (!isLabel) return; // can't drop a label onto Home / Uncategorized / All
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        t.classList.add('drag-target');
        return;
      }
      if (types.includes("application/x-project")) {
        if (view === "home") return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        t.classList.add('drag-target');
      }
    });
    t.addEventListener('dragleave', () => t.classList.remove('drag-target'));
    t.addEventListener('drop', (e) => {
      e.preventDefault();
      t.classList.remove('drag-target');
      const labelId = e.dataTransfer.getData("application/x-label");
      const projId = e.dataTransfer.getData("application/x-project");
      if (labelId) {
        if (!isLabel || labelId === view) return;
        reorderLabels(labelId, view);
        return;
      }
      if (projId) {
        if (view === "home") return;
        let newLabelId = null;
        if (view !== "uncategorized" && view !== "all") newLabelId = view;
        const p = findProject(projId);
        if (!p || p.labelId === newLabelId) return;
        p.labelId = newLabelId;
        markProjectDirty(projId);
        saveState();
        renderAll();
      }
    });
  });

  // Edit icon click → open editor popover
  tabsEl.querySelectorAll('[data-tab-edit]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.tabEdit;
      activeTabEditor = activeTabEditor === id ? null : id;
      renderTabs();
      if (activeTabEditor) {
        setTimeout(() => {
          const inp = document.querySelector('.tab-edit-popover input.name');
          if (inp) { inp.focus(); inp.select(); }
        }, 0);
      }
    });
  });

  // "+" new tab
  const addBtn = document.getElementById('tab-add');
  if (addBtn) {
    addBtn.addEventListener('click', () => {
      const used = state.labels.map(l => l.color);
      const next = COLOR_PALETTE.find(c => !used.includes(c.hex)) || COLOR_PALETTE[0];
      const newLabel = { id: uid(), name: "", color: next.hex };
      state.labels.push(newLabel);
      currentView = newLabel.id;
      window.localStorage.setItem("view", currentView);
      activeTabEditor = newLabel.id;
      markTabDirty(newLabel.id);
      markPrefsDirty();
      saveState();
      renderAll();
      setTimeout(() => {
        const inp = document.querySelector('.tab-edit-popover input.name');
        if (inp) inp.focus();
      }, 0);
    });
  }

  // Popover inputs
  tabsEl.querySelectorAll('.tab-edit-popover input.name').forEach(inp => {
    inp.addEventListener('click', (e) => e.stopPropagation());
    inp.addEventListener('input', () => {
      const id = inp.closest('.tab-edit-popover').dataset.labelId;
      const l = findLabel(id); if (!l) return;
      l.name = inp.value;
      saveState();
      // Update tab name live without re-rendering the popover (keeps focus)
      const tabBtn = tabsEl.querySelector('.tab[data-view="' + id + '"] .tab-name');
      if (tabBtn) tabBtn.textContent = inp.value || "Unnamed";
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === 'Escape') {
        activeTabEditor = null;
        renderTabs();
      }
    });
  });
  tabsEl.querySelectorAll('.tab-edit-popover .color-swatch').forEach(sw => {
    sw.addEventListener('click', (e) => {
      e.stopPropagation();
      updateLabel(sw.dataset.labelId, "color", sw.dataset.color);
    });
  });
  tabsEl.querySelectorAll('.tab-edit-popover [data-action="delete-tab"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm("Delete this tab? Projects in it will become Uncategorized.")) return;
      const id = btn.dataset.labelId;
      state.labels = state.labels.filter(l => l.id !== id);
      state.projects.forEach(p => {
        if (p.labelId === id) { p.labelId = null; markProjectDirty(p.id); }
      });
      markTabDeleted(id);
      if (currentView === id) { currentView = "home"; markPrefsDirty(); }
      if (state.filters && state.filters[id]) delete state.filters[id];
      activeTabEditor = null;
      saveState();
      renderAll();
    });
  });
}

// ─── Deep Work session ────────────────────────────────
// Click "Start deep work" to begin a 75-minute focus timer. While active,
// the wind-down card is replaced with a focus countdown. On completion,
// a gentle Web Audio chime plays.
let _slateAudioCtx = null;
function unlockAudioCtx() {
  // Must run inside a user gesture for browsers to allow playback.
  if (!_slateAudioCtx) {
    try {
      _slateAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { return null; }
  }
  if (_slateAudioCtx.state === "suspended") {
    try { _slateAudioCtx.resume(); } catch (e) {}
  }
  return _slateAudioCtx;
}
function playPeacefulChime() {
  const ctx = _slateAudioCtx || (function () {
    try { return new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  })();
  if (!ctx) return;
  if (ctx.state === "suspended") { try { ctx.resume(); } catch (e) {} }
  const start = ctx.currentTime + 0.05;
  // Three spaced bell strikes — fundamental + perfect fifth + octave
  const tones = [
    { freq: 528,  gain: 0.30, decay: 5.0 },
    { freq: 792,  gain: 0.16, decay: 4.0 },
    { freq: 1056, gain: 0.10, decay: 3.5 }
  ];
  for (let strike = 0; strike < 3; strike++) {
    const t0 = start + strike * 1.7;
    tones.forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = t.freq;
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(t.gain, t0 + 0.06);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + t.decay);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + t.decay + 0.1);
    });
  }
}

  if (!state.deepWork || !state.deepWork.active || !state.deepWork.startedAt) return 0;
  return state.deepWork.durationMs - (Date.now() - state.deepWork.startedAt);
}
function startDeepWork() {
  unlockAudioCtx(); // user gesture — primes audio for the future chime
  state.deepWork = {
    active: true,
    startedAt: Date.now(),
    durationMs: 75 * 60 * 1000
  };
  saveState();
  renderWindDown();
  renderFilterBar(); // toggle the Start button visibility
}
function endDeepWork(opts) {
  const playChime = opts && opts.playChime;
  // Carry the daily counter across the reset (and reset it at date rollover)
  const today = todayDateString();
  let completedToday = (state.deepWork.completedDate === today)
    ? (state.deepWork.completedToday || 0) : 0;
  // Only a natural completion (chime) counts as a finished session
  if (playChime) completedToday = Math.min(3, completedToday + 1);
  state.deepWork = {
    active: false,
    startedAt: null,
    durationMs: 75 * 60 * 1000,
    completedToday,
    completedDate: today
  };
  saveState();
  if (playChime) playPeacefulChime();
  renderWindDown();
  renderFilterBar();
}

// ─── Wind-down countdown ──────────────────────────────
// Counts down to a user-set time (default 8pm local). When it hits zero,
// every open "today"-status task has its status cleared so the next day
// starts blank. State is per-user and syncs through user_prefs.
let activeWindDownEditor = false;

function getWindDownTargetToday() {
  const t = new Date();
  t.setHours(state.windDown.hour, state.windDown.minute, 0, 0);
  return t;

  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  // Always include seconds so the user sees the timer breathing.
  if (h > 0) return h + "h " + String(m).padStart(2, "0") + "m " + String(s).padStart(2, "0") + "s";
  if (m > 0) return m + "m " + String(s).padStart(2, "0") + "s";
  return s + "s";
}
function formatTargetLabel() {
  const h = state.windDown.hour;
  const m = state.windDown.minute;
  const ampm = h >= 12 ? "pm" : "am";
  const hh = ((h + 11) % 12) + 1;
  return hh + (m ? ":" + String(m).padStart(2, "0") : "") + ampm;

  if (!wrap) return;

  // ── Deep Work mode overrides the wind-down card ──
  if (state.deepWork && state.deepWork.active) {
    const remaining = deepWorkRemainingMs();
    if (remaining <= 0) {
      endDeepWork({ playChime: true });
      return;
    }
    wrap.innerHTML =
      '<div class="wind-down deep" id="wind-down-btn">' +
        '<div class="wd-left">' +
          '<div class="wd-label">Deep Work</div>' +
          '<div class="wd-target">75-minute focus · gentle chime when done</div>' +
        '</div>' +
        '<div class="wd-time">' + formatCountdown(remaining) + '</div>' +
      '</div>';
    wireWindDown();
    return;
  }

  const today = todayDateString();
  const triggeredToday = state.windDown.lastTriggeredDate === today;
  const popover = activeWindDownEditor ? (
    '<div class="wind-down-popover" id="wind-down-popover">' +
      '<div class="wd-title">Wind-down time</div>' +
      '<input type="time" class="wd-time-input" id="wd-time-input" ' +
        'value="' + String(state.windDown.hour).padStart(2, "0") + ":" +
                    String(state.windDown.minute).padStart(2, "0") + '">' +
      '<div class="wd-hint">When the countdown hits zero, every open <strong>Today</strong> task has its status cleared so tomorrow starts blank.</div>' +
      '<button class="wd-trigger" id="wd-trigger-now">Wind down now</button>' +
    '</div>'
  ) : "";

  if (triggeredToday) {
    wrap.innerHTML =
      '<div class="wind-down done" id="wind-down-btn" title="Wound down for today">' +
        '<div class="wd-left">' +
          '<div class="wd-label">Wind-down complete</div>' +
          '<div class="wd-target">Triggered at ' + formatTargetLabel() + ' · click to adjust</div>' +
        '</div>' +
        '<div class="wd-time">Done</div>' +
      '</div>' + popover;
    wireWindDown();
    return;
  }

  const target = getWindDownTargetToday();
  const ms = target.getTime() - Date.now();
  const urgent = ms > 0 && ms < 30 * 60 * 1000; // last 30 min
  wrap.innerHTML =
    '<div class="wind-down' + (urgent ? " urgent" : "") + '" id="wind-down-btn" ' +
      'title="Click to adjust">' +
      '<div class="wd-left">' +
        '<div class="wd-label">Time Until Wind-Down</div>' +
        '<div class="wd-target">at ' + formatTargetLabel() + ' · click to adjust</div>' +
      '</div>' +
      '<div class="wd-time">' + formatCountdown(ms) + '</div>' +
    '</div>' + popover;
  wireWindDown();
}

function wireWindDown() {
  const btn = document.getElementById("wind-down-btn");
  if (btn && !btn.dataset.wired) {
    btn.dataset.wired = "1";
    btn.addEventListener("click", (e) => {
      // Skip if click is inside the popover, deep-work controls, or while a
      // focus session is active.
      if (e.target.closest("#wind-down-popover")) return;
      if (e.target.closest("#deep-start-btn")) return;
      if (e.target.closest("#deep-end-btn")) return;
      if (state.deepWork && state.deepWork.active) return;
      e.stopPropagation();
      activeWindDownEditor = !activeWindDownEditor;
      renderWindDown();
      if (activeWindDownEditor) {
        setTimeout(() => {
          const inp = document.getElementById("wd-time-input");
          if (inp) inp.focus();
        }, 0);
      }
    });
  }

  const startBtn = document.getElementById("deep-start-btn");
  if (startBtn && !startBtn.dataset.wired) {
    startBtn.dataset.wired = "1";
    startBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      startDeepWork();
    });
  }
  const endBtn = document.getElementById("deep-end-btn");
  if (endBtn && !endBtn.dataset.wired) {
    endBtn.dataset.wired = "1";
    endBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (confirm("End this focus session early?")) endDeepWork({ playChime: false });
    });
  }
  const inp = document.getElementById("wd-time-input");
  if (inp && !inp.dataset.wired) {
    inp.dataset.wired = "1";
    inp.addEventListener("change", () => {
      const parts = inp.value.split(":");
      if (parts.length !== 2) return;
      state.windDown.hour   = parseInt(parts[0], 10) || 0;
      state.windDown.minute = parseInt(parts[1], 10) || 0;
      // Adjusting the time on the same day re-arms the trigger
      state.windDown.lastTriggeredDate = null;
      markPrefsDirty();
      saveState();
      renderWindDown();
    });
    inp.addEventListener("click", (e) => e.stopPropagation());
    inp.addEventListener("mousedown", (e) => e.stopPropagation());
  }
  const trig = document.getElementById("wd-trigger-now");
  if (trig && !trig.dataset.wired) {
    trig.dataset.wired = "1";
    trig.addEventListener("click", (e) => {
      e.stopPropagation();
      state.windDown.lastTriggeredDate = null;
      triggerWindDown(true);
      activeWindDownEditor = false;
    });
  }
  // Popover itself: prevent clicks inside from bubbling to the .wind-down click
  const pop = document.getElementById("wind-down-popover");
  if (pop && !pop.dataset.wired) {
    pop.dataset.wired = "1";
    pop.addEventListener("click", (e) => e.stopPropagation());
  }
}

function triggerWindDown(manual) {
  const today = todayDateString();
  if (state.windDown.lastTriggeredDate === today) return;
  let cleared = 0;
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (a.done) return;
      if (a.status !== "today") return;
      a.status = null;
      a.stuckSince = null;
      a.blocker = "";
      a.waitingFor = "";
      touchActionable(a);
      markActionDirty(a.id);
      cleared++;
    });
  });
  state.windDown.lastTriggeredDate = today;
  markPrefsDirty();
  saveState();
  renderAll();
  if (manual) {
    // Tiny in-app acknowledgement so the user knows what happened
    const wrap = document.getElementById("wind-down-wrap");
    if (wrap) wrap.title = "Wound down " + cleared + " task" + (cleared === 1 ? "" : "s");
  }
}

function tickWindDown() {
  // Deep Work mode wins — drive its countdown and fire the chime on zero.
  if (state.deepWork && state.deepWork.active) {
    if (deepWorkRemainingMs() <= 0) {
      endDeepWork({ playChime: true });
      return;
    }
    renderWindDown();
    return;
  }
  if (!state.windDown) return;
  // Trigger check runs every tick regardless of editor state
  const today = todayDateString();
  if (state.windDown.lastTriggeredDate !== today) {
    const target = getWindDownTargetToday();
    if (Date.now() >= target.getTime()) {
      triggerWindDown(false);
      return;
    }
  }
  // Don't redraw while user is editing the popover (would steal focus)
  if (activeWindDownEditor) return;
  renderWindDown();
}

// Close the popover on outside click
document.addEventListener("click", (e) => {
  if (activeWindDownEditor &&
      !e.target.closest("#wind-down-popover") &&
      !e.target.closest("#wind-down-btn")) {
    activeWindDownEditor = false;
    renderWindDown();
  }
});
