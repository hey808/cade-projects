<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  color-scheme: dark;

  /* Dark grey + red-orange */
  --bg: #1c1c1e;
  --card: #28282c;
  --card-hover: #34343a;
  --border: #3a3a40;
  --border-strong: #4d4d54;
  --text: #f5f5f5;
  --text-2: #b8b8bc;
  --text-3: #888890;
  --text-4: #5c5c64;
  --good: #22c55e;
  --warn: #eab308;
  --bad:  #dc2626;
  --accent: #ff6b47;
  --waiting: #3b82f6;
  --backburner: #888890;
  --prio-high: #dc2626;
  --prio-med:  #eab308;
  --prio-low:  #3b82f6;

  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-serif: 'Fraunces', Georgia, "Times New Roman", serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.45;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  background: #16161a;
  border-right: 1px solid var(--border);
  padding: 22px 12px 16px;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 100vh;
  position: sticky;
  top: 0;
}
.sidebar-header { padding: 0 10px; margin-bottom: 18px; }
.sidebar-header h1 {
  font-family: var(--font-serif);
  font-size: 28px; font-weight: 600;
  letter-spacing: -0.02em;
  font-variation-settings: "opsz" 72;
  line-height: 1.05;
}
.sidebar-date {
  font-size: 11px; color: var(--text-3);
  margin-top: 4px; font-weight: 500;
}
.sidebar-tabs {
  display: flex; flex-direction: column;
  gap: 1px;
  flex: 1;
  overflow-y: auto;
  margin: 0 -2px;
  padding: 0 2px;
}
.sidebar-tab-wrap { position: relative; }
.sidebar-tab {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer; font-size: 13px;
  color: var(--text-2);
  background: transparent;
  border: none;
  width: 100%;
  font-family: inherit;
  text-align: left;
}
.sidebar-tab:hover { background: var(--card-hover); color: var(--text); }
.sidebar-tab.active { background: var(--card); color: var(--text); font-weight: 600; }
.sidebar-tab.drag-target { background: rgba(255, 107, 71, 0.18); color: var(--text); }
.sidebar-tab.dragging { opacity: 0.4; }
.sidebar-tab[draggable="true"] { cursor: grab; }
.sidebar-tab[draggable="true"]:active { cursor: grabbing; }
.sidebar-tab .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.sidebar-tab .name {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sidebar-tab .pill {
  background: rgba(255, 255, 255, 0.06); color: var(--text-3);
  padding: 1px 7px; border-radius: 8px; font-size: 10px;
  font-variant-numeric: tabular-nums; font-weight: 600;
  flex-shrink: 0;
}
.sidebar-tab.active .pill { background: var(--accent); color: var(--bg); }
.sidebar-tab .edit-icon {
  display: none; color: var(--text-4); font-size: 14px;
  padding: 0 2px; line-height: 1; flex-shrink: 0;
}
.sidebar-tab:hover .edit-icon, .sidebar-tab.active .edit-icon { display: inline-block; }
.sidebar-tab .edit-icon:hover { color: var(--text); }
.sidebar-add {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer; font-size: 13px;
  color: var(--text-4);
  background: transparent;
  border: 1px dashed transparent;
  font-family: inherit;
  width: 100%; text-align: left;
  margin-top: 6px;
}
.sidebar-add:hover {
  color: var(--accent);
  border-color: var(--border-strong);
  background: rgba(255, 107, 71, 0.05);
}
.sidebar-add .dot {
  width: 9px; height: 9px; border-radius: 50%;
  border: 1px dashed currentColor;
  background: transparent;
  flex-shrink: 0;
}
.sidebar-footer {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 2px;
}
.sidebar-footer .btn {
  text-align: left;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text-3);
  padding: 7px 10px;
  font-size: 12px;
  border-radius: 6px;
  font-weight: 500;
}
.sidebar-footer .btn:hover { color: var(--text); background: var(--card); }

/* Popover repositioned for sidebar (open to the right) */
.sidebar-tab-wrap .tab-edit-popover {
  top: 0; left: calc(100% + 8px); right: auto;
  margin-top: 0;
}

/* ── Main column ── */
.main {
  flex: 1;
  padding: 24px 28px 60px;
  min-width: 0;
  max-width: 1100px;
}
.main-header {
  display: flex; justify-content: flex-end; align-items: center;
  gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
}

/* Mobile: stack the layout */
@media (max-width: 760px) {
  body { flex-direction: column; }
  .sidebar {
    width: 100%; height: auto;
    border-right: none; border-bottom: 1px solid var(--border);
    position: relative;
    padding: 16px 14px;
  }
  .sidebar-tabs {
    flex-direction: row; gap: 4px;
    overflow-x: auto; overflow-y: visible;
    padding-bottom: 4px;
  }
  .sidebar-tab { width: auto; white-space: nowrap; }
  .sidebar-add { width: auto; }
  .sidebar-footer {
    flex-direction: row; margin-top: 12px; padding-top: 10px;
  }
  .main { padding: 18px 18px 60px; max-width: none; }
  .sidebar-tab-wrap .tab-edit-popover {
    top: 100%; left: 0; right: auto; margin-top: 6px;
  }
}

/* Search */
.search-wrap { position: relative; }
input.search {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px;
  padding: 7px 11px 7px 28px;
  font-size: 12px; font-family: inherit;
  width: 220px;
  transition: border-color 0.15s, width 0.2s;
}
input.search:focus { outline: none; border-color: var(--accent); width: 280px; }
input.search::placeholder { color: var(--text-4); }
.search-wrap::before {
  content: "⌕"; position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--text-4); font-size: 14px; pointer-events: none;
}
.search-wrap kbd {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: var(--border); color: var(--text-3);
  padding: 1px 5px; border-radius: 3px;
  font-size: 9px; font-family: inherit; font-weight: 500;
  pointer-events: none;
}
input.search:focus + kbd { display: none; }

/* Daily progress dashboard */
.daily-dashboard {
  background: linear-gradient(135deg, #2e2925 0%, #1c1c1e 100%);
  border: 1px solid rgba(255, 107, 71, 0.28);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 14px;
}
.daily-dashboard .dd-top {
  display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px;
  margin-bottom: 10px;
}
.daily-dashboard .dd-date {
  font-size: 13px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.daily-dashboard .dd-stats {
  font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums;
}
.daily-dashboard .dd-stats strong { color: var(--text); font-weight: 600; }
.dd-progress-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 6px;
}
.dd-progress-bar {
  flex: 1; height: 8px; background: rgba(255,255,255,0.05);
  border-radius: 4px; overflow: hidden;
}
.dd-progress-bar > div {
  height: 100%; background: linear-gradient(90deg, var(--good) 0%, #16a34a 100%);
  transition: width 0.4s ease-out;
}
.dd-progress-label {
  font-size: 12px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.dd-quick {
  font-size: 11px; color: var(--text-3); display: flex; gap: 16px; flex-wrap: wrap;
}
.dd-quick span strong { color: var(--text-2); font-weight: 600; }
.dd-quick .pill-stuck { color: var(--bad); }
.dd-quick .pill-waiting { color: var(--waiting); }
.dd-quick .pill-backburner { color: var(--text-3); }

/* Tabs */
.tabs {
  display: flex; gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.tab {
  background: transparent; border: none; color: var(--text-3);
  padding: 10px 16px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: inline-flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab .pill {
  display: inline-block;
  background: var(--card); color: var(--text-3);
  padding: 1px 7px; border-radius: 8px; font-size: 10px;
  font-variant-numeric: tabular-nums; font-weight: 600;
}
.tab.active .pill { background: var(--accent); color: #0a0a0a; }
.tab .tab-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.tab.drag-target {
  background: rgba(255, 107, 71, 0.15);
  border-radius: 6px 6px 0 0;
}
.tab-wrap { position: relative; display: inline-flex; align-items: center; }
.tab .tab-edit-icon {
  display: none; margin-left: 4px; color: var(--text-4);
  font-size: 14px; line-height: 1; cursor: pointer; padding: 0 2px;
  border-radius: 3px;
}
.tab:hover .tab-edit-icon, .tab.active .tab-edit-icon { display: inline-flex; }
.tab .tab-edit-icon:hover { color: var(--text); background: var(--card-hover); }

.tab-add {
  background: transparent; border: 1px dashed var(--border-strong);
  color: var(--text-3);
  padding: 4px 12px;
  border-radius: 6px 6px 0 0;
  font-size: 16px; font-weight: 400; line-height: 1;
  cursor: pointer; font-family: inherit;
  margin-bottom: -1px;
  align-self: stretch;
}
.tab-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(255, 107, 71, 0.08); }

.tab-edit-popover {
  position: absolute; top: 100%; left: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 100; min-width: 240px; margin-top: 6px;
}
.tab-edit-popover input.name {
  width: 100%; background: var(--bg); border: 1px solid var(--border-strong);
  color: var(--text); border-radius: 5px;
  padding: 6px 9px; font-size: 13px; font-family: inherit;
  margin-bottom: 10px;
}
.tab-edit-popover input.name:focus { outline: none; border-color: var(--accent); }
.tab-edit-popover .swatches {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
}
.tab-edit-popover .delete-btn {
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-3);
  padding: 5px 10px; font-size: 11px;
  border-radius: 5px; cursor: pointer; font-family: inherit;
  width: 100%;
}
.tab-edit-popover .delete-btn:hover { color: var(--bad); border-color: var(--bad); background: rgba(239, 68, 68, 0.1); }

/* Filter bar */
.filter-bar {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
  padding: 0 0 14px;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.filter-dropdown { position: relative; }
.filter-dropdown-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text-2);
  padding: 6px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.filter-dropdown-btn:hover { border-color: var(--border-strong); color: var(--text); }
.filter-dropdown-btn.active { border-color: var(--accent); }
.filter-dropdown-btn .label { color: var(--text-3); }
.filter-dropdown-btn .value { color: var(--text); font-weight: 600; }
.filter-dropdown-btn .caret { color: var(--text-4); font-size: 9px; margin-left: 2px; }
.filter-dropdown-btn .dot.small {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}

.filter-dropdown-menu {
  position: absolute; top: 100%; left: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 50; min-width: 180px; margin-top: 4px;
}
.filter-dropdown-menu .option {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 5px;
  cursor: pointer; font-size: 12px;
  color: var(--text);
}
.filter-dropdown-menu .option:hover { background: var(--card-hover); }
.filter-dropdown-menu .option.selected { background: var(--card-hover); }
.filter-dropdown-menu .option .dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}
.filter-dropdown-menu .option .check {
  margin-left: auto; color: var(--accent); font-size: 11px;
}

.filter-clear {
  font-size: 11px; color: var(--text-3);
  background: none; border: none; cursor: pointer;
  text-decoration: underline; font-family: inherit;
  margin-left: auto;
}
.filter-clear:hover { color: var(--text); }

/* Buttons */
.btn {
  background: var(--text); color: var(--bg); border: none; border-radius: 6px;
  padding: 8px 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.btn:hover { background: var(--text-2); }
.btn.accent { background: var(--accent); color: #0a0a0a; }
.btn.accent:hover { background: #fbbf24; }
.btn.ghost {
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-2); padding: 5px 10px; font-size: 11px;
}
.btn.ghost:hover { background: var(--card-hover); color: var(--text); }
.btn.add-line {
  background: transparent; border: 1px dashed var(--border-strong); color: var(--text-3);
  padding: 6px 10px; font-size: 11px; width: 100%; text-align: left;
  border-radius: 5px; margin-top: 6px;
}
.btn.add-line:hover { border-color: var(--accent); color: var(--accent); }

/* Labels management panel */
.labels-panel {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 14px;
}
.labels-panel.hidden { display: none; }
.labels-panel h3 {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 10px;
}
.label-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.label-row:last-of-type { border-bottom: none; }
.label-row input.label-name {
  flex: 1; background: transparent; border: none;
  font-size: 13px; color: var(--text); font-family: inherit;
  padding: 4px 0; min-width: 0;
}
.label-row input.label-name:focus { outline: none; }
.label-row input.label-name::placeholder { color: var(--text-4); }
.color-swatches { display: flex; gap: 4px; flex-wrap: wrap; }
.color-swatch {
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--text); }
.label-row .li-rm {
  background: none; border: none; color: var(--text-4); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0 4px;
  opacity: 0; transition: opacity 0.15s;
}
.label-row:hover .li-rm { opacity: 1; }
.label-row .li-rm:hover { color: var(--bad); }

/* Project list */
.projects { display: flex; flex-direction: column; gap: 14px; }

.project {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px 16px 22px;
  position: relative;
  transition: opacity 0.15s;
}
.project:hover { border-color: var(--border-strong); }
.project::before {
  content: ""; position: absolute; left: 0; right: 0; top: -3px;
  height: 2px; background: var(--accent); border-radius: 1px;
  opacity: 0; transition: opacity 0.15s;
}
.project.drag-over::before { opacity: 1; }
.project.dragging { opacity: 0.4; }
.project.hidden-by-search { display: none; }

.project[data-label-color]::after {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--proj-color, transparent);
  border-radius: 12px 0 0 12px;
}

.drag-handle {
  position: absolute; left: 4px; top: 16px;
  width: 14px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  cursor: grab; opacity: 0;
  color: var(--text-4); font-size: 12px; line-height: 1;
  user-select: none; transition: opacity 0.15s;
}
.project:hover .drag-handle { opacity: 1; }
.drag-handle:hover { color: var(--text-2); }
.drag-handle:active { cursor: grabbing; }

.project .delete-btn {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: var(--text-4);
  cursor: pointer; padding: 4px 8px; font-size: 11px;
  border-radius: 5px; font-family: inherit;
  opacity: 0; transition: opacity 0.15s;
}
.project:hover .delete-btn { opacity: 1; }
.project .delete-btn:hover { color: var(--bad); background: rgba(239, 68, 68, 0.1); }

.proj-header-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 4px; padding-right: 70px;
}
.proj-name {
  flex: 1; min-width: 0; background: transparent; border: none;
  font-family: var(--font-serif);
  font-size: 22px; font-weight: 500; letter-spacing: -0.01em;
  font-variation-settings: "opsz" 36;
  color: var(--text); padding: 2px 0;
}
.proj-name:focus { outline: none; }
.proj-name::placeholder { color: var(--text-4); font-weight: 500; }

.proj-goal {
  width: 100%; background: transparent; border: none;
  font-size: 13px; color: var(--text-2); font-family: inherit;
  padding: 2px 0; margin-bottom: 14px;
  border-bottom: 1px solid transparent;
}
.proj-goal:focus { outline: none; border-bottom-color: var(--border); }
.proj-goal::placeholder { color: var(--text-4); font-style: italic; }

.section-head {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-3);
  margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.section-head .count {
  background: #27272a; color: var(--text-2);
  border-radius: 3px; padding: 1px 6px; font-size: 9px;
  font-weight: 600; letter-spacing: 0;
}

/* Project label chip */
.label-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 11px;
  font-size: 10px; font-weight: 600;
  cursor: pointer; font-family: inherit; border: 1px solid transparent;
  text-transform: uppercase; letter-spacing: 0.04em;
  white-space: nowrap;
}
.label-chip.unset {
  background: transparent; color: var(--text-4);
  border-color: var(--border-strong);
}
.label-chip.unset:hover { color: var(--text-2); border-color: var(--border); }
.label-chip .dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}

.label-picker {
  position: absolute; top: 100%; right: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 50; min-width: 180px; margin-top: 4px;
}
.label-picker .picker-option {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 5px;
  cursor: pointer; font-size: 12px;
}
.label-picker .picker-option:hover { background: var(--card-hover); }
.label-picker .picker-option .dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.label-picker .picker-divider { height: 1px; background: var(--border); margin: 4px 0; }
.label-picker .picker-option.clear { color: var(--text-3); font-style: italic; }

/* Items (actionables) */
ul.items { list-style: none; }
ul.items > li {
  padding: 7px 0; border-bottom: 1px solid var(--border);
  position: relative;
}
ul.items > li:last-child { border-bottom: none; }
ul.items > li:first-child { padding-top: 0; }
ul.items > li.dragging { opacity: 0.4; }
ul.items > li::before {
  content: ""; position: absolute; left: -8px; right: 0; top: -1px;
  height: 2px; background: var(--accent); border-radius: 1px;
  opacity: 0;
}
ul.items > li.drag-over::before { opacity: 1; }
ul.items > li.hidden-by-search { display: none; }

.item-row {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}

.item-drag-handle {
  width: 12px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: grab; opacity: 0;
  color: var(--text-4); font-size: 11px; line-height: 1;
  user-select: none; transition: opacity 0.15s;
  flex-shrink: 0;
}
ul.items > li:hover .item-drag-handle { opacity: 1; }
.item-drag-handle:active { cursor: grabbing; }

ul.items input[type="checkbox"] {
  accent-color: var(--good); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0;
}
ul.items input.item-text {
  flex: 1; min-width: 100px; border: none; background: transparent;
  font-size: 13px; color: var(--text); font-family: inherit;
  padding: 3px 0;
}
ul.items input.item-text:focus { outline: none; }
ul.items input.item-text::placeholder { color: var(--text-4); }
ul.items li.done input.item-text { color: var(--text-4); text-decoration: line-through; }

/* Priority chip */
.priority-chip {
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-4);
  padding: 1px 6px; border-radius: 8px; font-size: 9px;
  cursor: pointer; font-family: inherit; font-weight: 700;
  letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0;
  min-width: 22px; text-align: center;
}
.priority-chip:hover { background: var(--card-hover); color: var(--text-2); }
.priority-chip.p-1 { background: rgba(59, 130, 246, 0.15); color: var(--prio-low); border-color: var(--prio-low); }
.priority-chip.p-2 { background: rgba(234, 179, 8, 0.15); color: var(--prio-med); border-color: var(--prio-med); }
.priority-chip.p-3 { background: rgba(239, 68, 68, 0.15); color: var(--prio-high); border-color: var(--prio-high); }

/* Age badge (since last update) */
.meta-badge {
  font-size: 10px; font-variant-numeric: tabular-nums;
  white-space: nowrap; flex-shrink: 0;
  padding: 1px 6px; border-radius: 8px;
  font-weight: 500;
}
.meta-badge.level-fresh  { color: var(--text-4); }
.meta-badge.level-normal { color: var(--text-3); }
.meta-badge.level-warn   { color: var(--warn); background: rgba(234, 179, 8, 0.10); }
.meta-badge.level-bad    { color: var(--bad);  background: rgba(239, 68, 68, 0.10); }

/* Status chip + picker */
.status-wrap { position: relative; flex-shrink: 0; }
.status-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 9px; border-radius: 10px;
  font-size: 10px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  border: 1px solid transparent;
  text-transform: uppercase; letter-spacing: 0.04em;
  white-space: nowrap;
}
.status-chip.unset {
  background: transparent; color: var(--text-4);
  border-color: var(--border-strong);
}
.status-chip.unset:hover { color: var(--text-2); border-color: var(--border); }
.status-chip.today      { background: rgba(255, 107, 71, 0.18); color: var(--accent);     border-color: var(--accent); }
.status-chip.backburner { background: rgba(113, 113, 122, 0.18); color: var(--text-2);    border-color: var(--text-3); }
.status-chip.waiting    { background: rgba(59, 130, 246, 0.15);  color: var(--waiting);   border-color: var(--waiting); }
.status-chip.stuck      { background: rgba(239, 68, 68, 0.15);   color: var(--bad);       border-color: var(--bad); }
.status-chip .dot {
  width: 7px; height: 7px; border-radius: 50%; display: inline-block;
}

.status-picker {
  position: absolute; top: 100%; right: 0;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 50; min-width: 160px; margin-top: 4px;
}
.status-picker .picker-option {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 5px;
  cursor: pointer; font-size: 12px;
  text-transform: none; letter-spacing: 0;
}
.status-picker .picker-option:hover { background: var(--card-hover); }
.status-picker .picker-option .dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}
.status-picker .picker-divider { height: 1px; background: var(--border); margin: 4px 0; }
.status-picker .picker-option.clear { color: var(--text-3); font-style: italic; }

ul.items .li-rm {
  background: none; border: none; color: var(--text-4); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0 4px;
  opacity: 0; transition: opacity 0.15s;
  flex-shrink: 0;
}
ul.items li:hover .li-rm { opacity: 1; }
ul.items .li-rm:hover { color: var(--bad); }

/* Context rows under stuck/waiting */
.context-row {
  margin-top: 6px; margin-left: 35px;
  display: flex; align-items: center; gap: 8px;
}
.context-row.hidden { display: none; }
.context-row .lbl {
  font-size: 9px;
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
  white-space: nowrap;
}
.context-row input {
  flex: 1;
  border-radius: 5px;
  color: var(--text); font-family: inherit;
  padding: 4px 8px; font-size: 12px;
}
.context-row input:focus { outline: none; }
.context-row input::placeholder { color: var(--text-4); font-style: italic; }

.context-row.stuck .lbl { color: var(--bad); }
.context-row.stuck input {

  border: 1px solid rgba(239, 68, 68, 0.2);
}
.context-row.stuck input:focus { border-color: var(--bad); }

.context-row.waiting .lbl { color: var(--waiting); }
.context-row.waiting input {
  background: rgba(59, 130, 246, 0.06);
  border: 1px solid rgba(59, 130, 246, 0.2);
}
.context-row.waiting input:focus { border-color: var(--waiting); }

/* Done footer */
.done-footer {
  margin-top: 6px;
  font-size: 11px; color: var(--text-4);
  cursor: pointer; padding: 6px 0;
  border-top: 1px dashed var(--border);

}
.done-footer:hover { color: var(--text-2); }
.done-footer .caret { font-size: 9px; }
.done-footer.expanded { color: var(--text-3); }

.empty-line {
  font-size: 11px; color: var(--text-4); font-style: italic;

}

.empty-state {
  text-align: center; padding: 60px 20px;

}
.empty-state h2 {

}
.empty-state p { font-size: 12px; margin-bottom: 14px; }

/* Today view: stat strip */
.today-stats {

}
.today-stat {

}
.today-stat .lbl {

}
.today-stat .val {

.today-stat.high .val { color: var(--prio-high); }

@media (max-width: 640px) { .today-stats { grid-template-columns: 1fr; } }

/* Today view */
.today-list { display: flex; flex-direction: column; gap: 6px; }
.today-group { margin-bottom: 18px; }
.today-group h3 {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;

}
.today-item {

  background: var(--card); border: 1px solid var(--border);

}
.today-item input[type="checkbox"] {

}
.today-item .text { flex: 1; font-size: 13px; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; }

.today-item .proj-tag {
  font-size: 10px; color: var(--text-2);

}
.today-item .proj-tag:hover { background: #2a2a30; color: var(--text); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

/* ── Auth screen ── */
.auth-screen {

.auth-divider {

.auth-divider::before, .auth-divider::after {

.auth-switch {

/* Signed-in display in sidebar footer */
.signed-in {
  display: flex; align-items: center; justify-content: space-between;

/* Initial loading */
.boot-loading {
  position: fixed; inset: 0;

  font-family: var(--font-serif);
  font-size: 18px;
  z-index: 999;
}
.boot-loading.hidden { display: none; }
</style>

<script>
// ─── Supabase setup ────────────────────────────────────
const SUPABASE_URL = 'https://dpajalzciwioztpyptrb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BrbLOcsaBWGrlNObREF9ew_MFwcTLWh';
let sb = null;
let currentUser = null;
let authMode = 'signin';
let syncEnabled = false; // set true after initial cloud load to start syncing mutations

function bootLog(msg) { /* console.log('[slate]', msg); */ }

try {
  if (window.supabase && window.supabase.createClient) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });
  }
} catch (e) {
  console.error('Supabase init failed', e);
}

// ─── Status definitions ────────────────────────────────
const STATUSES = ["today", "backburner", "waiting", "stuck"];
const STATUS_META = {
  today:      { label: "Today",      color: "#ff6b47" },
  backburner: { label: "Backburner", color: "#888890" },
  waiting:    { label: "Waiting",    color: "#3b82f6" },
  stuck:      { label: "Stuck",      color: "#dc2626" }
};

// ─── State ──────────────────────────────────────────────
const STORE_KEY = "projects-v1";
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { projects: [], labels: [] }; }
  catch(e) { return { projects: [], labels: [] }; }
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
let state = loadState();
state.projects = state.projects || [];
state.labels = state.labels || [];
state.filters = state.filters || {};
// Migrate from previous multi-select arrays to single-value dropdowns
if (Array.isArray(state.filters.statuses)) {
  state.filters.status = state.filters.statuses[0] || null;
  delete state.filters.statuses;
}
if (Array.isArray(state.filters.labelIds)) delete state.filters.labelIds;
delete state.filters.labelId; // tabs replaced this filter
if (state.filters.status === undefined)   state.filters.status = null;
if (state.filters.priority === undefined) state.filters.priority = null;

// Tab color palette — saturated tones that read on dark grey
const COLOR_PALETTE = [
  { name: "coral",   hex: "#ff6b47" },
  { name: "red",     hex: "#dc2626" },
  { name: "orange",  hex: "#f97316" },
  { name: "yellow",  hex: "#eab308" },
  { name: "green",   hex: "#22c55e" },
  { name: "cyan",    hex: "#06b6d4" },
  { name: "blue",    hex: "#3b82f6" },
  { name: "purple",  hex: "#a855f7" },
  { name: "pink",    hex: "#ec4899" }
];

// Migrate schema
const NOW = new Date().toISOString();
state.projects.forEach(p => {
  if (p.labelId === undefined) p.labelId = null;
  if (!p.createdAt) p.createdAt = NOW;
  (p.actionables || []).forEach(a => {
    // Convert legacy labels array to single status
    if (a.status === undefined) {
      const labs = Array.isArray(a.labels) ? a.labels : [];
      if (labs.includes("stuck"))         a.status = "stuck";
      else if (labs.includes("today"))    a.status = "today";
      else if (labs.includes("waiting"))  a.status = "waiting";
      else                                 a.status = null;
    }
    // Legacy blockedBy → blocker text
    if (Array.isArray(a.blockedBy) && a.blockedBy.length && Array.isArray(p.blockers)) {
      const texts = a.blockedBy
        .map(bid => (p.blockers.find(b => b.id === bid) || {}).text)
        .filter(Boolean);
      if (texts.length && !a.blocker) a.blocker = texts.join("; ");
    }
    if (typeof a.blocker !== "string")    a.blocker = "";
    if (typeof a.waitingFor !== "string") a.waitingFor = "";
    if (!a.createdAt) a.createdAt = p.createdAt || NOW;
    if (!a.updatedAt) a.updatedAt = a.createdAt;
    if (typeof a.priority !== "number") a.priority = 0;
    if (a.stuckSince === undefined) {
      a.stuckSince = a.status === "stuck" ? NOW : null;
    }
    if (a.doneAt === undefined) a.doneAt = a.done ? NOW : null;
    delete a.labels;
    delete a.blockedBy;
    delete a.dueDate;
  });
  delete p.blockers;
});
saveState();

let currentView = (window.localStorage.getItem("view") || "today");
let activeStatusPicker = null; // "<projId>:<itemId>" or null
let searchTerm = "";
let expandedDone = new Set();

const ARCHIVE_AFTER_MS = 24 * 60 * 60 * 1000;

function uid() { return Math.random().toString(36).slice(2,10); }
function escapeAttr(s) {
  const div = document.createElement("div");
  div.textContent = s == null ? "" : String(s);
  return div.innerHTML.replace(/"/g, "&quot;");
}
function findProject(id) { return state.projects.find(p => p.id === id); }
function findActionable(p, id) { return p && p.actionables.find(a => a.id === id); }
function findLabel(id) { return state.labels.find(l => l.id === id); }

function daysSince(iso) {
  if (!iso) return 0;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}
function ageBadgeData(updatedAtIso) {
  if (!updatedAtIso) return null;
  const ms = Date.now() - new Date(updatedAtIso).getTime();
  if (ms < 3600000) return null;
  const hours = Math.floor(ms / 3600000);
  if (hours < 24) return { text: hours + "h", level: "fresh" };
  const days = Math.floor(hours / 24);
  let level = "normal";
  if (days >= 14) level = "bad";
  else if (days >= 7) level = "warn";
  return { text: days + "d", level };
}
function touchActionable(a) { a.updatedAt = new Date().toISOString(); }

// ─── Filter helpers (Status + Priority only — label is now the tab) ──
function isStatusFilterActive()   { return state.filters.status !== null; }
function isPriorityFilterActive() { return state.filters.priority !== null; }
function isItemFilterActive()     { return isStatusFilterActive() || isPriorityFilterActive(); }
function passesStatusFilter(a) {
  if (!isStatusFilterActive()) return true;
  const aStatus = a.status || "none";
  return aStatus === state.filters.status;
}
function passesPriorityFilter(a) {
  if (!isPriorityFilterActive()) return true;
  return a.priority === state.filters.priority;
}
function passesAllItemFilters(a) {
  return passesStatusFilter(a) && passesPriorityFilter(a);
}
function setFilter(type, value) {
  if (type === "status")   state.filters.status = value;
  else if (type === "priority") state.filters.priority = value;
  markPrefsDirty();
  saveState();
}
function clearFilters() {
  state.filters.status = null;
  state.filters.priority = null;
  markPrefsDirty();
  saveState();
  renderFilterBar();
  if (currentView === "today") renderToday();
  else renderProjects();
}

// View → project filter (tab is the category)
function projectsInCurrentView() {
  if (currentView === "today") return [];
  if (currentView === "all")          return state.projects;
  if (currentView === "uncategorized") return state.projects.filter(p => !p.labelId);
  return state.projects.filter(p => p.labelId === currentView);
}

let activeFilterDropdown = null;

// ─── Project CRUD ──────────────────────────────────────
function addProject() {
  let labelId = null;
  if (currentView !== "today" && currentView !== "all" && currentView !== "uncategorized") {
    labelId = currentView;
  }
  const p = {
    id: uid(), name: "", goal: "", labelId,
    actionables: [], createdAt: new Date().toISOString()
  };
  state.projects.unshift(p);
  if (currentView === "today") {
    currentView = state.labels.length === 0 ? "all" : "uncategorized";
    window.localStorage.setItem("view", currentView);
    markPrefsDirty();
  }
  saveState();
  markAllProjectsDirty(); // positions shifted (unshift)
  renderAll();
  setTimeout(() => {
    const el = document.querySelector('[data-project-id="' + p.id + '"] .proj-name');
    if (el) el.focus();
  }, 0);
}
function deleteProject(id) {
  if (!confirm("Delete this project? Its actionables will be removed.")) return;
  const p = findProject(id);
  if (p) p.actionables.forEach(a => markActionDeleted(a.id));
  markProjectDeleted(id);
  state.projects = state.projects.filter(p => p.id !== id);
  saveState(); renderAll();
}
function updateProjectField(id, field, value) {
  const p = findProject(id); if (!p) return;
  p[field] = value;
  markProjectDirty(id);
  saveState();
}
function setProjectLabel(projId, labelId) {
  const p = findProject(projId); if (!p) return;
  p.labelId = labelId || null;
  markProjectDirty(projId);
  saveState(); renderAll();
}

// ─── Actionables ───────────────────────────────────────
function addActionable(projId) {
  const p = findProject(projId); if (!p) return;
  const now = new Date().toISOString();
  const a = {
    id: uid(), text: "", done: false,
    status: null,
    blocker: "", waitingFor: "",
    createdAt: now, updatedAt: now,
    priority: 0, stuckSince: null, doneAt: null
  };
  p.actionables.push(a);
  markActionDirty(a.id);
  saveState(); renderProjects();
  setTimeout(() => {
    const items = document.querySelectorAll('[data-project-id="' + projId + '"] .actionables-list input.item-text');
    const last = items[items.length - 1];
    if (last) last.focus();
  }, 0);
}
function updateActionable(projId, itemId, field, value) {
  const p = findProject(projId); if (!p) return;
  const it = findActionable(p, itemId); if (!it) return;
  if (field === "done") {
    if (value && !it.done) it.doneAt = new Date().toISOString();
    if (!value) it.doneAt = null;
  }
  it[field] = value;
  touchActionable(it);
  markActionDirty(itemId);
  saveState();
}
function removeActionable(projId, itemId) {
  const p = findProject(projId); if (!p) return;
  p.actionables = p.actionables.filter(a => a.id !== itemId);
  markActionDeleted(itemId);
  saveState(); renderAll();
}
function setActionableStatus(projId, itemId, status) {
  const p = findProject(projId); if (!p) return;
  const a = findActionable(p, itemId); if (!a) return;
  const prevStatus = a.status;
  a.status = STATUSES.includes(status) ? status : null;
  if (a.status === "stuck" && prevStatus !== "stuck") a.stuckSince = new Date().toISOString();
  if (a.status !== "stuck") a.stuckSince = null;
  if (a.status !== "stuck") a.blocker = "";
  if (a.status !== "waiting") a.waitingFor = "";
  touchActionable(a);
  markActionDirty(itemId);
  saveState(); renderAll();
}
function cyclePriority(projId, itemId) {
  const p = findProject(projId); if (!p) return;
  const a = findActionable(p, itemId); if (!a) return;
  a.priority = (a.priority + 1) % 4;
  touchActionable(a);
  markActionDirty(itemId);
  saveState(); renderProjects();
}
function reorderActionables(projId, draggedId, targetId) {
  const p = findProject(projId); if (!p) return;
  const draggedIdx = p.actionables.findIndex(a => a.id === draggedId);
  if (draggedIdx === -1) return;
  const dragged = p.actionables[draggedIdx];
  p.actionables.splice(draggedIdx, 1);
  const newTargetIdx = p.actionables.findIndex(a => a.id === targetId);
  if (newTargetIdx === -1) { p.actionables.splice(draggedIdx, 0, dragged); return; }
  p.actionables.splice(newTargetIdx, 0, dragged);
  markProjectActionsDirty(projId);
  saveState(); renderProjects();
}

// ─── Labels (tab) CRUD ─────────────────────────────────
function updateLabel(id, field, value) {
  const l = findLabel(id); if (!l) return;
  l[field] = value;
  markTabDirty(id);
  saveState();
  renderTabs();
}
function deleteLabel(id) {
  if (!confirm("Delete this tab? Projects in it will become Uncategorized.")) return;
  state.labels = state.labels.filter(l => l.id !== id);
  // Any projects that pointed at this label become uncategorized — those rows need to sync
  state.projects.forEach(p => {
    if (p.labelId === id) { p.labelId = null; markProjectDirty(p.id); }
  });
  markTabDeleted(id);
  if (currentView === id) { currentView = "today"; markPrefsDirty(); }
  saveState(); renderAll();
}

// ─── View switching ────────────────────────────────────
function validViews() {
  const set = new Set(["today"]);
  if (state.labels.length === 0) set.add("all");
  state.labels.forEach(l => set.add(l.id));
  if (state.projects.some(p => !p.labelId)) set.add("uncategorized");
  return set;
}
function setView(view) {
  const valid = validViews();
  if (!valid.has(view)) view = "today";
  currentView = view;
  window.localStorage.setItem("view", view);
  markPrefsDirty();
  document.getElementById('today-view').style.display = view === 'today' ? 'block' : 'none';
  document.getElementById('projects-view').style.display = view !== 'today' ? 'block' : 'none';
  renderAll();
}

// ─── Render tabs ───────────────────────────────────────
let activeTabEditor = null; // labelId currently being edited, or null

function renderTabEditPopover(l) {
  const swatches = COLOR_PALETTE.map(c =>
    '<div class="color-swatch ' + (l.color === c.hex ? "selected" : "") + '" ' +
      'data-color="' + c.hex + '" data-label-id="' + l.id + '" ' +
      'style="background:' + c.hex + ';" title="' + c.name + '"></div>'
  ).join("");
  return '<div class="tab-edit-popover" data-label-id="' + l.id + '">' +
    '<input type="text" class="name" placeholder="Tab name" value="' + escapeAttr(l.name) + '">' +
    '<div class="swatches">' + swatches + '</div>' +
    '<button class="delete-btn" data-action="delete-tab" data-label-id="' + l.id + '">Delete tab</button>' +
  '</div>';
}

function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  let todayOpen = 0;
  state.projects.forEach(p => p.actionables.forEach(a => {
    if (!a.done && a.status === "today") todayOpen++;
  }));

  let html = '';
  // Today (no color dot — it's the universal view)
  html += '<div class="sidebar-tab-wrap">' +
    '<button class="sidebar-tab' + (currentView === "today" ? " active" : "") + '" data-view="today">' +
      '<span class="dot" style="background:transparent;"></span>' +
      '<span class="name">Today</span>' +
      '<span class="pill">' + todayOpen + '</span>' +
    '</button>' +
  '</div>';

  if (state.labels.length === 0 && state.projects.length > 0) {
    html += '<div class="sidebar-tab-wrap">' +
      '<button class="sidebar-tab' + (currentView === "all" ? " active" : "") + '" data-view="all">' +
        '<span class="dot" style="background:var(--text-4);"></span>' +
        '<span class="name">Projects</span>' +
        '<span class="pill">' + state.projects.length + '</span>' +
      '</button>' +
    '</div>';
  } else {
    state.labels.forEach(l => {
      const count = state.projects.filter(p => p.labelId === l.id).length;
      const isActive = currentView === l.id;
      const popover = activeTabEditor === l.id ? renderTabEditPopover(l) : '';
      html += '<div class="sidebar-tab-wrap">' +
        '<button class="sidebar-tab' + (isActive ? " active" : "") + '" data-view="' + l.id + '">' +
          '<span class="dot" style="background:' + l.color + ';"></span>' +
          '<span class="name">' + escapeAttr(l.name || "Unnamed") + '</span>' +
          '<span class="pill">' + count + '</span>' +
          '<span class="edit-icon" data-tab-edit="' + l.id + '" title="Edit tab">⋮</span>' +
        '</button>' +
        popover +
      '</div>';
    });
    const uncategorized = state.projects.filter(p => !p.labelId).length;
    if (uncategorized > 0) {
      html += '<div class="sidebar-tab-wrap">' +
        '<button class="sidebar-tab' + (currentView === "uncategorized" ? " active" : "") + '" data-view="uncategorized">' +
          '<span class="dot" style="background:var(--text-4);"></span>' +
          '<span class="name">Uncategorized</span>' +
          '<span class="pill">' + uncategorized + '</span>' +
        '</button>' +
      '</div>';
    }
  }

  // "+ New tab" button
  html += '<button class="sidebar-add" id="tab-add" title="New tab">' +
    '<span class="dot"></span>' +
    '<span class="name">New tab</span>' +
  '</button>';

  tabsEl.innerHTML = html;
  wireTabs();
}

function wireTabs() {
  const tabsEl = document.getElementById("tabs");

  // Tab click → switch view (but not if clicking the edit icon)
  tabsEl.querySelectorAll('.sidebar-tab').forEach(t => {
    const view = t.dataset.view;
    const isLabel = !["today", "all", "uncategorized"].includes(view);

    t.addEventListener('click', (e) => {
      if (e.target.closest('[data-tab-edit]')) return;
      setView(view);
    });

    // Label tabs are themselves draggable (for reordering)
    if (isLabel) {
      t.draggable = true;
      t.addEventListener('dragstart', (e) => {
        e.stopPropagation();
        t.classList.add('dragging');
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("application/x-label", view);
      });
      t.addEventListener('dragend', () => {
        t.classList.remove('dragging');
        document.querySelectorAll('.sidebar-tab.drag-target').forEach(el => el.classList.remove('drag-target'));
      });
    }

    // Accept drops: projects (move project to tab) and labels (reorder tabs)
    t.addEventListener('dragover', (e) => {
      const types = Array.from(e.dataTransfer.types);
      if (types.includes("application/x-label")) {
        if (!isLabel) return; // can't drop a label onto Today / Uncategorized / All
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        t.classList.add('drag-target');
        return;
      }
      if (types.includes("application/x-project")) {
        if (view === "today") return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        t.classList.add('drag-target');
      }
    });
    t.addEventListener('dragleave', () => t.classList.remove('drag-target'));
    t.addEventListener('drop', (e) => {
      e.preventDefault();
      t.classList.remove('drag-target');
      const labelId = e.dataTransfer.getData("application/x-label");
      const projId = e.dataTransfer.getData("application/x-project");
      if (labelId) {
        if (!isLabel || labelId === view) return;
        reorderLabels(labelId, view);
        return;
      }
      if (projId) {
        if (view === "today") return;
        let newLabelId = null;
        if (view !== "uncategorized" && view !== "all") newLabelId = view;
        const p = findProject(projId);
        if (!p || p.labelId === newLabelId) return;
        p.labelId = newLabelId;
        markProjectDirty(projId);
        saveState();
        renderAll();
      }
    });
  });

  // Edit icon click → open editor popover
  tabsEl.querySelectorAll('[data-tab-edit]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.tabEdit;
      activeTabEditor = activeTabEditor === id ? null : id;
      renderTabs();
      if (activeTabEditor) {
        setTimeout(() => {
          const inp = document.querySelector('.tab-edit-popover input.name');
          if (inp) { inp.focus(); inp.select(); }
        }, 0);
      }
    });
  });

  // "+" new tab
  const addBtn = document.getElementById('tab-add');
  if (addBtn) {
    addBtn.addEventListener('click', () => {
      const used = state.labels.map(l => l.color);
      const next = COLOR_PALETTE.find(c => !used.includes(c.hex)) || COLOR_PALETTE[0];
      const newLabel = { id: uid(), name: "", color: next.hex };
      state.labels.push(newLabel);
      currentView = newLabel.id;
      window.localStorage.setItem("view", currentView);
      activeTabEditor = newLabel.id;
      markTabDirty(newLabel.id);
      markPrefsDirty();
      saveState();
      renderAll();
      setTimeout(() => {
        const inp = document.querySelector('.tab-edit-popover input.name');
        if (inp) inp.focus();
      }, 0);
    });
  }

  // Popover inputs
  tabsEl.querySelectorAll('.tab-edit-popover input.name').forEach(inp => {
    inp.addEventListener('click', (e) => e.stopPropagation());
    inp.addEventListener('input', () => {
      const id = inp.closest('.tab-edit-popover').dataset.labelId;
      const l = findLabel(id); if (!l) return;
      l.name = inp.value;
      saveState();
      // Update tab name live without re-rendering the popover (keeps focus)
      const tabBtn = tabsEl.querySelector('.tab[data-view="' + id + '"] .tab-name');
      if (tabBtn) tabBtn.textContent = inp.value || "Unnamed";
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === 'Escape') {
        activeTabEditor = null;
        renderTabs();
      }
    });
  });
  tabsEl.querySelectorAll('.tab-edit-popover .color-swatch').forEach(sw => {
    sw.addEventListener('click', (e) => {
      e.stopPropagation();
      updateLabel(sw.dataset.labelId, "color", sw.dataset.color);
    });
  });
  tabsEl.querySelectorAll('.tab-edit-popover [data-action="delete-tab"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm("Delete this tab? Projects in it will become Uncategorized.")) return;
      const id = btn.dataset.labelId;
      state.labels = state.labels.filter(l => l.id !== id);
      state.projects.forEach(p => {
        if (p.labelId === id) { p.labelId = null; markProjectDirty(p.id); }
      });
      markTabDeleted(id);
      if (currentView === id) { currentView = "today"; markPrefsDirty(); }
      activeTabEditor = null;
      saveState();
      renderAll();
    });
  });
}

// ─── Date header ───────────────────────────────────────
function renderDateHeader() {
  const now = new Date();
  document.getElementById("header-date").textContent =
    now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  document.getElementById("dd-date-text").textContent =
    now.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

// ─── Daily progress dashboard ──────────────────────────
function renderDailyDashboard() {
  let todayTotal = 0, todayDone = 0;
  let openTotal = 0, stuck = 0, waiting = 0, backburner = 0;
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (a.status === "today") {
        todayTotal++;
        if (a.done) todayDone++;
      }
      if (!a.done) {
        openTotal++;
        if (a.status === "stuck") stuck++;
        else if (a.status === "waiting") waiting++;
        else if (a.status === "backburner") backburner++;
      }
    });
  });
  const pct = todayTotal === 0 ? 0 : Math.round((todayDone / todayTotal) * 100);
  document.getElementById("dd-progress-fill").style.width = pct + "%";
  document.getElementById("dd-progress-label").textContent =
    todayTotal === 0 ? "Nothing on today" :
    todayDone + " / " + todayTotal + "  ·  " + pct + "%";
  document.getElementById("dd-stats").innerHTML =
    "<strong>" + state.projects.length + "</strong> project" + (state.projects.length === 1 ? "" : "s");

  document.getElementById("dd-quick").innerHTML =
    '<span><strong>' + openTotal + '</strong> open</span>' +
    '<span class="pill-stuck"><strong>' + stuck + '</strong> stuck</span>' +
    '<span class="pill-waiting"><strong>' + waiting + '</strong> waiting</span>' +
    '<span class="pill-backburner"><strong>' + backburner + '</strong> backburner</span>';
}

// ─── Filter bar ────────────────────────────────────────
function buildDropdownHtml(type, labelText, currentValue, options) {
  const isOpen = activeFilterDropdown === type;
  const current = options.find(o => o.value === currentValue) || options[0];
  const isActive = currentValue !== null;

  let menuHtml = "";
  if (isOpen) {
    const opts = options.map(o => {
      const selected = o.value === currentValue;
      let valAttr;
      if (o.value === null) valAttr = "__null__";
      else valAttr = String(o.value);
      return '<div class="option' + (selected ? " selected" : "") + '" ' +
        'data-filter-type="' + type + '" data-filter-value="' + escapeAttr(valAttr) + '">' +
        (o.color ? '<span class="dot" style="background:' + o.color + ';"></span>' : '') +
        '<span>' + escapeAttr(o.label) + '</span>' +
        (selected ? '<span class="check">✓</span>' : '') +
      '</div>';
    }).join("");
    menuHtml = '<div class="filter-dropdown-menu">' + opts + '</div>';
  }

  return '<div class="filter-dropdown">' +
    '<button class="filter-dropdown-btn' + (isActive ? " active" : "") + '" data-filter-dropdown="' + type + '">' +
      (current.color ? '<span class="dot small" style="background:' + current.color + ';"></span>' : '') +
      '<span class="label">' + labelText + ':</span>' +
      '<span class="value">' + escapeAttr(current.label) + '</span>' +
      '<span class="caret">▾</span>' +
    '</button>' +
    menuHtml +
  '</div>';
}

function renderFilterBar() {
  const bar = document.getElementById("filter-bar");
  const fs = state.filters;

  const statusOpts = [
    { value: null,        label: "All" },
    { value: "today",     label: "Today",      color: "#ff6b47" },
    { value: "backburner",label: "Backburner", color: "#888890" },
    { value: "waiting",   label: "Waiting",    color: "#3b82f6" },
    { value: "stuck",     label: "Stuck",      color: "#dc2626" },
    { value: "none",      label: "No status",  color: "#4d4d54" }
  ];
  const priorityOpts = [
    { value: null, label: "All" },
    { value: 0,    label: "None",   color: "#5c5c64" },
    { value: 1,    label: "Low",    color: "#3b82f6" },
    { value: 2,    label: "Medium", color: "#eab308" },
    { value: 3,    label: "High",   color: "#dc2626" }
  ];
  let html = "";
  html += buildDropdownHtml("status",   "Status",   fs.status,   statusOpts);
  html += buildDropdownHtml("priority", "Priority", fs.priority, priorityOpts);

  if (isStatusFilterActive() || isPriorityFilterActive()) {
    html += '<button class="filter-clear" id="filter-clear-btn">Clear filters</button>';
  }
  bar.innerHTML = html;

  bar.querySelectorAll('.filter-dropdown-btn').forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const type = btn.dataset.filterDropdown;
      activeFilterDropdown = activeFilterDropdown === type ? null : type;
      renderFilterBar();
    });
  });
  bar.querySelectorAll('.filter-dropdown-menu .option').forEach(opt => {
    opt.addEventListener("click", (e) => {
      e.stopPropagation();
      const type = opt.dataset.filterType;
      let val = opt.dataset.filterValue;
      if (val === "__null__") val = null;
      else if (type === "priority") val = parseInt(val);
      setFilter(type, val);
      activeFilterDropdown = null;
      renderFilterBar();
      if (currentView === "today") renderToday();
      else renderProjects();
    });
  });
  const clearBtn = document.getElementById("filter-clear-btn");
  if (clearBtn) clearBtn.addEventListener("click", clearFilters);
}

document.addEventListener("click", (e) => {
  if (activeFilterDropdown && !e.target.closest(".filter-dropdown")) {
    activeFilterDropdown = null;
    renderFilterBar();
  }
});


// ─── Render: Projects view ─────────────────────────────
function renderProjects() {
  const container = document.getElementById("projects-container");
  if (state.projects.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>No projects yet</h2>' +
        '<p>Hit <strong>+ New project</strong> to start.</p>' +
      '</div>';
    return;
  }
  const inView = projectsInCurrentView();
  if (inView.length === 0) {
    const viewName =
      currentView === "all" ? "this view" :
      currentView === "uncategorized" ? "Uncategorized" :
      (findLabel(currentView) || {}).name || "this category";
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>No projects in ' + escapeAttr(viewName) + '</h2>' +
        '<p>Hit <strong>+ New project</strong> to add one here, or drag an existing project onto this tab.</p>' +
      '</div>';
    return;
  }
  const finalProjects = inView.filter(p => {
    if (!isItemFilterActive()) return true;
    return p.actionables.some(a => passesAllItemFilters(a));
  });
  if (finalProjects.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<h2>No projects match the current filters</h2>' +
        '<p>Try clearing filters above, or change your filter selection.</p>' +
      '</div>';
    return;
  }
  container.innerHTML = '<div class="projects">' +
    finalProjects.map(renderProject).join("") +
    '</div>';
  wireProjects();
  attachDragHandlers();
  applySearchFilter();
}

function renderProject(p) {
  const l = findLabel(p.labelId);
  const colorAttrs = l ? 'data-label-color="' + l.color + '" style="--proj-color:' + l.color + ';"' : '';

  const active = [];
  const recentDone = [];
  const archived = [];
  p.actionables.forEach(a => {
    if (isItemFilterActive() && !passesAllItemFilters(a)) return;
    if (!a.done) active.push(a);
    else {
      const age = a.doneAt ? (Date.now() - new Date(a.doneAt).getTime()) : ARCHIVE_AFTER_MS + 1;
      if (age < ARCHIVE_AFTER_MS) recentDone.push(a);
      else archived.push(a);
    }
  });
  const showArchived = expandedDone.has(p.id);
  const visible = active.concat(recentDone).concat(showArchived ? archived : []);

  const doneFooter = archived.length > 0
    ? '<div class="done-footer ' + (showArchived ? "expanded" : "") + '" data-action="toggle-done-footer">' +
        '<span class="caret">' + (showArchived ? "▼" : "▶") + '</span>' +
        (showArchived ? "Hide" : "Show") + ' ' + archived.length + ' completed' +
      '</div>'
    : "";

  return (
    '<article class="project" data-project-id="' + p.id + '" ' + colorAttrs + '>' +
      '<div class="drag-handle" data-drag-handle>⋮⋮</div>' +
      '<button class="delete-btn" data-action="delete-project">Delete</button>' +
      '<div class="proj-header-row">' +
        '<input type="text" class="proj-name" placeholder="Project name" value="' + escapeAttr(p.name) + '">' +
      '</div>' +
      '<input type="text" class="proj-goal" placeholder="Goal — what does success look like?" value="' + escapeAttr(p.goal) + '">' +
      '<div class="section-head">Actionables ' +
        '<span class="count">' + active.length + ' open</span>' +
      '</div>' +
      '<ul class="items actionables-list">' +
        (visible.length === 0
          ? '<li style="border:none; padding:0;"><div class="empty-line">No actionables — add one below</div></li>'
          : visible.map(a => renderActionable(p, a)).join("")
        ) +
      '</ul>' +
      '<button class="btn add-line" data-action="add-actionable">+ Add actionable</button>' +
      doneFooter +
    '</article>'
  );
}

function renderStatusChip(p, a) {
  const s = a.status;
  if (!s) {
    return '<button class="status-chip unset" data-action="open-status-picker">Status</button>';
  }
  const meta = STATUS_META[s];
  let label = meta.label;
  if (s === "stuck" && a.stuckSince) {
    const sD = daysSince(a.stuckSince);
    if (sD >= 1) label = "Stuck · " + sD + "d";
  }
  return (
    '<button class="status-chip ' + s + '" data-action="open-status-picker">' +
      '<span class="dot" style="background:' + meta.color + ';"></span>' +
      label +
    '</button>'
  );
}

function renderStatusPicker(p, a) {
  const key = p.id + ":" + a.id;
  if (activeStatusPicker !== key) return "";
  const opts = STATUSES.map(s =>
    '<div class="picker-option" data-action="set-status" data-status="' + s + '">' +
      '<span class="dot" style="background:' + STATUS_META[s].color + ';"></span>' +
      '<span>' + STATUS_META[s].label + '</span>' +
    '</div>'
  ).join("");
  return (
    '<div class="status-picker">' +
      opts +
      (a.status ? '<div class="picker-divider"></div><div class="picker-option clear" data-action="set-status" data-status="">Clear status</div>' : '') +
    '</div>'
  );
}

function renderActionable(p, a) {
  const prioLabels = ["P", "LOW", "MED", "HIGH"];
  const prioBtn = '<button class="priority-chip p-' + a.priority + '" data-action="cycle-priority" title="Cycle priority">' +
    (a.priority === 0 ? "P" : prioLabels[a.priority]) + '</button>';

  const ageInfo = ageBadgeData(a.updatedAt || a.createdAt);
  const ageBadge = ageInfo
    ? '<span class="meta-badge level-' + ageInfo.level + '" title="Time since last update">' + ageInfo.text + '</span>'
    : "";

  let contextRow = "";
  if (a.status === "stuck") {
    contextRow =
      '<div class="context-row stuck">' +
        '<span class="lbl">Blocker:</span>' +
        '<input type="text" data-action="update-blocker" ' +
          'placeholder="What\'s in the way?" value="' + escapeAttr(a.blocker || "") + '">' +
      '</div>';
  } else if (a.status === "waiting") {
    contextRow =
      '<div class="context-row waiting">' +
        '<span class="lbl">Waiting for:</span>' +
        '<input type="text" data-action="update-waiting-for" ' +
          'placeholder="Who or what?" value="' + escapeAttr(a.waitingFor || "") + '">' +
      '</div>';
  }

  return (
    '<li data-item-id="' + a.id + '" class="' + (a.done ? "done" : "") + '">' +
      '<div class="item-row">' +
        '<span class="item-drag-handle" data-item-drag-handle>⋮⋮</span>' +
        '<input type="checkbox" data-action="toggle-actionable"' + (a.done ? " checked" : "") + '>' +
        prioBtn +
        '<input type="text" class="item-text" data-action="update-actionable" ' +
          'placeholder="What needs to be done?" value="' + escapeAttr(a.text) + '">' +
        ageBadge +
        '<div class="status-wrap">' +
          renderStatusChip(p, a) +
          renderStatusPicker(p, a) +
        '</div>' +
        '<button class="li-rm" data-action="remove-actionable" title="Remove">×</button>' +
      '</div>' +
      contextRow +
    '</li>'
  );
}

// ─── Wire project events ───────────────────────────────
function wireProjects() {
  const container = document.getElementById("projects-container");

  container.querySelectorAll('[data-action]').forEach(el => {
    if (el.tagName === "INPUT") return;
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const action = el.dataset.action;
      const proj = el.closest('[data-project-id]');
      const projId = proj && proj.dataset.projectId;
      const item = el.closest('[data-item-id]');
      const itemId = item && item.dataset.itemId;

      if (action === "delete-project")          deleteProject(projId);
      else if (action === "add-actionable")     addActionable(projId);
      else if (action === "remove-actionable")  removeActionable(projId, itemId);
      else if (action === "cycle-priority")     cyclePriority(projId, itemId);
      else if (action === "toggle-done-footer") {
        if (expandedDone.has(projId)) expandedDone.delete(projId);
        else expandedDone.add(projId);
        renderProjects();
      }
      else if (action === "open-status-picker") {
        const key = projId + ":" + itemId;
        activeStatusPicker = activeStatusPicker === key ? null : key;
        renderProjects();
      }
      else if (action === "set-status") {
        const status = el.dataset.status || null;
        setActionableStatus(projId, itemId, status);
        activeStatusPicker = null;
        // setActionableStatus calls renderAll
      }
    });
  });

  container.querySelectorAll('input[type="checkbox"][data-action="toggle-actionable"]').forEach(cb => {
    cb.addEventListener("change", () => {
      const proj = cb.closest('[data-project-id]');
      const item = cb.closest('[data-item-id]');
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "done", cb.checked);
      renderAll();
    });
  });

  container.querySelectorAll('input.proj-name, input.proj-goal').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const field = inp.classList.contains("proj-name") ? "name" : "goal";
      updateProjectField(proj.dataset.projectId, field, inp.value);
      if (searchTerm) applySearchFilter();
    });
  });

  container.querySelectorAll('input.item-text').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const item = inp.closest('[data-item-id]');
      if (!proj || !item) return;
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "text", inp.value);
      if (searchTerm) applySearchFilter();
    });
    inp.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const proj = inp.closest('[data-project-id]');
        if (proj) addActionable(proj.dataset.projectId);
      }
    });
  });

  container.querySelectorAll('input[data-action="update-blocker"]').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const item = inp.closest('[data-item-id]');
      if (!proj || !item) return;
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "blocker", inp.value);
    });
  });

  container.querySelectorAll('input[data-action="update-waiting-for"]').forEach(inp => {
    inp.addEventListener("input", () => {
      const proj = inp.closest('[data-project-id]');
      const item = inp.closest('[data-item-id]');
      if (!proj || !item) return;
      updateActionable(proj.dataset.projectId, item.dataset.itemId, "waitingFor", inp.value);
    });
  });
}

document.addEventListener("click", (e) => {
  if (activeStatusPicker && !e.target.closest('.status-picker') && !e.target.closest('[data-action="open-status-picker"]')) {

// ─── Drag and drop ─────────────────────────────────────
function attachDragHandlers() {
  document.querySelectorAll('.project').forEach(article => {
    const handle = article.querySelector('[data-drag-handle]');
    if (!handle) return;
    handle.addEventListener("mousedown", () => { article.draggable = true; });
    handle.addEventListener("mouseup", () => { article.draggable = false; });
    article.addEventListener("dragstart", (e) => {
      if (!article.draggable) return;
      e.stopPropagation();
      article.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("application/x-project", article.dataset.projectId);
    });
    article.addEventListener("dragend", () => {
      article.classList.remove("dragging");
      article.draggable = false;
      document.querySelectorAll('.project.drag-over').forEach(el => el.classList.remove("drag-over"));
    });
    article.addEventListener("dragover", (e) => {
      if (!Array.from(e.dataTransfer.types).includes("application/x-project")) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (!article.classList.contains("dragging")) article.classList.add("drag-over");
    });
    article.addEventListener("dragleave", () => article.classList.remove("drag-over"));
    article.addEventListener("drop", (e) => {
      const draggedId = e.dataTransfer.getData("application/x-project");
      if (!draggedId) return;
      e.preventDefault();
      article.classList.remove("drag-over");
      const targetId = article.dataset.projectId;
      if (draggedId === targetId) return;
      reorderProjects(draggedId, targetId);
    });

    article.querySelectorAll('.actionables-list > li').forEach(li => {
      const ah = li.querySelector('[data-item-drag-handle]');
      if (!ah) return;
      ah.addEventListener("mousedown", () => { li.draggable = true; });
      ah.addEventListener("mouseup", () => { li.draggable = false; });
      li.addEventListener("dragstart", (e) => {
        if (!li.draggable) return;
        e.stopPropagation();
        li.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("application/x-actionable", li.dataset.itemId);
        e.dataTransfer.setData("application/x-actionable-proj", article.dataset.projectId);
      });
      li.addEventListener("dragend", () => {
        li.classList.remove("dragging");
        li.draggable = false;
        article.querySelectorAll('.actionables-list > li.drag-over').forEach(el => el.classList.remove("drag-over"));
      });
      li.addEventListener("dragover", (e) => {
        if (!Array.from(e.dataTransfer.types).includes("application/x-actionable")) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        if (!li.classList.contains("dragging")) li.classList.add("drag-over");
      });
      li.addEventListener("dragleave", () => li.classList.remove("drag-over"));
      li.addEventListener("drop", (e) => {
        const draggedId = e.dataTransfer.getData("application/x-actionable");
        const draggedProj = e.dataTransfer.getData("application/x-actionable-proj");
        if (!draggedId) return;
        e.preventDefault();
        li.classList.remove("drag-over");
        if (draggedProj !== article.dataset.projectId) return;
        if (draggedId === li.dataset.itemId) return;
        reorderActionables(article.dataset.projectId, draggedId, li.dataset.itemId);
      });
    });
  });
}

function reorderLabels(draggedId, targetId) {
  const draggedIdx = state.labels.findIndex(l => l.id === draggedId);
  if (draggedIdx === -1) return;
  const dragged = state.labels[draggedIdx];
  state.labels.splice(draggedIdx, 1);
  const newTargetIdx = state.labels.findIndex(l => l.id === targetId);
  if (newTargetIdx === -1) { state.labels.splice(draggedIdx, 0, dragged); return; }
  state.labels.splice(newTargetIdx, 0, dragged);
  markAllTabsDirty();
  saveState();
  renderTabs();
}

function reorderProjects(draggedId, targetId) {
  const draggedIdx = state.projects.findIndex(p => p.id === draggedId);
  if (draggedIdx === -1) return;
  const dragged = state.projects[draggedIdx];
  state.projects.splice(draggedIdx, 1);
  const newTargetIdx = state.projects.findIndex(p => p.id === targetId);
  if (newTargetIdx === -1) { state.projects.splice(draggedIdx, 0, dragged); return; }
  state.projects.splice(newTargetIdx, 0, dragged);
  markAllProjectsDirty();
  saveState(); renderProjects();
}

// ─── Search ────────────────────────────────────────────
function applySearchFilter() {
  const term = searchTerm.trim().toLowerCase();
  document.querySelectorAll('.project').forEach(article => {
    const p = findProject(article.dataset.projectId);
    if (!p) return;
    let projectMatches = !term ||
      (p.name && p.name.toLowerCase().includes(term)) ||
      (p.goal && p.goal.toLowerCase().includes(term));
    let anyActionableMatches = false;
    article.querySelectorAll('.actionables-list > li').forEach(li => {
      const item = findActionable(p, li.dataset.itemId);
      if (!item) return;
      const matches = !term ||
        projectMatches ||
        (item.text && item.text.toLowerCase().includes(term)) ||
        (item.blocker && item.blocker.toLowerCase().includes(term)) ||
        (item.waitingFor && item.waitingFor.toLowerCase().includes(term));
      li.classList.toggle("hidden-by-search", !matches);
      if (matches && !projectMatches) anyActionableMatches = true;
    });
    article.classList.toggle("hidden-by-search", !!term && !projectMatches && !anyActionableMatches);
  });
}

document.getElementById("search-input").addEventListener("input", (e) => {
  searchTerm = e.target.value;
  applySearchFilter();
});
document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "k") {
    e.preventDefault();
    if (currentView !== "projects") setView("projects");
    setTimeout(() => document.getElementById("search-input").focus(), 0);
  }
  if (e.key === "Escape" && document.activeElement === document.getElementById("search-input")) {
    document.getElementById("search-input").value = "";
    searchTerm = "";
    applySearchFilter();
    document.getElementById("search-input").blur();
  }
});

// ─── Today tab stats ───────────────────────────────────
function calcTotalTodayTasks() {
  let count = 0;
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (a.status === "today") count++;
    });
  });
  return count;
}

function calcHighPriorityTodayTasks() {
  let count = 0;
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (a.status === "today" && a.priority === 3) count++;
    });
  });
  return count;
}

function calcHighPriorityDoneThisWeek() {
  // Calendar week starting Sunday at 00:00 local time
  const sunday = new Date();
  sunday.setHours(0, 0, 0, 0);
  sunday.setDate(sunday.getDate() - sunday.getDay());
  const sundayMs = sunday.getTime();
  let count = 0;
  state.projects.forEach(p => {
    p.actionables.forEach(a => {
      if (!a.done) return;
      if (a.priority !== 3) return;
      if (!a.doneAt) return;
      if (new Date(a.doneAt).getTime() < sundayMs) return;
      count++;
    });
  });
  return count;
}

function renderTodayStats() {
  const total = calcTotalTodayTasks();
  const high  = calcHighPriorityTodayTasks();
  const done  = calcHighPriorityDoneThisWeek();
  return '<div class="today-stats">' +
    '<div class="today-stat">' +
      '<div class="lbl">Today tasks</div>' +
      '<div class="val">' + total + '</div>' +
      '<div class="sub">total in Today</div>' +
    '</div>' +
    '<div class="today-stat high">' +
      '<div class="lbl">High priority today</div>' +
      '<div class="val">' + high + '</div>' +
      '<div class="sub">of ' + total + ' total</div>' +
    '</div>' +
    '<div class="today-stat good">' +
      '<div class="lbl">High priority done this week</div>' +
      '<div class="val">' + done + '</div>' +
      '<div class="sub">since Sunday</div>' +
    '</div>' +
  '</div>';
}

// ─── Render: Today view ────────────────────────────────
function renderToday() {
  const container = document.getElementById("today-list-container");

  // Always render stats at the top
  const statsHtml = renderTodayStats();

  const groups = [];
  state.projects.forEach(p => {
    let items = p.actionables.filter(a => a.status === "today");
    if (isItemFilterActive()) items = items.filter(passesAllItemFilters);
    if (items.length) groups.push({ project: p, items });
  });

  if (groups.length === 0) {
    const filtered = isItemFilterActive();
    container.innerHTML = statsHtml +
      '<div class="empty-state">' +
        '<h2>' + (filtered ? "Nothing matches the current filters" : "Nothing on today") + '</h2>' +
        '<p>' + (filtered ? "Try clearing filters above." : "Open the Projects tab and set an actionable\'s status to <strong>Today</strong>.") + '</p>' +
      '</div>';
    return;
  }

  groups.forEach(g => {
    g.items.sort((x, y) => (x.done === y.done ? 0 : x.done ? 1 : -1));
  });

  container.innerHTML = statsHtml + groups.map(g => {
    const openCount = g.items.filter(i => !i.done).length;
    const l = findLabel(g.project.labelId);
    const labelChip = l ?
      ' <span class="label-chip" style="background:' + l.color + '22; color:' + l.color + '; border-color:' + l.color + '55;">' +
        '<span class="dot" style="background:' + l.color + ';"></span>' + escapeAttr(l.name || "") +
      '</span>'
      : "";
    return (
      '<div class="today-group">' +
        '<h3>' + escapeAttr(g.project.name || "(untitled project)") + labelChip +
          '<span style="color:var(--text-4); font-weight:400; text-transform:none; letter-spacing:0; margin-left:auto;">' +
            openCount + ' / ' + g.items.length +
          '</span>' +
        '</h3>' +
        '<div class="today-list">' +
          g.items.map(a => renderTodayItem(g.project, a)).join("") +
        '</div>' +
      '</div>'
    );
  }).join("");

  wireTodayView();
}

function renderTodayItem(p, a) {
  return (
    '<div class="today-item' + (a.done ? " done" : "") + '" data-project-id="' + p.id + '" data-item-id="' + a.id + '">' +
      '<input type="checkbox" data-action="today-toggle"' + (a.done ? " checked" : "") + '>' +
      '<div class="text">' + escapeAttr(a.text || "(untitled)") + '</div>' +
      '<div class="proj-tag" data-action="jump-to-project">' + escapeAttr(p.name || "(untitled project)") + '</div>' +
    '</div>'
  );
}

function wireTodayView() {
  const container = document.getElementById("today-list-container");
  container.querySelectorAll('input[type="checkbox"][data-action="today-toggle"]').forEach(cb => {
    cb.addEventListener("change", () => {
      const wrap = cb.closest('.today-item');
      updateActionable(wrap.dataset.projectId, wrap.dataset.itemId, "done", cb.checked);
      renderAll();
    });
  });
  container.querySelectorAll('[data-action="jump-to-project"]').forEach(tag => {
    tag.addEventListener("click", () => {
      setView("projects");
      setTimeout(() => {
        const wrap = tag.closest('.today-item');
        const el = document.querySelector('[data-project-id="' + wrap.dataset.projectId + '"]');
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 0);
    });
  });
}

function renderAll() {
  renderDateHeader();
  renderDailyDashboard();
  renderFilterBar();
  renderTabs();
  // Re-validate currentView in case labels/projects changed
  const valid = validViews();
  if (!valid.has(currentView)) {
    currentView = "today";
    window.localStorage.setItem("view", currentView);
    renderTabs();
  }
  document.getElementById('today-view').style.display = currentView === 'today' ? 'block' : 'none';
  document.getElementById('projects-view').style.display = currentView !== 'today' ? 'block' : 'none';
  if (currentView === "today") renderToday();
  else renderProjects();
}

// ─── Export / Import ──────────────────────────────────
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "projects-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importDataFromFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.projects || !Array.isArray(parsed.projects)) throw new Error("Missing 'projects' array");
      if (!confirm("This will replace your current data with the imported file. Continue?")) return;
      state = parsed;
      state.labels = state.labels || [];
      state.projects.forEach(p => {
        if (p.labelId === undefined) p.labelId = null;
        if (!p.createdAt) p.createdAt = NOW;
        (p.actionables || []).forEach(a => {
          if (a.status === undefined) {
            const labs = Array.isArray(a.labels) ? a.labels : [];
            if (labs.includes("stuck")) a.status = "stuck";
            else if (labs.includes("today")) a.status = "today";
            else if (labs.includes("waiting")) a.status = "waiting";
            else a.status = null;
          }
          if (typeof a.blocker !== "string") a.blocker = "";
          if (typeof a.waitingFor !== "string") a.waitingFor = "";
          if (!a.createdAt) a.createdAt = NOW;
          if (!a.updatedAt) a.updatedAt = a.createdAt;
          if (typeof a.priority !== "number") a.priority = 0;
          if (a.stuckSince === undefined) a.stuckSince = a.status === "stuck" ? NOW : null;
          if (a.doneAt === undefined) a.doneAt = a.done ? NOW : null;
          delete a.labels;
          delete a.dueDate;
        });
      });
      saveState();
      renderAll();
      alert("✓ Imported " + state.projects.length + " projects, " + state.labels.length + " tabs");
    } catch (err) {
      alert("Couldn't read that file: " + err.message);
    }
  };
  reader.readAsText(file);
}
document.getElementById("export-btn").addEventListener("click", exportData);
document.getElementById("import-btn").addEventListener("click", () => document.getElementById("import-file").click());
document.getElementById("import-file").addEventListener("change", (e) => {
  if (e.target.files[0]) importDataFromFile(e.target.files[0]);
  e.target.value = "";
});
